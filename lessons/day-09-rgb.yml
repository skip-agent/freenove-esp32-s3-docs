    - { from: Blue leg (via 220 Ω), to: GPIO 40, why: One PWM channel sets how much blue shows., explain: rgb }
    - { from: Common (long) pin, to: 3.3V, why: All three share this positive pin so a colour lights when its pin goes LOW., explain: commonAnode }
