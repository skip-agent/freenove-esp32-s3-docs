# Three PWM channels in one dome — the day colour becomes something you mix.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY09-RGB
day: 9
slug: day-09-rgb
title: Mix any colour from three lights
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire an RGB LED — three tiny lights in one dome — to three PWM pins, upload the
  Arduino sketch, and watch the board mix red, green, and blue into a stream of
  random colours you never wired by hand.
unlocks: A colour is just three brightnesses set at once, so three PWM channels can paint any shade you ask for.
seoDescription: >
  Wire a common-anode RGB LED to the ESP32-S3, upload the sketch, and mix any
  colour from three PWM channels — red, green, and blue set to brightnesses that
  blend in your eye.

