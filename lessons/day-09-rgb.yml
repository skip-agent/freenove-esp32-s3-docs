steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Find the RGB LED's long pin — that's the common one shared by all three colours. {commonAnode}
    - Wire the red leg through a 220 Ω resistor to GPIO 38. {resistor}
    - Wire the green leg through a 220 Ω resistor to GPIO 39.
    - Wire the blue leg through a 220 Ω resistor to GPIO 40.
    - Run the long common pin to 3.3V, not to ground.
    - Compare every wire to the chart before you plug in USB.
    - Open `Sketch_05.1_RandomColorLight.ino` in Arduino IDE and upload it.
    - Watch the dome change colour again and again.
  done:
    icon: "💡"
    title: One dome, every colour.
    body: The board is mixing red, green, and blue for you now. Head to Test & debug to confirm the colours keep changing.

code:
  intro: >
    The sketch sets up three PWM channels, then paints a colour by giving each one
    a brightness. Switch to MicroPython if you'd rather see the same idea in Python
    — the wiring never changes.
  arduino:
    file: Sketch_05.1_RandomColorLight.ino
    sketch: C/Sketches/Sketch_05.1_RandomColorLight/Sketch_05.1_RandomColorLight.ino
    variant: C/Sketches/Sketch_05.2_GradientColorLight/Sketch_05.2_GradientColorLight.ino
    excerpt: |
      const byte ledPins[] = {38, 39, 40};   // R, G, B
      const byte chns[]    = {0, 1, 2};

      void setup() {
        for (int i = 0; i < 3; i++) {
          ledcAttachChannel(ledPins[i], 1000, 8, chns[i]);
        }
      }

      void loop() {
        int red   = random(0, 256);
        int green = random(0, 256);
        int blue  = random(0, 256);

        ledcWrite(ledPins[0], 255 - red);    // common anode: LOW = brighter
        ledcWrite(ledPins[1], 255 - green);
        ledcWrite(ledPins[2], 255 - blue);
        delay(200);
      }
    notes:
      - code: const byte ledPins[] = {38, 39, 40}
        text: The three pins are the red, green, and blue legs in that order.
        explain: rgb
      - code: ledcWrite(ledPins[0], 255 - red)
        text: Writes 255 minus the value because this common-anode LED lights when its pin goes LOW.
        explain: commonAnode
      - code: red = random(0, 256)
        text: Each colour gets a fresh brightness from 0 to 255, and setting all three at once mixes the shade.
        explain: pwm
  micropython:
    file: 05.1_RandomColorLight/RandomColorLight.py
    path: Python/Python_Codes/05.1_RandomColorLight/RandomColorLight.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      pins = [38, 39, 40]   # R, G, B
      pwm0 = PWM(Pin(pins[0]), freq=1000)

      r = random.randint(0, 1023)
      pwm0.duty(1023 - r)    # common anode: invert with 1023 - value
    notes:
      - code: pwm0.duty(1023 - r)
        text: MicroPython's duty here is 10-bit, so it inverts with 1023 minus the value instead of 255.
    note: >
      Same pins, same wiring. Run it in [Thonny](https://thonny.org) if MicroPython is set up; otherwise
      skip it — it should never block the Arduino-first path.

theory:
  title: Any colour is three brightnesses
  summary: >
    Give red, green, and blue each a level from 0 to 255 and your eye adds the
    three glows into one colour — the same PWM dimming from Day 7, run on three
    channels at once.
  intro: >
    Day 7 turned one pin into a dimmer with PWM. Today you run that same dimmer on
    three pins — one for red, one for green, one for blue — and the colours add up
    in your eye. That single idea is the whole of colour on every screen you own,
    built from three numbers.
  flow:
    - n: "1"
      title: Three PWM dials
      body: >
        Each colour leg gets its own PWM channel — the Day 7 dimmer, running three
        times over instead of once.
    - n: "2"
      title: 0 to 255 each
      body: >
        Each channel is set to 8-bit, so a colour has 256 brightness steps from 0
        to 255; three of them together reach millions of shades.
    - n: "3"
      title: Your eye adds them
      body: >
        The red, green, and blue glows overlap under one lens and arrive at your
        eye as a single blended colour.
    - n: "4"
      title: Equal makes white
      body: >
        With no colour winning — red, green, and blue at the same level — the mix
        stays neutral, dim grey low down and white at full.
    - n: "5"
      title: Anode or cathode
      body: >
        The one shared pin sets the polarity, deciding whether a colour lights when
        its pin goes LOW or when it goes HIGH.
  formulaLabel: The model
  formula: colour = **red** + **green** + **blue**, each a PWM level from **0 to 255**
  notes:
    - title: Common anode vs common cathode
      explain: commonAnode
      body: >
        Three LEDs share one pin. Run that shared pin to 3.3V and you have a common
        anode, where each colour lights when its own pin goes LOW. Run it to ground
        and you have a common cathode, lit on HIGH. This kit is a common anode, so
        the sketch writes 255 minus your value and a bigger number still means
        brighter.
    - title: Why the numbers stop at 255
      explain: ledc
      body: >
        The channels are 8-bit, which gives 256 levels per colour, 0 through 255.
        That is the same ledc hardware from Day 7 doing the fast switching, while
        your loop just names one level for each of the three colours.
    - title: Why equal numbers look grey
      explain: rgb
      body: >
        When red, green, and blue are equal, none of them leads, so your eye finds
        no hue to settle on and reads neutral — grey at a low level, white at a
        high one.

test:
  mode: visual
  intro: >
    Nothing prints to the screen today — the proof is the colour in the dome.
  expectedTitle: What you should see
  readoutLabel: RGB LED
  expected:
    - The RGB LED glows a colour.
    - Every fraction of a second it jumps to a new random colour.
    - It keeps changing for as long as the board has power.
  expectedNote: The colours look random on purpose — each one is a fresh mix of red, green, and blue.
  checksTitle: If it doesn't
  checks:
    - symptom: "Only one colour ever appears?"
      fix: "Check that colour's 220 Ω resistor and its GPIO wire — the other two legs may not be reaching their pins."
    - symptom: "Nothing lights at all?"
      fix: "Check the common pin — it goes to 3.3V, not to ground."
    - symptom: "A colour is stuck full-on?"
      fix: "Suspect the common-anode wiring or the wrong leg on that pin."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: predict a colour, then mix it"
  railLabel: Try this
  intro: >
    The random sketch proves the board can mix. This proves you know the recipe.
    You'll predict three colours from their red, green, and blue numbers, then set
    those numbers by hand and check your eye against your maths. It fits inside
    today's 25 minutes.
  summary: Predict the red, green, and blue numbers for orange, purple, and white, then replace the three random() calls with your fixed numbers, upload, and see whether the dome matches your prediction.
  cards:
    - title: Predict three colours
      explain: rgb
      body: On paper, write the three numbers from 0 to 255 for orange, then purple, then white. Orange is a lot of red with some green and no blue; purple is red and blue together with green held low; white is all three at full. Notice that equal numbers should read as neutral grey or white.
    - title: Mix it by hand
      explain: commonAnode
      body: In the sketch, swap each `random(0, 256)` for your fixed red, green, and blue number, upload, and compare the dome with your prediction. The code still writes 255 minus each value for the common anode, so your bigger number is still the brighter one. If a colour looks off, nudge the number and re-upload.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical connection at a time and wait for confirmation, teach that
    any colour is three PWM brightnesses from 0 to 255, explain the common-anode
    inversion on request, and help the learner predict then mix a named colour.
    Always check the common pin, wiring, board, and USB before changing code.
  coachInstructions:
    - Guide one physical connection at a time and wait for learner confirmation before proceeding.
    - Land the core model- any colour is three brightnesses (red, green, blue), each set by its own PWM channel from 0 to 255, and equal amounts read as grey or white.
    - Stress that this is a common-anode LED- its shared pin goes to 3.3V, so a colour lights when its pin goes LOW; a common-cathode part shares ground instead and lights on HIGH.
    - Explain the 255 minus value inversion when asked- it hides the common-anode polarity so a bigger number still means brighter.
    - For the challenge, have the learner predict the red, green, and blue numbers for orange, purple, and white before setting them, then check the dome against the prediction.
    - If only one colour appears, check that colour's 220 Ω resistor and GPIO wire before changing code; if nothing lights, check the common pin reaches 3.3V; if a colour is stuck on, suspect common-anode wiring or the wrong leg.
    - Keep the Arduino path primary; MicroPython is optional only if already set up.

