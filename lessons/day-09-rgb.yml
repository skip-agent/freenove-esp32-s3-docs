# Day 9 — RGB LED · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-09-rgb/), the agent packet, and the course-map entry.
# Three PWM channels in one dome — the day colour becomes something you mix.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY09-RGB
day: 9
slug: day-09-rgb
title: Mix any colour from three lights
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire an RGB LED — three tiny lights in one dome — to three PWM pins and upload
  the Arduino sketch. The real payoff is a model you'll use for every screen you
  own: any colour is three brightnesses — red, green, and blue — each set by its
  own PWM channel from 0 to 255. The board proves it by mixing colours you never
  wired by hand.
unlocks: A colour is three brightnesses set at once, so three PWM channels — one per primary, 0 to 255 each — can paint any shade you name.
seoDescription: >
  Wire a common-anode RGB LED to the ESP32-S3, upload the sketch, and mix any
  colour from three PWM channels — red, green, and blue set to brightnesses that
  blend in your eye.

