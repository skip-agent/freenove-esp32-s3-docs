    lights — red, green, and blue — to three PWM pins, then set a brightness on
    each. Your eye adds the three glows into a single colour, which is how every
    screen you own builds its picture from just three numbers.
  pills:
    - { text: About 25 minutes, key: true }
    - Arduino first
    - MicroPython optional
    - No electronics assumed

