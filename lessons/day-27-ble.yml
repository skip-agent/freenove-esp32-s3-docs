lessonCode: TSK-DAY27-BLE
day: 27
slug: day-27-ble
title: "BLE pass-through: talk at short range"
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Upload the BLE pass-through sketch and use your phone to find the board on the
  air and talk to it — type in Serial Monitor and read it on the phone, write on
  the phone and read it in Serial Monitor. Along the way, learn the model every
  BLE gadget uses: the board advertises, the phone discovers and connects, then
  the two trade data through characteristics.
unlocks: You understand how a phone finds a BLE device and exchanges data with it through a service and its characteristics — the same model behind fitness bands and wireless sensors — and you've driven that exchange both ways yourself.
seoDescription: >
  Turn the ESP32-S3 into a BLE serial pipe. Upload the pass-through sketch,
  connect with the LightBlue phone app, and send text both ways between Serial
  Monitor and your phone.

