  headline: Talk to your phone|over {radio}
  lede: >
    Today the cable stops being the only path. The ESP32-S3's built-in Bluetooth
    Low Energy radio becomes a short-range text line — you type in Serial
    Monitor and the words land on your phone, then your phone answers back the
    same way.
  pills:
    - { text: About 25 minutes, key: true }
    - Arduino first
    - MicroPython optional
