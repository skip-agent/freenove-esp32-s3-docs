steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Confirm the Day 6 LED bar is still wired, or rebuild it — LED bar across the centre channel, one 220 Ω resistor per segment, common row to ground. {ledBar}
    - Keep USB unplugged while you check or move any wire.
    - Note that only eight segments are wired for PWM today, since the board has eight PWM channels; two segments stay dark on purpose. {pinArray}
    - Compare every wire to the chart before you plug in USB.
    - Open `Sketch_04.2_FlowingLight2.ino` in Arduino IDE and upload it.
    - Watch a bright segment with a fading tail glide along the bar and back.
  done:
    icon: "💡"
    title: The light has a tail.
    body: Each segment is now holding its own brightness. Head to Test & debug to confirm the comet and its fading trail.

code:
  intro: >
    The sketch keeps the pins in one list, like Day 6, and adds a second list of
    brightness values. That second list is the whole animation — a bright head
    with values that fall off behind it — and each frame the loop shows a moving
    slice of it. Switch to MicroPython if you'd rather see the same idea in
    Python — the wiring never changes.
  arduino:
    file: Sketch_04.2_FlowingLight2.ino
    sketch: C/Sketches/Sketch_04.2_FlowingLight2/Sketch_04.2_FlowingLight2.ino
    excerpt: |
      const byte ledPins[] = {21, 47, 38, 39, 40, 41, 42, 2};
      const byte chns[] = {0, 1, 2, 3, 4, 5, 6, 7};
      const int dutys[] = {0,0,0,0,0,0,0,0, 1023,512,256,128,64,32,16,8, 0,0,0,0,0,0,0,0};

      void setup() {
        for (int i = 0; i < 8; i++) {
          ledcAttachChannel(ledPins[i], 1000, 10, chns[i]);
        }
      }

      void loop() {
        for (int i = 0; i < 16; i++) {
          for (int j = 0; j < 8; j++) {
            ledcWrite(ledPins[j], dutys[i + j]);
          }
          delay(100);
        }
      }
    notes:
      - code: ledcAttachChannel(ledPins[i], 1000, 10, chns[i])
        text: Gives each of the eight pins its own PWM channel, so every segment can hold a brightness of its own — the per-LED control each frame needs.
        explain: ledc
      - code: const int dutys[] = {0,..., 1023,512,256,128,64,32,16,8, ...,0}
        text: A brightness for every position — bright head down to a faint glow, with dark padding on each side. Those falling numbers are the tail, baked into the data rather than redrawn each frame.
        explain: pwm
      - code: ledcWrite(ledPins[j], dutys[i + j])
        text: Shows one eight-wide slice of the list — a single frame; the i offset moves that slice one step further each pass, so successive frames make the comet travel.
        explain: pinArray
  micropython:
    file: 04.2_FlowingLight/FlowingLight.py
    path: Python/Python_Codes/04.2_FlowingLight/FlowingLight.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      mypwm = myPWM(21,47,38,39,40,41,42,2)
      chns = [0,1,2,3,4,5,6,7]
      dutys = [0,0,0,0,0,0,0,0, 1023,512,256,128,64,32,16,8, 0,0,0,0,0,0,0,0]
    notes:
      - code: mypwm = myPWM(21,47,38,39,40,41,42,2)
        text: A helper wraps each of the eight pins as a PWM object so they can hold brightness in Python.
      - code: dutys = [...1023,512,256,128,64,32,16,8...]
        text: The same falling gradient as the Arduino sketch — the head is brightest and the tail fades.
    note: >
      A helper `pwm.py` wraps each pin as a PWM object. Run it in Thonny if
      MicroPython is set up; otherwise skip it — it should never block the
      Arduino-first path.

theory:
  title: Motion is frames on a timer
  summary: Each pass of the loop draws one still frame — eight brightnesses on the bar — then shifts the pattern one step; frames arriving faster than the eye can separate them read as a single moving comet.
  intro: >
    There's no special "animation" feature on the chip. Everything that moves —
    film, a game, this bar — is still frames shown one after another, fast. The
    `loop` is your projector — each pass sets a fresh picture and pauses, and a
    small change between frames becomes motion.
  flow:
    - n: "Frame"
      title: "one pass, one still"
      body: "Each time through the loop the board sets all eight brightnesses at once and pauses. That fixed picture is one frame."
    - n: "Array"
      title: "brightness per LED"
      body: "A list holds a brightness for every position — a bright head with values that fall off behind it. That falling shape is the tail."
    - n: "Advance"
      title: "move a step"
      body: "Before the next frame the pattern shifts one LED along the bar. A small move plus a short pause reads as the head creeping forward."
    - n: "Fuse"
      title: "faster than the eye"
      body: "At about ten frames a second the pauses disappear and the separate steps blend into one comet gliding down the bar."
  formulaLabel: The loop
  formula: "set eight brightnesses → pause → shift one step → repeat = a moving picture"
  notes:
    - title: How each LED holds a brightness
      explain: pwm
      body: PWM flicks each pin on and off very fast; the fraction of time it stays on sets how bright that segment looks, so one row can carry a smooth gradient of its own.
    - title: Why the steps look smooth
      body: Each frame lingers on your eye for an instant, and the next arrives before it fades. Around ten frames a second, they merge into continuous motion — the same trick a film reel uses.
    - title: One long list, a moving window
      explain: pinArray
      body: The brightness list is longer than the bar and padded with dark at both ends. Each frame shows a different eight-LED slice of it, so the comet can slide in from a dark bar and back out again.

test:
  mode: visual
  intro: >
    Nothing prints to the screen today — the proof is the moving comet on the bar.
  expectedTitle: What you should see
  readoutLabel: LED bar
  expected:
    - A bright segment leads with dimmer segments trailing behind it.
    - The bright head and its fading tail glide along the bar together.
    - Then the comet slides back the other way, smoothly, for as long as the board has power.
  expectedNote: Two segments stay dark on purpose — only eight are on PWM, because the board has eight PWM channels.
  checksTitle: If it doesn't
  checks:
    - symptom: "Only one segment lights, with no tail?"
      fix: "You may be running Day 6's on/off sketch — upload 04.2 so PWM sets the brightnesses."
    - symptom: "A segment in the path stays dark?"
      fix: "Check that segment's own 220 Ω resistor and its jumper to its GPIO pin."
    - symptom: "Nothing lights at all?"
      fix: "Re-check the common row to ground, then that the sketch uploaded."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: reshape the comet"
  railLabel: Try this
  intro: >
    Same working circuit, small edits to the one sketch — each one changes the
    animation and shows you a different part of how it works. All three fit inside
    today's time and leave the wiring untouched.
  summary: Slow the frames down until you can see them land one at a time, then reshape the tail and swap which end leads — and predict each result before you upload.
  cards:
    - title: See the frames land
      explain: delayMs
      body: Change `delay(100)` to `delay(500)` and upload. The comet now steps forward once every half-second, so you can watch each individual frame arrive — the motion you saw was these same stills, shown too fast to separate.
    - title: Reshape the tail
      explain: pwm
      body: Edit the falling numbers in `dutys` — add more dim values for a longer tail, fewer for a stubbier one. That list is the animation, so predict the new shape before you upload, then check it.
    - title: Swap which end leads
      explain: pinArray
      body: Reverse the order of the bright block in `dutys` so it climbs from dim up to bright. The head and tail trade ends, and the comet appears to run the other way — proof that head and tail are only the shape of the list.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    confirm the Day 6 circuit first, then teach the animation idea plainly — one
    loop pass draws a still frame, the dutys list is the whole animation, and
    shifting it one step each frame is what moves the comet. Guide edits one at a
    time, wait for the learner to confirm, explain terms on request, and always
    check wiring, board, port, and USB before changing code.
  coachInstructions:
    - Start by confirming the Day 6 LED bar is still wired; only eight segments are driven today, and two staying dark is expected.
    - Land the core idea — motion here is still frames on a timer, where each loop pass sets eight brightnesses and pauses, and shifting the brightness list one step per frame is what moves the comet.
    - Point out that the tail lives in the dutys list as values that fall off behind the head; the loop only ever shows a moving slice of that list.
    - Remind the learner that each driven segment needs its own 220 Ω series resistor — a shared or missing resistor is the common mistake here.
    - If only one segment lights with no tail, suspect Day 6's on/off sketch is still loaded; have the learner upload 04.2 before changing anything else.
    - If a segment in the path stays dark, check that segment's resistor and its jumper to its GPIO pin, not the whole circuit.
    - For the challenge, have them slow delay right down first to watch single frames land, before reshaping the tail or reversing the gradient; do not dump theory before the learner has a working comet.
    - Keep the Arduino path primary; MicroPython is optional only if already set up.

