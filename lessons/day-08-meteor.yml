# Day 8 — Meteor light · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-08-meteor/), the agent packet, and the course-map entry.
# The same LED bar as Day 6 — but now each segment holds its own brightness.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY08-METEOR
day: 8
slug: day-08-meteor
title: Send a comet down the bar
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Rebuild the Day 6 LED bar, upload the Arduino sketch, and watch a bright head
  with a fading tail glide along the bar and back. The real lesson sits
  underneath the light: the board draws one still frame, pauses, then draws the
  next — motion built from stills on a timer, the same idea behind every film and
  video game. A moving comet turns out to be a list of brightnesses, shifted one
  step each frame.
unlocks: You understand animation as frames on a timer — each pass of the loop draws one still frame, and shifting a brightness array a step at a time turns those stills into a moving light with a fading tail.
seoDescription: >
  Reuse the ESP32-S3 LED bar from Day 6, upload the sketch, and give each
  segment its own PWM brightness to make a bright comet head with a fading tail
  sweep along the bar and back.

