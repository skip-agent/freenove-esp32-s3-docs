wiring:
  intro: >
    This is the same LED bar circuit you built on Day 6 — if it's still on the
    breadboard, you're nearly done. The one difference is that today's sketch
    drives eight of the segments, because each needs its own PWM channel and the
    board has eight, so two segments stay dark.
  diagram:
    image: day-08/circuit-page-56.png
    alt: >-
      Official Freenove LED bar circuit: ten LED segments, each driven from its
      own GPIO pin through a 220 ohm resistor and returning through a shared
      common row to ground, shown as both a schematic and a breadboard photo.
    caption: Official Freenove LED-bar circuit — C Tutorial, Chapter 3, page 56 (the meteor light in Chapter 4 reuses it).
    zoomCaption: Official Freenove LED-bar circuit, C Tutorial Chapter 3, page 56.
    source: { pdf: C_Tutorial.pdf, chapter: 3, chapterTitle: LED Bar, page: 56 }
  pins:
    - { from: 8 bar segments (via 220 Ω each), to: GPIO 21 47 38 39 40 41 42 2, why: Each pin drives one segment with its own PWM channel., explain: pinArray }
    - { from: Bar common row, to: GND, why: Returns every segment to zero volts., explain: gnd }
  safety:
    - label: The bar can go in backwards.
      icon: "⚓"
      body: >
        The LED bar's label direction is easy to reverse. If the driven segments
        stay dark once you upload, rotate it 180° in the breadboard and try
        again. Unplug USB before you move any wire.

steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Confirm the Day 6 LED bar is still wired, or rebuild it — LED bar across the centre channel, one 220 Ω resistor per segment, common row to ground. {ledBar}
    - Keep USB unplugged while you check or move any wire.
    - Note that only eight segments are wired for PWM today, since the board has eight PWM channels; two segments stay dark on purpose. {pinArray}
    - Compare every wire to the chart before you plug in USB.
    - Open `Sketch_04.2_FlowingLight2.ino` in Arduino IDE and upload it.
    - Watch a bright segment with a fading tail glide along the bar and back.
  done:
    icon: "💡"
    title: The light has a tail.
    body: Each segment is now holding its own brightness. Head to Test & debug to confirm the comet and its fading trail.

code:
  intro: >
    The sketch keeps the pins in one list, like Day 6, but adds a second list of
    brightness values that forms the tail. Switch to MicroPython if you'd rather
    see the same idea in Python — the wiring never changes.
  arduino:
    file: Sketch_04.2_FlowingLight2.ino
    sketch: C/Sketches/Sketch_04.2_FlowingLight2/Sketch_04.2_FlowingLight2.ino
    excerpt: |
      const byte ledPins[] = {21, 47, 38, 39, 40, 41, 42, 2};
      const byte chns[] = {0, 1, 2, 3, 4, 5, 6, 7};
      const int dutys[] = {0,0,0,0,0,0,0,0, 1023,512,256,128,64,32,16,8, 0,0,0,0,0,0,0,0};

      void setup() {
        for (int i = 0; i < 8; i++) {
          ledcAttachChannel(ledPins[i], 1000, 10, chns[i]);
        }
      }

      void loop() {
        for (int i = 0; i < 16; i++) {
          for (int j = 0; j < 8; j++) {
            ledcWrite(ledPins[j], dutys[i + j]);
          }
          delay(100);
        }
      }
    notes:
      - code: ledcAttachChannel(ledPins[i], 1000, 10, chns[i])
        text: Gives each of the eight pins its own PWM channel, so every segment can hold a brightness of its own.
        explain: ledc
      - code: const int dutys[] = {0,..., 1023,512,256,128,64,32,16,8, ...,0}
        text: A brightness gradient — bright to dim — with dark padding on each side; those falling numbers are the fading tail.
        explain: pwm
      - code: ledcWrite(ledPins[j], dutys[i + j])
        text: Reads an eight-wide window of the gradient and slides it one step each pass, which is what makes the comet move.
        explain: pinArray
  micropython:
    file: 04.2_FlowingLight/FlowingLight.py
    path: Python/Python_Codes/04.2_FlowingLight/FlowingLight.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      mypwm = myPWM(21,47,38,39,40,41,42,2)
      chns = [0,1,2,3,4,5,6,7]
      dutys = [0,0,0,0,0,0,0,0, 1023,512,256,128,64,32,16,8, 0,0,0,0,0,0,0,0]
    notes:
      - code: mypwm = myPWM(21,47,38,39,40,41,42,2)
        text: A helper wraps each of the eight pins as a PWM object so they can hold brightness in Python.
      - code: dutys = [...1023,512,256,128,64,32,16,8...]
        text: The same falling gradient as the Arduino sketch — the head is brightest and the tail fades.
    note: >
      A helper `pwm.py` wraps each pin as a PWM object. Run it in Thonny if
      MicroPython is set up; otherwise skip it — it should never block the
      Arduino-first path.

theory:
  title: A gradient that moves
  summary: Give each LED its own brightness, shape a bright-to-dim gradient, then slide that gradient one step at a time so the head leads and the tail fades.
  intro: >
    There's no trick here — the board sets eight brightnesses at once, then nudges
    the whole pattern along the bar, faster than the eye separates the steps.
  flow:
    - { n: Brightness, title: PWM per LED, body: Each segment gets its own channel so it can be bright or dim. }
    - { n: Gradient, title: bright to dim, body: The dutys list falls from full on down to a faint glow. }
    - { n: Slide, title: one step, body: An eight-wide window of that list moves one place each pass. }
    - { n: Comet, title: head and tail, body: The bright end leads and the dim end trails it down the bar. }
  formulaLabel: The model
  formula: eight brightnesses → a falling gradient → slide it one step → head leads, tail fades
  notes:
    - title: What PWM is doing
      explain: pwm
      body: PWM flicks each pin on and off very fast; the fraction of time it stays on sets how bright that segment looks, so a whole row can carry a smooth gradient.

test:
  mode: visual
  intro: >
    Nothing prints to the screen today — the proof is the moving comet on the bar.
  expectedTitle: What you should see
  readoutLabel: LED bar
  expected:
    - A bright segment leads with dimmer segments trailing behind it.
    - The bright head and its fading tail glide along the bar together.
    - Then the comet slides back the other way, smoothly, for as long as the board has power.
  expectedNote: Two segments stay dark on purpose — only eight are on PWM, because the board has eight PWM channels.
  checksTitle: If it doesn't
  checks:
    - symptom: "Only one segment lights, with no tail?"
      fix: "You may be running Day 6's on/off sketch — upload 04.2 so PWM sets the brightnesses."
    - symptom: "A segment in the path stays dark?"
      fix: "Check that segment's own 220 Ω resistor and its jumper to its GPIO pin."
    - symptom: "Nothing lights at all?"
      fix: "Re-check the common row to ground, then that the sketch uploaded."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: reshape the comet"
  railLabel: Try this
  intro: >
    Same working circuit, small edits to the sketch. Both fit inside today's time
    and leave the wiring untouched.
  summary: Change the trail by editing the dutys values, then change the sweep speed with the delay, and note what each edit does to the comet.
  cards:
    - title: Reshape the tail
      explain: pwm
      body: Edit the falling numbers in `dutys` — add more dim values for a longer tail, or fewer for a shorter one. Predict the shape before you upload.
    - title: Change the speed
      explain: delayMs
      body: Set `delay(100)` to a larger or smaller number and upload. Find the speed where the comet still reads as one moving light.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    confirm the Day 6 circuit first, guide one segment at a time, wait for you to
    confirm, explain terms on request, and always check wiring, board, port, and
    USB before changing code.
  coachInstructions:
    - Start by confirming the Day 6 LED bar is still wired; only eight segments are driven today, and two staying dark is expected.
    - Remind the learner that each driven segment needs its own 220 Ω series resistor — a shared or missing resistor is the common mistake here.
    - If only one segment lights with no tail, suspect Day 6's on/off sketch is still loaded; have the learner upload 04.2 before changing anything else.
    - If a segment in the path stays dark, check that segment's resistor and its jumper to its GPIO pin, not the whole circuit.
    - Explain PWM, the dutys gradient, and the sliding window on request; do not dump theory before the learner has a working comet.
    - Keep the Arduino path primary; MicroPython is optional only if already set up.

