    the same LED bar from Day 6, then upload a sketch that draws one still frame
    at a time — eight brightnesses set at once, a short pause, then the whole
    pattern nudged one step along the bar. Run those frames fast enough and they
    blend into a single gliding comet with a trailing tail. It's the same trick
    your eye plays at the cinema.
  pills:
