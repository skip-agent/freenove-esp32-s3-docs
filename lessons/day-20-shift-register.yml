mission: >
  Wire a 74HC595 shift register between three GPIOs and the LED bar, upload the
  Arduino sketch, and watch a single lit LED flow along the bar and back — eight
  lights driven through one chip from just three pins.
unlocks: A shift register takes a byte over three wires and fans it out to eight outputs, so a handful of pins can drive a whole bank of lights.
seoDescription: >
  Drive an LED bar graph through a 74HC595 shift register on the ESP32-S3. Three
  GPIOs carry a byte to eight outputs, and a lit LED flows along the bar and back.

