mission: >
  Build a working thermometer from a thermistor and a 10 kΩ resistor, upload the
  Arduino sketch, and watch live temperature readings print in Serial Monitor —
  then pinch the bead and see the number climb.
unlocks: The ESP32-S3 can measure temperature by reading how a thermistor's resistance shifts with heat — the divider turns resistance into voltage and four lines of maths turn voltage into degrees.
