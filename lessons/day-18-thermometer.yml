steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Push the thermistor into the breadboard with its two legs in separate rows. {thermistor}
    - Place the 10 kΩ resistor so one leg shares a row with one thermistor leg — that shared row is the divider's midpoint. {voltageDivider}
    - Run a jumper from 3.3V to the resistor's free leg.
    - Run a jumper from the midpoint row to GPIO 1. {adc}
    - Run a jumper from the thermistor's free leg to GND.
    - Compare every wire to the chart, then plug in USB.
    - Open `Sketch_12.1_Thermometer.ino` in Arduino IDE and upload it.
    - Open Serial Monitor and set the baud rate to `115200`. {serial}
    - Pinch the thermistor's bead between two fingers and watch the temperature climb.
  done:
    icon: "🌡️"
    title: Degrees on deck.
    body: Your board is reading real temperature once a second. Head to Test & debug to confirm the numbers make sense.

code:
  intro: >
    The whole loop is four working lines — a chain that walks from a raw ADC
    count to volts, to ohms, to degrees. Switch to MicroPython if you'd rather
    see the same chain in Python; the wiring never changes.
  arduino:
    file: Sketch_12.1_Thermometer.ino
    sketch: C/Sketches/Sketch_12.1_Thermometer/Sketch_12.1_Thermometer.ino
    excerpt: |
      #define PIN_ANALOG_IN   1
      void setup() {
        Serial.begin(115200);
      }

      void loop() {
        int adcValue = analogRead(PIN_ANALOG_IN);                       //read ADC pin
        double voltage = (float)adcValue / 4095.0 * 3.3;                // calculate voltage
        double Rt = 10 * voltage / (3.3 - voltage);                     //calculate resistance value of thermistor
        double tempK = 1 / (1 / (273.15 + 25) + log(Rt / 10) / 3950.0); //calculate temperature (Kelvin)
        double tempC = tempK - 273.15;                                  //calculate temperature (Celsius)
        Serial.printf("ADC value : %d,\tVoltage : %.2fV, \tTemperature : %.2fC\n", adcValue, voltage, tempC);
        delay(1000);
      }
    notes:
      - code: analogRead(PIN_ANALOG_IN)
        text: Reads the divider midpoint on GPIO 1 as a number from 0 to 4095.
        explain: adc
      - code: double Rt = 10 * voltage / (3.3 - voltage)
        text: Works the divider maths backwards to recover the thermistor's resistance in kilo-ohms.
        explain: voltageDivider
      - code: log(Rt / 10) / 3950.0
        text: The B-equation — B is 3950 for this bead — maps that resistance onto temperature in Kelvin; subtracting 273.15 lands it in Celsius.
        explain: thermistor
  micropython:
    file: 11.1_Thermometer/Thermometer.py
    path: Python/Python_Codes/11.1_Thermometer/Thermometer.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      adc=ADC(Pin(1))
      adc.atten(ADC.ATTN_11DB)
      adc.width(ADC.WIDTH_12BIT)

      adcValue=adc.read()
      voltage=adcValue/4095*3.3
      Rt=10*voltage/(3.3-voltage)
      tempK=(1/(1/(273.15+25)+(math.log(Rt/10))/3950))
      tempC=tempK-273.15
    notes:
      - code: adc.atten(ADC.ATTN_11DB)
        text: Opens the pin to the full 0–3.3 V range so the divider's whole swing is readable.
      - code: Rt=10*voltage/(3.3-voltage)
        text: The same divider arithmetic as the Arduino sketch — volts back into kilo-ohms.
    note: >
      Same pin, same maths, same printout. Run it in [Thonny](https://thonny.org) and compare the
      temperature with the Arduino version. If MicroPython isn't set up yet,
      skip this — it should never block the Arduino-first day.

theory:
  title: One curved sensor, four honest lines
  summary: A thermistor's resistance follows a curve as it heats; the divider turns that resistance into a voltage, and the B-equation's logarithm turns the curve back into straight degrees.
  intro: >
    Every analog sensor so far handed the ADC a signal you could rescale with a
    straight line: map() stretched one range onto another and the job was done.
    The thermistor asks for more. Its resistance follows a curve against
    temperature, where the potentiometer and photoresistor tracked something close
    to a straight line — so a plain rescale would land the right degrees at one
    point and drift away on either side. The sketch walks one reading through four
    steps instead, and the last step uses a logarithm to follow that curve.
  flow:
    - n: "Read"
      title: "Count from the pin"
      body: "analogRead samples the divider midpoint on GPIO 1 and returns a count from 0 to 4095. That single number is the whole input."
    - n: "Volts"
      title: "Count to voltage"
      body: "Dividing the count by 4095 and scaling by 3.3 recovers the real voltage sitting at the midpoint, in volts."
    - n: "Ohms"
      title: "Voltage to resistance"
      body: "Running the divider maths backwards, Rt = 10 * V / (3.3 - V) recovers the thermistor's own resistance in kilo-ohms from that voltage."
    - n: "Degrees"
      title: "Resistance to degrees"
      body: "The B-equation feeds that resistance through a logarithm to reach Kelvin, then subtracting 273.15 lands it in Celsius. This curved step is the one the logarithm exists to handle."
  formulaLabel: The chain
  formula: "ADC count → **volts** → **ohms** → **degrees** — and the last arrow follows a curve, so it takes a logarithm"
  notes:
    - title: Why this one needs a formula
      explain: mapValue
      body: "map() draws a straight line between two points, ideal when a sensor rises evenly across its range. A thermistor's resistance follows a curve as it heats, so a straight rescale would match the real temperature at a single point and wander off on either side. The B-equation carries a logarithm that follows the curve, keeping the reading honest from cold to warm."
    - title: Why resistance moves with heat
      explain: thermistor
      body: "A thermistor is made of a material whose electrons flow more freely as it warms, so its resistance drops as temperature rises. At 25 °C this bead sits near 10 kΩ, which is why the sketch's reference values are built around 10 and 25."
    - title: What the 10 kΩ partner does
      explain: voltageDivider
      body: "The ADC measures voltage, and the thermistor only offers a changing resistance. Stacking the fixed 10 kΩ resistor above it makes a divider whose midpoint voltage tracks that resistance — the one form the pin can actually read."

test:
  mode: serial
  intro: >
    Success and recovery sit side by side, so you never have to go hunting when
    something looks off.
  expectedTitle: What you should see
  baud: 115200
  expected:
    - "ADC value : 2185,\tVoltage : 1.76V, \tTemperature : 22.00C"
    - "ADC value : 2100,\tVoltage : 1.69V, \tTemperature : 23.85C"
    - "ADC value : 2048,\tVoltage : 1.65V, \tTemperature : 24.99C"
  expectedNote: A steady room line first — somewhere around 20 to 26 °C. Pinch the bead and the temperature climbs a few degrees; let go and it eases back down.
  checksTitle: If it doesn't
  checks:
    - symptom: "Temperature wildly wrong — near -273 or nan?"
      fix: "Check the midpoint wire on GPIO 1 and that the 10 kΩ resistor is in the divider."
    - symptom: "Values frozen while you pinch?"
      fix: "Reseat the thermistor's legs — one has likely lifted out of its row."
    - symptom: "Garbled text?"
      fix: "Set Serial Monitor to 115200 baud to match the sketch."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: watch the whole chain move"
  railLabel: Try this
  intro: >
    The printout already shows all three links at once — the raw ADC count, the
    voltage, and the temperature. Warming the bead lets you watch them move
    together and trace why. It fits inside today's 25 minutes.
  summary: Pinch the thermistor and watch the ADC count and voltage fall while the temperature climbs, then reason back through resistance to explain why all three move the way they do.
  cards:
    - title: Warm it and watch three numbers
      body: "Let the reading settle at room temperature, then pinch the bead between two fingers. Watch the ADC value and the voltage drop while the temperature rises, and let go to see them ease back. Every printed line carries all three at once."
    - title: Trace it back through resistance
      explain: thermistor
      body: "A warmer bead means lower resistance, which pulls the divider midpoint down — fewer volts, fewer ADC counts. The formula reads that lower resistance as a higher temperature, so the count falling and the degrees rising are one event seen at two ends of the chain."

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical connection at a time, wait for you to confirm, and use the
    printed ADC, voltage, and temperature fields to teach the count-to-resistance-to-degrees
    chain — including why a thermistor's curve takes a formula where earlier
    sensors used map(). Always check wiring, board, port, and USB before changing
    code.
  coachInstructions:
    - Guide one physical connection at a time and wait for learner confirmation before proceeding.
    - The divider's layout is the day's main trap — 10 kΩ to 3.3V, thermistor to GND, and the row where they meet to GPIO 1.
    - Teach the core idea- this sensor's resistance follows a curve, so the sketch uses the B-equation's logarithm to reach degrees, where earlier analog days rescaled a straight line with map().
    - Walk the chain out loud using the printed fields — ADC count to voltage, voltage to resistance, resistance to degrees.
    - A reading near -273 or nan means the divider is open or shorted; check the GPIO 1 midpoint wire and the 10 kΩ resistor before changing code.
    - If values freeze or ignore a pinch, have the learner reseat the thermistor's legs in their breadboard rows.
    - Coach the pinch itself — fingers on the bead so body heat transfers; the ADC count and voltage fall as the temperature climbs a few degrees, which is success.
    - Keep the Arduino path primary; MicroPython is optional only if already set up.

