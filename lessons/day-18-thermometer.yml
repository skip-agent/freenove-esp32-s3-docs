title: "Thermometer: sense temperature"
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Build a thermometer from a thermistor and a 10 kΩ resistor, upload the Arduino
  sketch, and read live temperature in Serial Monitor — then pinch the bead and
  watch the number climb. This is the first sensor whose signal follows a curve,
  so today you learn how four lines of maths walk one raw reading through
  resistance and into honest degrees.
unlocks: You can turn a non-linear sensor into a real-world unit — the divider turns the thermistor's shifting resistance into a voltage the ADC reads, and the B-equation's logarithm follows that curve back into degrees.
seoDescription: >
  Build an ESP32-S3 thermometer with a thermistor and a 10 kΩ voltage divider.
  Wire it, upload the sketch, and read live temperature in Serial Monitor.

