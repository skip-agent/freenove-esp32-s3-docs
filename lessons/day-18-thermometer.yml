wiring:
  intro: >
    The official Freenove diagram is your chart — schematic on top, the same
    circuit built on a breadboard below. Click it to enlarge. Two parts in a
    line make the divider; one wire taps its midpoint.
  diagram:
    image: day-18/circuit-page-123.png
    alt: >-
      Official Freenove circuit for the thermometer: a 10 kilo-ohm resistor from
      3.3V down to GPIO 1, and a thermistor from that same point to ground,
      shown as both a schematic and a breadboard photo.
    caption: Official Freenove circuit — C Tutorial, Chapter 12 (Thermistor), page 123.
    zoomCaption: Official Freenove circuit, C Tutorial Chapter 12, page 123.
    source: { pdf: C_Tutorial.pdf, chapter: 12, chapterTitle: Thermistor, page: 123 }
  pins:
    - { from: 10 kΩ resistor leg, to: 3.3V, why: Feeds the divider from a steady 3.3 volts., explain: voltageDivider }
    - { from: Divider midpoint, to: GPIO 1, why: The ADC pin reads the voltage where resistor meets thermistor., explain: adc }
    - { from: Thermistor far leg, to: GND, why: Completes the divider's path back to zero volts., explain: gnd }
  safety:
    - label: Check before power.
      icon: "⚓"
      body: >
        The thermistor has no polarity — either leg can face either way — but
        the midpoint wire must land on GPIO 1. Unplug USB before you move any
