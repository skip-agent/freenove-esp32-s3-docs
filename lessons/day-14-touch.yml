    - { from: Bare jumper end, to: GPIO 14 (T14), why: The exposed metal tip is the touch pad your fingertip charges., explain: touchPin }
    - { from: LED long leg (+), to: GPIO 21 via 220 Ω, why: This pin holds the lamp on or off between touches., explain: led }
    - { from: LED short leg (−), to: GND, why: Completes the LED's path back to zero volts., explain: gnd }
  safety:
    - label: Keep the touch wire to itself.
