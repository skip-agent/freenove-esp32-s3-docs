steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Place the LED so its long leg (+) is on the GPIO 21 side and its short leg (−) heads toward ground. {led}
    - Put the 220 Ω resistor in series between GPIO 21 and the LED's long leg. {resistor}
    - Push one end of a jumper into GPIO 14 and leave its other end free in the air — that bare metal tip is your touch pad. {touchPin}
    - Compare every wire to the chart, then plug in USB.
    - Open `Sketch_09.1_TouchRead.ino` first, upload it, and open Serial Monitor at 115200 — note the reading when the wire is alone and when you pinch its bare tip. {serial}
    - Open `Sketch_09.2_TouchLamp.ino` and upload it.
    - Tap the bare tip — the LED flips on. Tap again — it flips off. {toggle}
  done:
    icon: "💡"
    title: The wire feels you.
    body: One tap on, one tap off — the board is reading your fingertip directly. Head to Test & debug to confirm the toggle.

code:
  intro: >
    Two sketches today. `Sketch_09.1_TouchRead.ino` is the calibration tool — it
    prints the raw touch reading once a second so you can see your own numbers.
    The lamp itself is 9.2, shown below — two thresholds, a remembered flag, and
    a tiny helper that flips the LED.
  arduino:
    file: Sketch_09.2_TouchLamp.ino
    sketch: C/Sketches/Sketch_09.2_TouchLamp/Sketch_09.2_TouchLamp.ino
    excerpt: |
      #define PIN_LED     21
      #define PRESS_VAL   200000	  //Set a threshold to judge touch
      #define RELEASE_VAL 60000	    //Set a threshold to judge release

      bool isProcessed = false;
      void setup() {
        Serial.begin(115200);
        pinMode(PIN_LED, OUTPUT);
      }
      void loop() {
        if (touchRead(T14) > PRESS_VAL) {
          if (!isProcessed) {
            isProcessed = true;
            Serial.println("Touch detected! ");
            reverseGPIO(PIN_LED);
          }
        }
        if (touchRead(T14) < RELEASE_VAL) {
          if (isProcessed) {
            isProcessed = false;
            Serial.println("Released! ");
          }
        }
      }

      void reverseGPIO(int pin) {
        digitalWrite(pin, !digitalRead(pin));
      }
    notes:
      - code: touchRead(T14)
        text: Measures the charge on touch pin T14, which is GPIO 14 — your fingertip drives this number far higher.
        explain: touchPin
      - code: touchRead(T14) > PRESS_VAL
        text: On this board a reading above 200000 counts as a touch; a reading below 60000 counts as a release.
        explain: threshold
      - code: bool isProcessed
        text: Remembers that the current touch has already been handled, so one tap flips the lamp exactly once.
        explain: toggle
      - code: digitalWrite(pin, !digitalRead(pin))
        text: Reads the LED pin's current state and writes the opposite — the flip itself.
        explain: digitalWrite

theory:
  title: How a bare wire feels your finger
  summary: The pin charges the bare wire and measures the charge it holds; a fingertip adds capacitance, the number climbs, and you compare it to a threshold you pick to decide a touch.
  intro: >
    Before the sketch, the one idea that makes a bare wire work as a sensor. The
    pin is always busy — charging the wire and measuring how much charge it holds,
    thousands of times a second. Your finger changes that measurement, and
    touchRead hands you the result as a plain number you can act on.
  flow:
    - n: "Charge"
      title: "Fill a tiny capacitor"
      body: "The pin pushes a small charge onto the bare wire again and again. The wire holds a little of it — that ability to hold charge is its capacitance."
    - n: "Measure"
      title: "How much it holds"
      body: "Each cycle the pin measures how the charge builds up on the wire. With nothing near, that settles to a steady resting number."
    - n: "Your finger"
      title: "You add capacitance"
      body: "Your body stores charge too. A fingertip near the wire adds its own capacitance, so the wire holds more and the measurement moves."
    - n: "Report"
      title: "touchRead"
      body: "touchRead(T14) returns that measurement as a number. On this board it climbs far past its resting value the instant you touch."
  formulaLabel: The model
  formula: your finger's capacitance lifts the reading past **200000 (press)**; releasing lets it fall below **60000 (release)**
  notes:
    - title: Why no button and no moving part
      explain: touchPin
      body: >
        Nothing presses or closes here. The pin senses the change in its own
        electric field as your finger comes near, so a bare wire — even one behind
        a panel or a sheet of glass — does the whole job. This is the same sensing
        behind phone screens and elevator buttons.
    - title: Why the threshold sits between resting and touched
      explain: threshold
      body: >
        The resting reading and the touched reading are two separated levels, and
        a threshold is any line you draw between them — above it means touched,
        below it means clear. The sketch draws two lines, a high one (PRESS_VAL)
        to call a press and a lower one (RELEASE_VAL) to call release, so a reading
        wavering near a single line can't flip the lamp back and forth.
    - title: On this board a touch pushes the number up
      body: >
        Idle, the pin reads in the tens of thousands; a firm touch climbs past
        200000. Older ESP32 chips reported touch as a drop toward zero, and some
        reference text still describes that — on your S3, trust the thresholds in
        the sketch and the numbers you read yourself.

test:
  mode: visual
  intro: >
    The Serial Monitor is your calibration tool today — the proof is the LED
    answering your fingertip.
  expectedTitle: What you should see
  readoutLabel: LED
  expected:
    - Tap the bare end of the wire — the LED flips on and stays on.
    - Tap it again — the LED flips off.
    - Serial Monitor at 115200 echoes each touch with "Touch detected! " and each let-go with "Released! ".
  expectedNote: This lamp latches — the LED holds its state between taps, with your fingertip doing the whole job of a button.
  checksTitle: If it doesn't
  checks:
    - symptom: "LED never flips?"
      fix: "The thresholds may sit wrong for your setup — upload Sketch_09.1_TouchRead and read your own touched and untouched numbers."
    - symptom: "LED flickers wildly?"
      fix: "Hold the wire by its insulation and touch only the bare metal end, deliberately."
    - symptom: "Nothing on the Serial Monitor?"
      fix: "Set the monitor to 115200 baud, then re-check the board and port selections."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: tune it to your own hand"
  railLabel: Try this
  intro: >
    Same working circuit, two numbers to make your own. The stock thresholds fit
    most hands; yours deserve a proper fit, drawn from readings you take yourself.
    It sits inside today's 25 minutes.
  summary: Print your own idle and touched numbers with Sketch_09.1_TouchRead, pick PRESS_VAL and RELEASE_VAL from the gap you actually see, then tune the lamp to answer only a firm grip.
  cards:
    - title: Read your numbers
      explain: threshold
      body: >
        Upload `Sketch_09.1_TouchRead.ino` — it prints the raw touchRead value
        once a second. Watch the Serial Monitor and write down two readings- the
        wire alone, and your fingertip pinching the bare tip. They sit far apart.
        Set PRESS_VAL a little below your touched number and RELEASE_VAL a little
        above your idle number — you're drawing your own line between the two —
        then re-upload the lamp.
    - title: Demand a firm grip
      body: >
        Raise PRESS_VAL step by step until a light brush does nothing and only a
        firm, deliberate grip flips the lamp. You've just designed how the switch
        should feel.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical connection at a time and wait for confirmation, and make
    sure the learner leaves understanding the mechanism — the pin charges the bare
    wire and measures its capacitance, a fingertip adds more, and a threshold they
    pick from their own readings turns that into a touch. Always check wiring,
    board, port, and USB before changing code.
  coachInstructions:
    - Teach the mechanism plainly- the pin charges the bare wire and measures the charge it holds, a fingertip adds capacitance so the number climbs, and no button or moving part is involved.
    - A threshold is any line drawn between the resting reading and the touched reading; the sketch uses a high one (PRESS_VAL) and a lower one (RELEASE_VAL) so a wavering reading can't flip the lamp back and forth.
    - Reassure the learner there is no sensor module to find — the touch pad is a single bare-ended jumper on GPIO 14.
    - Keep the two pins straight — T14 is GPIO 14 for the touch pad and the LED lives on GPIO 21; never let them swap in conversation or wiring.
    - On this board a touch RAISES the touchRead value (idle in the tens of thousands, touch above 200000); correct any advice claiming readings near zero mean touch.
    - When tuning, have the learner print their own idle and touched numbers with Sketch_09.1_TouchRead and pick PRESS_VAL and RELEASE_VAL from the gap they see, rather than trusting the stock values blindly.
    - If the LED flickers, coach them to hold the jumper by its insulation and touch only the bare metal tip, deliberately.
    - If the Serial Monitor shows nothing, check 115200 baud, the board, and the port before touching code.

