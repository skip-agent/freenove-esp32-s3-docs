# Day 14 — Touch sensor · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-14-touch/), the agent packet, and the course-map entry.
# The first body-as-input day — a bare wire on GPIO 14 senses your fingertip.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY14-TOUCH
day: 14
slug: day-14-touch
title: 'Touch sensor: use your body as input'
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire an LED to GPIO 21, leave one bare jumper on GPIO 14 as a touch pad, and
  upload the sketch that flips the lamp every time your fingertip taps the wire.
  The pad has no button and no moving part — the pin can feel the tiny
  capacitance your body adds when you touch the bare metal. Read your own touched
  and untouched numbers, and you'll see exactly where to draw the line that means
  a touch.
unlocks: You understand how a touch pin charges a bare wire and measures the capacitance your fingertip adds, why that needs no button or moving part, and how to pick a threshold from readings you take yourself.
seoDescription: >
  Build a touch lamp on the ESP32-S3 — a bare jumper on GPIO 14 senses your
  fingertip and toggles an LED on GPIO 21. Calibrate with touchRead, then tune
  the touch and release thresholds to fit your own hand.

