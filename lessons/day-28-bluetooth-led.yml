wiring:
  intro: >
    The official Freenove diagram is your chart — schematic on top, the same
    circuit built on a breadboard below. Click it to enlarge. The circuit is the
    one-LED layout you know from Blink; the command now arrives by radio.
  diagram:
    image: day-28/circuit-page-193.png
    alt: >-
      Official Freenove circuit for Bluetooth Control LED: a single LED on GPIO 2
      through a 220 ohm resistor to ground, shown as both a schematic and a
      breadboard photo.
    caption: Official Freenove circuit — C Tutorial, Chapter 20 (Bluetooth), page 193.
    zoomCaption: Official Freenove circuit, C Tutorial Chapter 20, page 193.
    source: { pdf: C_Tutorial.pdf, chapter: 20, chapterTitle: Bluetooth, page: 193 }
  pins:
    - { from: LED long leg (+), to: GPIO 2 via 220 Ω, why: The pin a matched command drives HIGH or LOW., explain: led }
    - { from: LED short leg (−), to: GND, why: Completes the LED's path back to zero volts., explain: gnd }
  safety:
    - label: Mind the LED's legs.
      icon: "⚓"
      body: >
        The LED only lights one way round — long leg toward GPIO 2 through the
        220 Ω resistor, short leg to ground. Unplug USB before you move any wire.

steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Place the LED so its long leg (+) is on the GPIO 2 side and its short leg (−) heads toward ground. {led}
    - Put the 220 Ω resistor in series between GPIO 2 and the LED's long leg. {resistor}
    - Compare every wire to the chart, then plug in USB.
    - Open `Sketch_20.2_BluetoothToLed.ino` in Arduino IDE and upload it.
    - Open Serial Monitor at `115200` and look for the "device started" line. {serial}
    - On your phone, open LightBlue and connect to `ESP32S3_Bluetooth`, exactly as you did on Day 27. {ble}
    - Find the write characteristic, set the format to utf-string, and write `led_on` — underscore, exact spelling. {bleCharacteristic}
    - Watch the LED light, then write `led_off` to put it out.
  done:
    icon: "📡"
    title: The phone is the helm now.
    body: A word typed in the air just moved a pin. Head to Test & debug to confirm both commands.

code:
  intro: >
    The BLE plumbing at the top of this sketch is Day 27's, line for line — the
    same service, the same name, and the same callback that copies each incoming
    write into rxload. Today's new idea lives in loop, where the board reads that
    buffer, matches it against two known commands, and drives the pin. Switch to
    MicroPython to see the same idea in Python — the wiring never changes.
  arduino:
    file: Sketch_20.2_BluetoothToLed.ino
    sketch: C/Sketches/Sketch_20.2_BluetoothToLed/Sketch_20.2_BluetoothToLed.ino
    excerpt: |
      #define LED 2

      void setup() {
        pinMode(LED, OUTPUT);
        setupBLE("ESP32S3_Bluetooth");
        Serial.begin(115200);
        Serial.println("\nThe device started, now you can pair it with Bluetooth!");
      }

      void loop() {
        long now = millis();
        if (now - lastMsg > 100) {
          if (deviceConnected && strlen(rxload) > 0) {
            if (strncmp(rxload, "led_on", 6) == 0) {
              digitalWrite(LED, HIGH);
            }
            if (strncmp(rxload, "led_off", 7) == 0) {
              digitalWrite(LED, LOW);
            }
            Serial.println(rxload);
            memset(rxload,0,sizeof(rxload));
          }
          lastMsg = now;
        }
      }
    notes:
      - code: setupBLE("ESP32S3_Bluetooth")
        text: Starts the same radio as Day 27 and registers the callback that fires on every write, so an arriving command lands in rxload without the loop asking for it.
        explain: ble
      - code: 'strncmp(rxload, "led_on", 6) == 0'
        text: Reads the mailbox and tests whether the first six characters spell led_on, underscore included — the match is what turns a received value into a command.
        explain: bleCharacteristic
      - code: digitalWrite(LED, HIGH)
        text: The matched command drives GPIO 2 HIGH and the LED lights; led_off drives it LOW — the moment the phone's word becomes a voltage.
        explain: digitalWrite
      - code: Serial.println(rxload)
        text: Echoes each received command to Serial Monitor, so you can watch the word arrive at the same instant the LED obeys.
        explain: serial
  micropython:
    file: 19.2_BLE_LED/BLE_LED.py
    path: Python/Python_Codes/19.2_BLE_LED/BLE_LED.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      led=Pin(2,Pin.OUT)

      def on_rx(rx_data):
          print("Received: ", rx_data)
          if rx_data == b'led_on':
              led.value(1)
          elif rx_data == b'led_off':
              led.value(0)
    notes:
      - code: rx_data == b'led_on'
        text: The on_rx function IS the callback here — it compares the whole received bytes to the exact command, where the Arduino sketch checks only the front of the buffer.
      - code: led.value(1)
        text: Drives GPIO 2 HIGH and the LED lights.
    note: >
      Same pin, same wiring. Copy `ble_advertising.py` onto the board alongside
      this file. The Python version broadcasts as `ESP32S3`, so look for that
      name in LightBlue. Run it in Thonny if MicroPython is set up; otherwise
      skip it — it should never block the Arduino-first path.

theory:
  title: How a command becomes an action
  summary: A value the phone writes into the board's mailbox trips a callback, and the arriving bytes drive the pin — a control loop closed over the air.
  intro: >
    Day 27 opened a pipe: a value could travel from your phone into the board.
    Day 4 gave you digitalWrite, a value that moves a pin. Today the two ends
    meet. The write characteristic is a mailbox the phone drops a value into; a
    callback you registered is the doorbell that fires the instant it lands; and
    the bytes that arrive decide what the pin does. That is remote control, and
    the shape underneath is event-driven — the board stays ready and does work
    only when a message arrives.
  flow:
    - n: "Mailbox"
      title: "The write characteristic"
      body: "LightBlue writes your text into the board's RX characteristic, a named slot the board offers for exactly this. The phone drops a value in, and the board decides what that value means."
    - n: "Doorbell"
      title: "A callback fires"
      body: "setupBLE handed the radio a standing instruction: when a write arrives, run this. The moment your phone sends, the radio runs it and copies the incoming bytes into rxload. The board waits, ready, and the arrival itself wakes it."
    - n: "Match"
      title: "Two known words"
      body: "The loop reads rxload and compares it against led_on and led_off with strncmp. Whatever matches becomes a command, and the rest is text that scrolls past."
    - n: "Act"
      title: "The pin follows"
      body: "A matched command calls digitalWrite on GPIO 2 — HIGH lights the LED, LOW puts it out. The value that left your phone is now a voltage on a wire."
  formulaLabel: The loop
  formula: "phone writes the characteristic → **callback fires** → match a known word → digitalWrite"
  notes:
    - title: Woken by the arrival
      body: The radio holds your callback and fires it the instant a write lands, so the board spends its time ready and acts only when a message comes. That is event-driven control, and it scales — one board can hold many callbacks, each waiting for its own message.
    - title: Why spelling is the whole protocol
      explain: bleCharacteristic
      body: The board compares raw characters. led_on with an underscore is a command; any other spelling is text that arrives, gets echoed, and leaves the LED where it was. The meaning lives in the match, so both ends must agree on the words.
    - title: The radio only carries bytes
      explain: ble
      body: BLE moves the characters and nothing more. Which words count as commands, and what each one does, lives entirely in the sketch — the same bytes could dim a light, log a reading, or steer a motor.

test:
  mode: visual
  intro: >
    The proof is the LED obeying your phone — Serial Monitor backs it up by
    echoing each command as it lands.
  expectedTitle: What you should see
  readoutLabel: LED
  expected:
    - Write led_on in LightBlue (utf-string format) — the LED lights.
    - Write led_off — the LED goes dark.
    - Any other text leaves the LED exactly as it was — the sketch only acts on its two known commands.
  expectedNote: >
    Serial Monitor at 115200 shows "The device started, now you can pair it with
    Bluetooth!" on boot, then echoes every command the board receives.
  checksTitle: If it doesn't
  checks:
    - symptom: "LED never reacts?"
      fix: "Send the underscore spelling led_on exactly, in utf-string format."
    - symptom: "LED wired but dead?"
      fix: "Long leg to GPIO 2 through the 220 Ω resistor, short leg to GND."
    - symptom: "Can't find the board?"
      fix: "Repeat Day 27's LightBlue steps, and press reset before reconnecting."
    - symptom: "Monitor blank?"
      fix: "Set the baud rate to 115200."

challenge:
  title: "Try this: map values to the light"
  railLabel: Try this
  intro: >
    Same working circuit, one new question — what should each value the phone
    sends mean? First watch which values the board acts on, then turn the light
    from a switch into a dial. Both fit inside today's 25 minutes.
  summary: Send several values from LightBlue and watch which ones become actions, then add a PWM branch that reads the received value as a brightness so the phone dials the light.
  cards:
    - title: Send values, watch the map
      explain: bleCharacteristic
      body: In LightBlue, write led_on and led_off, then near-misses like LED_ON, Led_on, and ledon. Serial Monitor echoes every one as it lands — proof the callback caught it — while the LED moves only for the two exact commands. You are watching the map from a received value to an action, where the board acts on the values it knows and lets the rest pass by.
    - title: Turn words into brightness
      explain: ledc
      body: Attach GPIO 2 to a PWM channel once, then add a branch that reads the received text as a number from 0 to 255 and calls ledcWrite with it. Send 0, 64, and 255 from your phone and the light dims and brightens — the value you type maps straight onto brightness, so the phone becomes a dimmer.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical step at a time, wait for confirmation, and teach the
    control loop plainly — a value written into the characteristic trips a
    callback that drives the pin. Always check wiring, board, port, and USB
    before changing code, and use Serial Monitor to separate a delivery problem
    from a wiring one.
  coachInstructions:
    - Guide one physical step at a time and wait for learner confirmation before proceeding.
    - Teach the core loop — the phone writes a value into the write characteristic, a callback the sketch registered fires on arrival and copies it into rxload, then the loop matches it and calls digitalWrite; the arrival wakes the board, which is what makes it event-driven control.
    - The commands are led_on and led_off with underscores, written as utf-string; the manual's captions show hyphens and are wrong — always follow the code, never print the hyphen form.
    - If the LED never reacts, check Serial Monitor at 115200 first — an echoed command with a dark LED points at wiring on GPIO 2; no echo points at the phone side or the spelling.
    - If the LED is wired but dead, confirm long leg to GPIO 2 through the 220 Ω resistor and short leg to GND before changing code.
    - If the phone can't find the board, repeat Day 27's LightBlue connection steps and have the learner press reset before reconnecting.
    - Keep the Arduino path primary; the MicroPython version's on_rx is the same callback, it broadcasts as ESP32S3, and it matches each command byte-for-byte, so expect those differences.

