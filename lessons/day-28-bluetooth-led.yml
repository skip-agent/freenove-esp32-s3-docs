wiring:
  intro: >
    The official Freenove diagram is your chart — schematic on top, the same
    circuit built on a breadboard below. Click it to enlarge. The circuit is the
    one-LED layout you know from Blink; the command now arrives by radio.
  diagram:
    image: day-28/circuit-page-193.png
    alt: >-
      Official Freenove circuit for Bluetooth Control LED: a single LED on GPIO 2
      through a 220 ohm resistor to ground, shown as both a schematic and a
      breadboard photo.
    caption: Official Freenove circuit — C Tutorial, Chapter 20 (Bluetooth), page 193.
    zoomCaption: Official Freenove circuit, C Tutorial Chapter 20, page 193.
    source: { pdf: C_Tutorial.pdf, chapter: 20, chapterTitle: Bluetooth, page: 193 }
  pins:
    - { from: LED long leg (+), to: GPIO 2 via 220 Ω, why: This pin obeys the command your phone sends., explain: led }
    - { from: LED short leg (−), to: GND, why: Completes the LED's path back to zero volts., explain: gnd }
  safety:
    - label: Mind the LED's legs.
      icon: "⚓"
      body: >
        The LED only lights one way round — long leg toward GPIO 2 through the
        220 Ω resistor, short leg to ground. Unplug USB before you move any wire.

steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Place the LED so its long leg (+) is on the GPIO 2 side and its short leg (−) heads toward ground. {led}
    - Put the 220 Ω resistor in series between GPIO 2 and the LED's long leg. {resistor}
    - Compare every wire to the chart, then plug in USB.
    - Open `Sketch_20.2_BluetoothToLed.ino` in Arduino IDE and upload it.
    - Open Serial Monitor at `115200` and look for the "device started" line. {serial}
    - On your phone, open LightBlue and connect to `ESP32S3_Bluetooth`, exactly as you did on Day 27. {ble}
    - Find the write characteristic, set the format to utf-string, and write `led_on` — underscore, exact spelling. {bleCharacteristic}
    - Watch the LED light, then write `led_off` to put it out.
  done:
    icon: "📡"
    title: The phone is the helm now.
    body: A word typed in the air just moved a pin. Head to Test & debug to confirm both commands.

code:
  intro: >
    The BLE plumbing at the top of this sketch is Day 27's, line for line — same
    service, same name. Today's new idea lives in loop, where the board compares
    whatever arrived against two known commands and acts. Switch to MicroPython
    if you'd rather see the same idea in Python — the wiring never changes.
  arduino:
    file: Sketch_20.2_BluetoothToLed.ino
    sketch: C/Sketches/Sketch_20.2_BluetoothToLed/Sketch_20.2_BluetoothToLed.ino
    excerpt: |
      #define LED 2

      void setup() {
        pinMode(LED, OUTPUT);
        setupBLE("ESP32S3_Bluetooth");
        Serial.begin(115200);
        Serial.println("\nThe device started, now you can pair it with Bluetooth!");
      }

      void loop() {
        long now = millis();
        if (now - lastMsg > 100) {
          if (deviceConnected && strlen(rxload) > 0) {
            if (strncmp(rxload, "led_on", 6) == 0) {
              digitalWrite(LED, HIGH);
            }
            if (strncmp(rxload, "led_off", 7) == 0) {
              digitalWrite(LED, LOW);
            }
            Serial.println(rxload);
            memset(rxload,0,sizeof(rxload));
          }
          lastMsg = now;
        }
      }
    notes:
      - code: setupBLE("ESP32S3_Bluetooth")
        text: The same radio setup as Day 27 — the board advertises under the same name, with the same service underneath.
        explain: ble
      - code: 'strncmp(rxload, "led_on", 6) == 0'
        text: True when the first six characters the phone wrote spell led_on — underscore included. The buffer rxload holds whatever landed in the write characteristic.
        explain: bleCharacteristic
      - code: digitalWrite(LED, HIGH)
        text: The matched command drives GPIO 2 HIGH and the LED lights; led_off drives it LOW again.
        explain: digitalWrite
      - code: Serial.println(rxload)
        text: Echoes every received command to Serial Monitor, so you can watch the words arrive as the LED obeys.
        explain: serial
  micropython:
    file: 19.2_BLE_LED/BLE_LED.py
    path: Python/Python_Codes/19.2_BLE_LED/BLE_LED.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      led=Pin(2,Pin.OUT)

      def on_rx(rx_data):
          print("Received: ", rx_data)
          if rx_data == b'led_on':
              led.value(1)
          elif rx_data == b'led_off':
              led.value(0)
    notes:
      - code: rx_data == b'led_on'
        text: Compares the received bytes to the exact command — every character must match, where the Arduino sketch checks only the front of the buffer.
      - code: led.value(1)
        text: Drives GPIO 2 HIGH and the LED lights.
    note: >
      Same pin, same wiring. Copy `ble_advertising.py` onto the board alongside
      this file. The Python version broadcasts as `ESP32S3`, so look for that
      name in LightBlue. Run it in Thonny if MicroPython is set up; otherwise
      skip it — it should never block the Arduino-first path.

theory:
  title: The shape of a command
  summary: The board reads whatever arrived, compares it to two known words, and acts — the shape of every command protocol.
  intro: >
    Day 27 gave you a pipe between phone and board. Day 4 gave you digitalWrite.
    Put them together and you have remote control — and the pattern in today's
    loop is the skeleton of every protocol you'll ever meet.
  flow:
    - { n: Send, title: Phone writes, body: LightBlue writes your text into the board's write characteristic. }
    - { n: Receive, title: Buffer fills, body: The sketch copies the incoming bytes into rxload. }
    - { n: Compare, title: Two known words, body: strncmp checks the buffer against led_on and led_off. }
    - { n: Act, title: Pin moves, body: digitalWrite drives GPIO 2 HIGH or LOW and the LED follows. }
  formulaLabel: The model
  formula: phone text → **match a known command** → digitalWrite
  notes:
    - title: Why spelling is the whole protocol
      explain: bleCharacteristic
      body: The board compares raw characters. led_on with an underscore is a command; anything else is just text that scrolls past, and the LED holds its state.
    - title: What the radio adds
      explain: ble
      body: BLE only carries the bytes. The meaning — which words count as commands and what they do — lives entirely in the sketch you wrote.

test:
  mode: visual
  intro: >
    The proof is the LED obeying your phone — Serial Monitor backs it up by
    echoing each command as it lands.
  expectedTitle: What you should see
  readoutLabel: LED
  expected:
    - Write led_on in LightBlue (utf-string format) — the LED lights.
    - Write led_off — the LED goes dark.
    - Any other text leaves the LED exactly as it was — the sketch only acts on its two known commands.
  expectedNote: >
    Serial Monitor at 115200 shows "The device started, now you can pair it with
    Bluetooth!" on boot, then echoes every command the board receives.
  checksTitle: If it doesn't
  checks:
    - symptom: "LED never reacts?"
      fix: "Send the underscore spelling led_on exactly, in utf-string format."
    - symptom: "LED wired but dead?"
      fix: "Long leg to GPIO 2 through the 220 Ω resistor, short leg to GND."
    - symptom: "Can't find the board?"
      fix: "Repeat Day 27's LightBlue steps, and press reset before reconnecting."
    - symptom: "Monitor blank?"
      fix: "Set the baud rate to 115200."

challenge:
  title: "Try this: grow the protocol"
  railLabel: Try this
  intro: >
    Same working circuit, one new power: you decide what the commands are. It
    fits inside today's 25 minutes.
  summary: Add a third command that blinks the LED twice, rename the commands to your own words, and note the exact spelling discipline a protocol demands.
  cards:
    - title: Add led_blink
      explain: digitalWrite
      body: Add a third strncmp branch for `led_blink` that flashes the LED twice — HIGH, a short delay, LOW, and again. Upload and send your new word.
    - title: Rename the commands
      body: Change `led_on` and `led_off` to words of your own — keep the character counts in each strncmp honest — and drive the light with your own vocabulary.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical step at a time, wait for you to confirm, explain terms on
    request, and always check wiring, board, port, and USB before changing code.
  coachInstructions:
    - Guide one physical step at a time and wait for learner confirmation before proceeding.
    - The commands are led_on and led_off with underscores, written as utf-string; the manual's captions show hyphens and are wrong — always follow the code, never print the hyphen form.
    - If the LED never reacts, check Serial Monitor at 115200 first — an echoed command with a dark LED points at wiring on GPIO 2; no echo points at the phone side or the spelling.
    - If the LED is wired but dead, confirm long leg to GPIO 2 through the 220 Ω resistor and short leg to GND before changing code.
    - If the phone can't find the board, repeat Day 27's LightBlue connection steps and have the learner press reset before reconnecting.
    - Keep the Arduino path primary; the MicroPython version broadcasts as ESP32S3 and matches each command byte-for-byte, so expect those two differences.

