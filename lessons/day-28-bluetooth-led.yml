# Day 28 — Bluetooth control an LED · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-28-bluetooth-led/), the agent packet, and the course-map entry.
# The first remote-control day — a phone command drives an output pin.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY28-BTLED
day: 28
slug: day-28-bluetooth-led
title: Switch an LED from your phone
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire one LED to GPIO 2, upload the Bluetooth sketch, and switch the light from
  your phone — write led_on and led_off in LightBlue and watch a value sent over
  the air trip a callback on the board and drive the pin. Today your words close
  a control loop with no wire between you and the board.
unlocks: You understand how a value written from your phone becomes an action — it lands in a BLE characteristic, trips a callback, and drives a pin — the event-driven pattern behind every remote control.
seoDescription: >
  Control an LED on the ESP32-S3 from your phone over Bluetooth. Wire one LED,
  upload the sketch, and send led_on and led_off from LightBlue to switch the
  light wirelessly.

hero:
  instrument: none
  headline: Switch the light|from your {phone}
  lede: >
    Today your words start moving hardware. You wire a single LED and upload a
    sketch that waits over Bluetooth for two exact commands — write led_on and it
    lights, led_off and it goes dark. Underneath, each word lands in a mailbox on
    the board, trips a callback, and drives the pin, so the board acts the instant
    your message arrives. Yesterday's pipe now carries orders.
  pills:
    - { text: About 25 minutes, key: true }
    - Arduino first
    - MicroPython optional
    - Same one-LED circuit as Blink

