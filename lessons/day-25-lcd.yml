tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire the LCD1602's four backpack pins to the board, install the bundled I2C
  library once, upload the Arduino sketch, and read "hello, world!" plus a live
  seconds counter on the glass — your project's first screen.
unlocks: Two signal wires can carry a whole screen, so anything the project measures can be shown right on the device.
seoDescription: >
  Wire the I2C LCD1602 module to the ESP32-S3, install the LiquidCrystal_I2C
  library, and display "hello, world!" with a live seconds counter — a whole
  sixteen-by-two screen driven over two signal wires.

