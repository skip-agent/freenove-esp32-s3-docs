# Day 25 — LCD1602 · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-25-lcd/), the agent packet, and the course-map entry.
# The first display day — two signal wires carry a whole screen over I2C.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY25-LCD
day: 25
slug: day-25-lcd
title: "LCD1602: give the project a display"
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire the LCD1602's four backpack pins, add the bundled I2C library once, and
  upload the sketch that greets you on the top row while the bottom row counts
  seconds. The real prize is the idea underneath: how two shared wires can drive
  a whole screen, and how the board reaches this display by a number so that many
  devices could hang off those same two wires. That bus is how most screens and
  sensors will attach to your project from here on.
unlocks: You understand the I2C bus — two shared wires, each device reached by its own address — and can place your own text anywhere on a sixteen-by-two screen.
seoDescription: >
  Wire the I2C LCD1602 module to the ESP32-S3, install the LiquidCrystal_I2C
  library, and display "hello, world!" with a live seconds counter — a whole
  sixteen-by-two screen driven over two signal wires.

