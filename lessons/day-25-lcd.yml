    Today the project gets a face. You wire the LCD1602's four pins to the board,
    add one library to the Arduino IDE, and upload a sketch that greets you on the
    top row while the bottom row counts the seconds. The screen rides on just two
    signal wires — a shared bus the board could hang many more devices off, each
