wiring:
  intro: >
    The official Freenove diagram is your chart — schematic on top, the same
    circuit built on a breadboard below. Click it to enlarge. Four wires today,
    all from the little backpack board soldered to the back of the screen.
  diagram:
    image: day-25/circuit-page-165.png
    alt: >-
      Official Freenove circuit for the LCD1602: the module's I2C backpack wired
      with four jumpers — GND to ground, VCC to 5V, SDA to GPIO 14, and SCL to
      GPIO 13 — shown as both a schematic and a breadboard photo.
    caption: Official Freenove circuit — C Tutorial, Chapter 18 (LCD1602), page 165.
    zoomCaption: Official Freenove circuit, C Tutorial Chapter 18, page 165.
    source: { pdf: C_Tutorial.pdf, chapter: 18, chapterTitle: LCD1602, page: 165 }
  pins:
    - { from: LCD GND, to: GND, why: Gives the module the same zero-volt reference as the board., explain: gnd }
    - { from: LCD VCC, to: 5V, why: The screen and its backlight run on the full five volts. }
    - { from: LCD SDA, to: GPIO 14, why: The data wire — every character rides in on this line., explain: i2c }
    - { from: LCD SCL, to: GPIO 13, why: The clock wire that keeps sender and screen in step., explain: i2c }
  safety:
    - label: Mind the 5V pin.
      icon: "⚓"
      body: >
        The module's VCC wants the board's 5V pin — on 3.3V the display runs faint
        or dark. Unplug USB before you move any wire.

steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Turn the LCD module over and find the four labelled pins on its backpack — GND, VCC, SDA, SCL. {lcd1602}
    - Slide female jumper ends onto GND and VCC, then land them on the board's GND and 5V pins.
    - Wire SDA to GPIO 14 and SCL to GPIO 13. {i2c}
    - Compare every wire to the chart before you plug in USB.
    - In Arduino IDE choose Sketch → Include Library → Add .ZIP Library… and pick [`LiquidCrystal_I2C-1.1.2.zip`](https://github.com/Freenove/Freenove_Super_Starter_Kit_for_ESP32_S3/blob/main/C/Libraries/LiquidCrystal_I2C-1.1.2.zip) from the kit download's `C/Libraries` folder — you install it once and it stays. {arduino}
    - Open `Sketch_18.1_Display_the_string_on_LCD1602.ino` and upload it. (`Wire.h`, the I2C library, ships with the board package.)
    - Watch row 0 greet you and row 1 start counting seconds.
  done:
    icon: "🖥️"
    title: The project has a face.
    body: The screen is greeting you and counting on its own. Head to Test & debug to confirm both rows.

code:
  intro: >
    The sketch does its real work in setup — start the I2C bus, find the display's
    address, wake it, and print the greeting. The loop then rewrites row 1 once a
    second with the count. Switch to MicroPython if you'd rather see the same idea
    in Python — the wiring never changes.
  arduino:
    file: Sketch_18.1_Display_the_string_on_LCD1602.ino
    sketch: C/Sketches/Sketch_18.1_Display_the_string_on_LCD1602/Sketch_18.1_Display_the_string_on_LCD1602.ino
    excerpt: |
      #include <LiquidCrystal_I2C.h>
      #include <Wire.h>

      #define SDA 14                    //Define SDA pins
      #define SCL 13                    //Define SCL pins

      /*
       * note:If lcd1602 uses PCF8574T, IIC's address is 0x27,
       *      or lcd1602 uses PCF8574AT, IIC's address is 0x3F.
      */
      LiquidCrystal_I2C lcd(0x27,16,2);
      void setup() {
        Wire.begin(SDA, SCL);           // attach the IIC pin
        if (!i2CAddrTest(0x27)) {
          lcd = LiquidCrystal_I2C(0x3F, 16, 2);
        }
        lcd.init();                     // LCD driver initialization
        lcd.backlight();                // Open the backlight
        lcd.setCursor(0,0);             // Move the cursor to row 0, column 0
        lcd.print("hello, world!");     // The print content is displayed on the LCD
      }

      void loop() {
        lcd.setCursor(0,1);             // Move the cursor to row 1, column 0
        lcd.print("Counter:");          // The count is displayed every second
        lcd.print(millis() / 1000);
        delay(1000);
      }

      bool i2CAddrTest(uint8_t addr) {
        Wire.beginTransmission(addr);
        if (Wire.endTransmission() == 0) {
          return true;
        }
        return false;
      }
    notes:
      - code: Wire.begin(SDA, SCL)
        text: Starts the I2C bus with GPIO 14 as the data line and GPIO 13 as the clock.
        explain: i2c
      - code: LiquidCrystal_I2C lcd(0x27,16,2)
        text: Names the display by its bus address — 16 columns, 2 rows. If nothing answers at 0x27, i2CAddrTest lets the sketch switch to 0x3F by itself.
        explain: lcd1602
      - code: lcd.setCursor(0,1)
        text: Parks the cursor at column 0 of row 1 so the next print lands on the bottom row.
      - code: lcd.print(millis() / 1000)
        text: Prints the seconds since the board booted — the running count you see tick.
        explain: millis
  micropython:
    file: 17.1_IIC_LCD1602/IIC_LCD1602.py
    path: Python/Python_Codes/17.1_IIC_LCD1602/IIC_LCD1602.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      i2c = I2C(scl=Pin(13), sda=Pin(14), freq=400000)
      devices = i2c.scan()
      lcd = I2cLcd(i2c, device, 2, 16)

      lcd.move_to(0, 0)
      lcd.putstr("Hello,world!")
      count = 0
      while True:
          lcd.move_to(0, 1)
          lcd.putstr("Counter:%d" %(count))
          time.sleep_ms(1000)
          count += 1
    notes:
      - code: devices = i2c.scan()
        text: Asks every address on the bus and uses whichever one answers — the same job the Arduino sketch's address test does.
      - code: lcd.putstr("Counter:%d" %(count))
        text: Rewrites row 1 with the running count once a second.
    note: >
      Same pins, same wiring. This path needs two helper modules — `I2C_LCD.py`
      and `LCD_API.py` from the same kit folder — copied onto the board before it
      runs. Run it in [Thonny](https://thonny.org) if MicroPython is set up; otherwise skip it — it
      should never block the Arduino-first path.

theory:
  title: One bus, two wires, devices by address
  summary: "I2C lets the board drive a whole screen over two shared wires — one for data, one for a clock — by opening every message with the display's address. The backpack chip turns those messages into the many signals a bare LCD needs."
  intro: >
    A bare LCD1602 has a row of pins that each carry one signal, and driving it
    directly means wiring about a dozen of them. The little backpack on the back
    trades that for two wires by putting the display on an I2C bus — the same
    two-wire scheme most screens and sensors use. Understanding the bus is worth
    more than today's circuit, because you'll meet it again and again.
  flow:
    - n: "1 · The problem"
      title: "A dozen pins"
      body: "A bare character LCD expects a fistful of parallel wires, one per signal. Wiring that by hand for every display would fill the board fast."
    - n: "2 · The bus"
      title: "Two shared wires"
      body: "The backpack chip takes bytes over just two lines: SDA carries the data one bit at a time, and SCL is a clock that ticks so both ends agree when each bit counts."
    - n: "3 · Who talks"
      title: "Board asks, device answers"
      body: "The board is the one that starts every exchange. Devices sit on the bus and listen, and reply only when they're spoken to — so many can share the same two wires without talking over each other."
    - n: "4 · By name"
      title: "The address"
      body: "The board opens each message with a number — the device's address. This display answers to 0x27 (some boards to 0x3F). Send to the wrong number and the display never hears its name, so the screen stays blank."
    - n: "5 · Placing text"
      title: "Row and column"
      body: "Once it's addressed and awake, the LCD holds a grid of sixteen columns by two rows. You set a cursor to a row and column, then print, and the characters land at that spot."
  formulaLabel: The model
  formula: "a dozen pins → **two shared wires** → the right **address** → cursor at row and column → characters"
  notes:
    - title: Another kind of serial
      explain: serial
      body: The bits travel single file down SDA the way they travel down USB to your Serial Monitor. The extra wire, SCL, is a shared clock that tells both ends exactly when to read each bit — which is what lets several devices share one pair of lines.
    - title: Why the address can be one of two
      explain: i2c
      body: The backpack's PCF8574T chip answers at 0x27, while the PCF8574AT version answers at 0x3F. The sketch pings 0x27 first, and when nothing replies it switches to 0x3F on its own — a small demonstration that a wrong address means silence.

test:
  mode: visual
  intro: >
    Nothing prints to the Serial Monitor today — the proof is written on the
    glass in front of you.
  expectedTitle: What you should see
  readoutLabel: LCD
  expected:
    - Row 0 shows "hello, world!" as soon as the sketch starts.
    - 'Row 1 shows "Counter:" followed by the seconds since the board booted.'
    - The number ticks up once a second for as long as the board has power.
  expectedNote: A glowing backlight with blank rows is normal at first — the contrast dial on the back of the module sets whether characters show, and it often ships turned too far.
  checksTitle: If it doesn't
  checks:
    - symptom: "Backlight on but no characters?"
      fix: "Turn the small contrast dial on the back of the module slowly until the text appears."
    - symptom: "Nothing at all — no glow?"
      fix: "Check the VCC and GND pair first, then SDA on GPIO 14 and SCL on GPIO 13."
    - symptom: "Compile fails on LiquidCrystal_I2C.h?"
      fix: "The library step was skipped — add the kit's ZIP via Sketch → Include Library → Add .ZIP Library…"
    - symptom: "Counter frozen?"
      fix: "Re-upload the sketch, then press the board's reset button."

challenge:
  title: "Try this: drive the grid, then reason about the address"
  railLabel: Try this
  intro: >
    Same working circuit. The first two cards make the row-and-column model real
    by putting your own text exactly where you want it. The last one asks you to
    predict what the bus does when the address is wrong — no wiring change needed.
  summary: Put your own text on row 0, then centre a word by column using setCursor, then reason through what a wrong address would do to the screen.
  cards:
    - title: Name the boat
      explain: lcd1602
      body: Change `lcd.print("hello, world!")` to your boat's name and upload. Row 0 is yours now — the greeting was only ever text you were free to replace.
    - title: Place it by column
      body: "Before that print, add `lcd.setCursor(4,0)` and upload again. The word now starts four columns in. Try other numbers from 0 to 15 and watch the text slide along the row — that pair is column then row, the display's whole coordinate system."
    - title: Predict a wrong address
      explain: i2c
      body: "The sketch tries 0x27, and if nothing answers it falls back to 0x3F. Ask yourself: if you forced the address to a number no device on your bus uses, what would the screen do — and why? Then look back at the backlight-on-but-blank case in Test & debug and see if your reasoning matches."

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical connection at a time and wait for confirmation, then teach
    the I2C bus behind the circuit — two shared wires, a clock, and each device
    reached by its own address. Always check wiring, board, port, and USB before
    changing code.
  coachInstructions:
    - Guide one backpack pin at a time — GND, VCC to 5V, SDA to GPIO 14, SCL to GPIO 13 — and wait for learner confirmation before proceeding.
    - Land the core idea — I2C carries the whole screen over two shared wires (SDA data, SCL clock), and the board reaches this display by its address (0x27, some at 0x3F); a wrong address means the display never answers and the screen stays blank.
    - Make the row-and-column model concrete — the display is a grid sixteen columns wide and two rows tall, and setCursor takes column then row, so text lands wherever they point the cursor before printing.
    - The top gotcha is the contrast dial; a lit backlight with blank rows means turn the dial on the back of the module, never a code change.
    - If nothing glows at all, check VCC on the 5V pin and GND before touching the signal wires or the sketch.
    - A compile error naming LiquidCrystal_I2C.h means the ZIP library step was skipped — walk them through Sketch → Include Library → Add .ZIP Library… with the kit's LiquidCrystal_I2C-1.1.2.zip.
    - Swapped SDA and SCL look like a dead screen with a working backlight — confirm SDA is on GPIO 14 and SCL on GPIO 13 before suspecting the module.
    - Leave the 0x27/0x3F address logic alone — the sketch tests 0x27 and falls back to 0x3F on its own; restore the auto-test if the learner has hand-edited an address.
    - Keep the Arduino path primary; MicroPython is optional only if already set up, and it additionally needs I2C_LCD.py and LCD_API.py copied to the board.

