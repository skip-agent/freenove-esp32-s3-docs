    - { from: Pot outer pin 2, to: GND, why: Holds the other end of the track at zero volts., explain: gnd }
    - { from: Pot middle pin 3, to: GPIO 14, why: The wiper delivers the in-between voltage for the ADC to read., explain: adc }
    - { from: Servo signal (orange), to: GPIO 21, why: Carries the timing pulse that names the horn's angle., explain: pulseWidth }
    - { from: Servo VCC (red), to: 5V, why: Powers the servo's motor and gears., explain: servo }
