mission: >
  Wire a rotary potentiometer to GPIO 14 and a servo to GPIO 21, upload the
  Arduino sketch, and steer the servo's horn by hand — the knob's raw reading
  and its mapped angle stream to Serial Monitor as proof of the conversion.
unlocks: An analogue input can drive an analogue output — one map() call joins any sensor reading to any actuator range.
