# Day 24 — Servo knob · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-24-servo-knob/), the agent packet, and the course-map entry.
# Day 13's knob meets Day 23's servo — two map() calls join reading to angle.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY24-SERVOKNOB
day: 24
slug: day-24-servo-knob
title: "Servo knob: control position with a knob"
status: published
estimatedTimeMinutes: 20
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire a rotary potentiometer to GPIO 14 and a servo to GPIO 21, upload the
  Arduino sketch, and steer the servo's horn by hand. The deeper lesson is
  underneath the fun- an input and an output live on different number scales,
  and one map() call is the joint that lets either drive the other. The knob's
  raw reading and its mapped angle stream to Serial Monitor so you can watch the
  translation happen line by line.
unlocks: You can join any analogue sensor to any actuator- map() rescales one range onto the other, and reading then writing every loop makes the output track the input live.
seoDescription: >
  Wire a rotary potentiometer and a servo to the ESP32-S3, upload the sketch,
  and steer the servo horn with the knob while Serial Monitor prints the raw
  reading and the mapped angle side by side.

