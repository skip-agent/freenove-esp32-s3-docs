steps:
  intro: >
    This is the main path — you can finish the day without opening a single
    field note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Push the potentiometer into the breadboard so each of its three pins has its own row. {potentiometer}
    - Wire the pot's outer pins to 3.3V and GND, then run its middle pin to GPIO 14. {adc}
    - Connect the servo's lead — orange signal to GPIO 21, red to 5V, brown to GND. {servo}
    - Press a horn onto the servo's output shaft so the motion is easy to see.
    - Compare every wire to the chart before you plug in USB.
    - Open `Sketch_17.2_Control_Servo_by_Potentiometer.ino` in Arduino IDE and upload it.
    - Open Serial Monitor and set the baud rate to `115200`. {serial}
    - Turn the knob slowly end to end and watch the horn follow your hand.
  done:
    icon: "🧭"
    title: The helm answers.
    body: The horn tracks the knob, live. Head to Test & debug to read the number pairs behind the motion.

code:
  intro: >
    The loop is five working lines — read the knob, print, map, steer, print
    again. Switch to MicroPython if you'd rather see the same idea in Python —
    the wiring never changes.
  arduino:
    file: Sketch_17.2_Control_Servo_by_Potentiometer.ino
    sketch: C/Sketches/Sketch_17.2_Control_Servo_by_Potentiometer/Sketch_17.2_Control_Servo_by_Potentiometer.ino
    excerpt: |
      #define SERVO_PIN 21  //define the pwm pin
      #define SERVO_CHN 0   //define the pwm channel
      #define SERVO_FRQ 50  //define the pwm frequency
      #define SERVO_BIT 12  //define the pwm precision
      #define ADC_PIN   14  //define the adc pin

      void setup() {
        servo_set_pin(SERVO_PIN);
        Serial.begin(115200);
      }

      void loop() {
        // read the value of the potentiometer (value between 0 and 4095)
        int potVal = analogRead(ADC_PIN);
        Serial.printf("potVal_1: %d\t",potVal);
        // scale it to use it with the servo (value between 0 and 180)
        potVal = map(potVal, 0, 4095, 0, 180);
        // set the servo position according to the scaled value
        servo_set_angle(potVal);
        Serial.printf("potVal_2: %d\r\n",potVal);
        delay(15);// wait for the servo to get there
      }

      void servo_set_pin(int pin) {
        ledcAttachChannel(pin, SERVO_FRQ, SERVO_BIT, SERVO_CHN);
      }

      void servo_set_angle(int angle) {
        if (angle > 180 || angle < 0)
          return;
        long pwm_value = map(angle, 0, 180, 103, 512);
        ledcWrite(SERVO_PIN, pwm_value);
      }
    notes:
      - code: map(potVal, 0, 4095, 0, 180)
        text: Rescales the knob's raw reading onto the servo's range — 0 stays 0, 4095 becomes 180, and everything between lands in proportion.
        explain: mapValue
      - code: map(angle, 0, 180, 103, 512)
        text: The second map turns the angle into a duty value — the width of the pulse that tells the servo where to hold.
        explain: pulseWidth
      - code: ledcAttachChannel(pin, SERVO_FRQ, SERVO_BIT, SERVO_CHN)
        text: Sets GPIO 21 up as 50 Hz PWM with 12-bit precision — the timing a hobby servo expects.
        explain: ledc
      - code: 'Serial.printf("potVal_1: %d\t",potVal)'
        text: Prints the raw reading before the mapping, so each line pairs the input with its finished angle.
        explain: serialPrint
  micropython:
    file: 16.2_Servo_Knop/Servo_Knop.py
    path: Python/Python_Codes/16.2_Servo_Knop/Servo_Knop.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      servo=myServo(21)

      adc=ADC(Pin(14))
      adc.atten(ADC.ATTN_11DB)
      adc.width(ADC.WIDTH_12BIT)

      adcValue=adc.read()
      angle=(adcValue*180)/4096
      servo.myServoWriteAngle(int(angle))
      time.sleep_ms(50)
    notes:
      - code: angle=(adcValue*180)/4096
        text: The same rescale as the Arduino map — one line of arithmetic from reading to angle.
      - code: servo.myServoWriteAngle(int(angle))
        text: The helper in `myservo.py` builds the matching pulse and sends it to GPIO 21.
    note: >
      Same pins, same behaviour. Copy `myservo.py` onto the board alongside the
      script — the import needs it there. Run it in [Thonny](https://thonny.org) if MicroPython is
      set up; otherwise skip it — it should never block the Arduino-first path.

theory:
  title: One map() joins any input to any output
  summary: An input and an output almost never share a number scale, so map() is the universal joint between them — and reading then writing on every loop makes the output follow the input live.
  intro: >
    Today is the first time an analogue input drives an analogue output, and the
    idea behind it is bigger than a knob and a servo. A sensor reports on its own
    scale, an actuator obeys on a different one, and the two scales rarely line
    up. map() is the piece that connects them. Read the input, map it onto the
    output's range, write the output, and repeat- that read-map-write loop is the
    shape of nearly every hand control you will ever build.
  flow:
    - n: "1"
      title: "Two scales that don't match"
      body: "The knob reports a number from 0 to 4095; the servo obeys an angle from 0 to 180. The sensor's raw numbers mean nothing to the actuator as they stand — 4095 is not an angle."
    - n: "2"
      title: "map() is the universal joint"
      body: "map(reading, 0, 4095, 0, 180) sends each point on the input range to the matching point on the output range, in proportion- 0 to 0, 4095 to 180, the middle to 90. Change the sensor or the actuator and the same call still bridges them; only the four numbers change."
    - n: "3"
      title: "Read then write, every pass"
      body: "The loop reads the knob and writes the servo on every trip, dozens of times a second. Because the angle is recomputed from the live reading each pass, the horn follows your hand the instant you move it."
    - n: "4"
      title: "A small closed control system"
      body: "The knob commands, the servo obeys, and the loop keeps closing the distance between them. That read-map-write triangle is a control system in miniature, and it scales to any sensor paired with any actuator."
  formulaLabel: The model
  formula: "read input → **map**(input, in-low, in-high, out-low, out-high) → write output, every loop"
  notes:
    - title: Why map() and not longhand
      explain: mapValue
      body: map() is a straight-line rescale between two ranges. It handles any pair of scales with the same four arguments — including reversed ranges and narrowed ones — which is exactly what makes it reusable across every sensor and actuator you meet.
    - title: The second map is the same trick
      explain: pulseWidth
      body: The sketch actually maps twice- reading to angle, then angle to a duty value from 103 to 512 for the PWM hardware. At 50 Hz with 12-bit precision, duty 103 is roughly a 0.5 ms pulse and 512 is roughly 2.5 ms — the width, repeated every 20 ms, is the position command the servo holds. Same universal joint, one border further in.

test:
  mode: serial
  intro: >
    The horn tracking your hand is the payoff; the serial pairs are the proof.
    Success and recovery sit side by side, so you never have to go hunting when
    something looks off.
  expectedTitle: What you should see
  baud: 115200
  expected:
    - "potVal_1: 0\tpotVal_2: 0"
    - "potVal_1: 2048\tpotVal_2: 90"
    - "potVal_1: 4095\tpotVal_2: 180"
  expectedNote: Each line pairs the raw reading with its mapped angle — one end of the knob prints near 0 and 0, the centre near 2048 and 90, the far end near 4095 and 180.
  checksTitle: If it doesn't
  checks:
    - symptom: "Horn ignores the knob?"
      fix: "Check the pot's middle wire on GPIO 14, then its outer pins on 3.3V and GND."
    - symptom: "Angles print but nothing moves?"
      fix: "Check the servo's signal wire on GPIO 21 and its power pair on 5V and GND."
    - symptom: "Horn jitters at rest?"
      fix: "Small twitches are normal; a steadier 5V supply calms them."
    - symptom: "Garbled or random characters?"
      fix: "Set Serial Monitor to 115200 baud to match the sketch."

challenge:
  title: "Try this: predict the mapping, then change it"
  railLabel: Try this
  intro: >
    Same working circuit, one line rewritten two ways. The point of each is to
    predict the horn's behaviour from the four map() numbers before you upload,
    then watch the serial pairs prove you right or catch you out. It fits inside
    today's 20 minutes.
  summary: Narrow the servo to a 45 to 135 window and reverse the steering, predicting each result from the map() arguments before uploading, then restore the sketch and calibrate the knob.
  cards:
    - title: Narrow the lane
      explain: mapValue
      body: Change the first map() to map the reading onto 45 to 135 — a 90° window around centre. Predict first- where do the two ends of the knob point now, and what will potVal_2 print at each end? Upload and check the serial pairs against your guess.
    - title: Reverse the helm
      body: Swap the output ends so the reading maps onto 180 then 0. Before uploading, call it- which way does the horn swing when you turn the knob clockwise now? One line runs the servo against the knob.
    - title: Restore and calibrate
      body: Put the original 0 to 180 mapping back, then find the knob positions that print potVal_2 near 0, 90, and 180 and mark each with a sliver of tape. You've calibrated a control by reading its own output.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent
    can guide you with full context.
  behaviour: >
    guide one wire at a time, wait for you to confirm, and always check wiring,
    board, port, and baud rate before changing code. Once it runs, teach the
    real idea- an input and an output live on different scales, map() is the
    joint between them, and reading then writing every loop makes the horn track
    the knob live.
  coachInstructions:
    - Guide one physical connection at a time and wait for learner confirmation before proceeding.
    - Once the horn tracks the knob, teach the core idea- the knob's 0 to 4095 and the servo's 0 to 180 are different scales, and map() rescales one onto the other so either can drive the other.
    - Point out the read-map-write loop- because the angle is recomputed from the live reading on every pass, the horn follows the hand, which is a small closed control system.
    - For the challenge, have the learner predict the horn's behaviour from the four map() numbers before uploading, then confirm it against the potVal_2 column.
    - If the horn ignores the knob, check the pot's middle wire on GPIO 14 first, then its outer pins on 3.3V and GND.
    - If angles print but the servo never moves, check the signal wire on GPIO 21 and the servo's 5V and GND pair before changing code.
    - Small jitter at rest is normal servo behaviour; suggest a steadier 5V supply if it's constant, and keep the learner from twisting the horn by hand while powered.
    - If the monitor shows garbled text, set the baud rate to 115200 before touching anything else.
    - Use the serial pairs as the diagnostic — potVal_1 proves the knob side works and potVal_2 proves the mapping, which isolates any fault to the servo side.

