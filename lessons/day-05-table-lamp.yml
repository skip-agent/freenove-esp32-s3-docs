    body: A momentary button now behaves like a real switch — firing on the edge of a press and holding its state. Head to Test & debug to confirm the toggle and check for bounce double-presses.

code:
  intro: >
    The circuit is the same; the loop is what changed. It now catches the press at
    its edge, waits out the switch's bounce, and inverts the LED's remembered state
    on one clean press. Switch to MicroPython to see the same idea in Python.
  arduino:
    file: Sketch_02.2_TableLamp.ino
    sketch: C/Sketches/Sketch_02.2_TableLamp/Sketch_02.2_TableLamp.ino
    excerpt: |
      void loop() {
        if (digitalRead(PIN_BUTTON) == LOW) {
          delay(20);                       // wait out the chatter
          if (digitalRead(PIN_BUTTON) == LOW) {
            reverseGPIO(PIN_LED);          // clean press -> flip the LED
          }
          while (digitalRead(PIN_BUTTON) == LOW);   // hold here until release
        }
      }

      void reverseGPIO(int pin) {
        digitalWrite(pin, !digitalRead(pin));
      }
    notes:
      - code: delay(20)
        text: Waits out the switch's physical bounce, so the recheck below reads a settled level rather than mid-bounce noise.
        explain: debounce
      - code: reverseGPIO(PIN_LED)
        text: Inverts the LED's own current level — on becomes off, off becomes on. That level is the state the lamp keeps between loop passes.
        explain: toggle
      - code: while (digitalRead(PIN_BUTTON) == LOW);
        text: Holds here for the whole press, so the long LOW of your finger is consumed once. The loop reacts to the falling edge, then waits for release.
        explain: debounce
  micropython:
    file: 02.2_TableLamp/TableLamp.py
    path: Python/Python_Codes/02.2_TableLamp/TableLamp.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      def reverseGPIO():
          led.value(0 if led.value() else 1)

      if not button.value():
          time.sleep_ms(20)
          if not button.value():
              reverseGPIO()
              while not button.value():
                  time.sleep_ms(20)
    notes:
      - code: time.sleep_ms(20)
        text: The same 20 ms pause to let the switch's bounce settle before the recheck.
      - code: while not button.value()
        text: Holds until you release, so the press's edge registers exactly once.
    note: >
      Same pins, same wiring, same behaviour. Run it in Thonny if MicroPython is
      set up; otherwise skip it — it should never block the Arduino-first path.

theory:
  title: Level, edge, and the bounce between them
  summary: The loop reads a steady level thousands of times a second, so a lamp must act on the edge — the moment of the press — and wait out the switch's physical bounce.
  intro: >
    A press feels instant, but to the board it is a long stretch of time the loop
    reads over and over. Making one press flip the lamp exactly once means seeing
    the difference between the pin's steady level and the single moment it changes,
    holding the light's on/off state between loop passes, and getting past the
    switch's mechanical bounce. Those three ideas are the whole lesson.
  flow:
    - { n: Level, title: What the loop sees, body: "loop() reads GPIO 13 thousands of times a second. At rest it reads HIGH; through the entire press it reads LOW. That reading is the level — the pin's state right now." }
    - { n: The trap, title: A level flips forever, body: Flip the lamp whenever the pin reads LOW and it flips on every pass while you hold — hundreds of times before you let go. The level alone can't tell a tap from a long hold. }
    - { n: Edge, title: The moment of change, body: "What you mean by a press is the edge: the single HIGH-to-LOW fall when the contact closes. One press has exactly one falling edge, so acting on the edge acts once." }
    - { n: Bounce, title: The edge arrives messy, body: The switch's metal contacts spring apart and back as they meet, so that one clean edge lands as a burst of edges over a few milliseconds. Left alone, one press reads as several. }
    - { n: Memory, title: Where on/off lives, body: The LED's own driven level is the remembered state. It stays put between loop passes, and each clean edge inverts it — so the lamp holds long after your finger is gone. }
  formulaLabel: The model
  formula: one clean **falling edge** → invert the remembered state → the lamp holds
  notes:
    - title: Why a press reads LOW
      explain: activeLow
      body: The 10 kΩ resistor ties GPIO 13 to HIGH at rest, and a press pulls it to ground. So a press is a fall from HIGH to LOW — which is exactly the edge the sketch watches for.
    - title: How this sketch catches the edge
      explain: debounce
      body: It acts the instant it first reads LOW, then the wait-until-release line holds through the rest of the press. The long LOW of your hold is spent there and never counted again — one press in, one flip out.
    - title: Why the contact bounces at all
      explain: debounce
      body: The two metal contacts do not settle the instant they touch; they physically rebound a few times in a couple of milliseconds, like a dropped ball. The 20 ms pause lets them come to rest before the code rechecks.

test:
  mode: visual
  intro: >
    Nothing prints today — the proof is whether the lamp stays without your finger.
  expectedTitle: What you should see
  readoutLabel: Lamp
  expected:
    - Press once and release — the LED latches on and stays on.
    - Press once more — it turns off and stays off.
    - Each full press flips the light exactly once, cleanly.
  expectedNote: A single press that flips twice is the switch's bounce slipping past — the 20 ms pause is what holds it back, which is exactly what the challenge lets you observe.
  checksTitle: If it doesn't
  checks:
    - symptom: "One press flips it twice?"
      fix: "A bounce edge got through — confirm the 20 ms debounce delay and the wait-until-release line are both present."
    - symptom: "Nothing latches?"
      fix: "Re-run Day 4's checks — LED direction, the resistors, GPIO 2 and 13."
    - symptom: "LED flickers while held?"
      fix: "The loop is following the LOW level all through the hold — you're likely on the Day 4 sketch, so upload Sketch_02.2_TableLamp."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: make the level and the bounce visible"
  railLabel: Try this
  intro: >
    The two ideas behind the lamp are easy to see once you take each guard away
    for a moment. Work on a copy of the sketch, run both experiments, then restore
    the original — it fits inside today's time.
  summary: Remove the wait-until-release line to watch the loop follow the LOW level for the whole hold, then remove the debounce to catch the switch bouncing, and put both back to fix each fault.
  cards:
    - title: Watch the loop read the level
      explain: digitalRead
      body: "Comment out the `while (digitalRead(PIN_BUTTON) == LOW);` line, upload, and hold the button down. The LED strobes — the loop now flips on every pass it reads LOW, hundreds of times through your hold. Uncomment the line and a hold gives one clean flip again, because the loop acts on the falling edge and then waits for release."
    - title: Catch the bounce
      explain: debounce
      body: "Put that line back, then change `delay(20)` to `delay(0)` so nothing waits out the bounce. Press slowly a dozen times — now and then one press flips the lamp twice, because the board caught the contact's rebound as a second edge. Restore `delay(20)` and the double-flips stop."

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    keep it to upload-and-watch on the existing circuit, and teach the real idea —
    the pin's steady level versus the edge of a press, the on/off state held across
    loops, and why a switch bounces. Check wiring, board, port, and USB before
    changing code.
  coachInstructions:
    - Confirm the learner still has the Day 4 circuit before uploading; do not re-wire unless something is broken.
    - Keep the day to upload-and-watch; the new material is in the sketch, not the breadboard.
    - Land the core idea- the loop reads GPIO 13 thousands of times a second and reads LOW through the whole hold, so a lamp must act on the one falling edge (the moment of the press) and then wait out the rest.
    - Explain that the LED's own driven level is the remembered on/off state, held between loop passes, and that each clean edge inverts it.
    - Explain bounce physically- the switch's contacts rebound for a few milliseconds as they close, so the 20 ms pause lets them settle before the recheck.
    - If a press flips the LED twice, that is a bounce edge getting through; check that both the debounce delay and the wait-until-release line are present.
    - Use the challenge to make it concrete- removing the wait-until-release line exposes the level (a hold strobes the LED); removing the debounce exposes the bounce (occasional double-flips). Have them restore both.
    - Keep the Arduino path primary; MicroPython is optional only if already set up.

