mission: >
  Keep yesterday's button-and-LED circuit and change only the code, so a single
  press latches the LED on and the next press turns it off — a real lamp switch
  instead of a button you have to hold.
unlocks: A momentary button can control a lasting state once the code remembers the last press and ignores the switch's chatter.
seoDescription: >
  Turn the button-and-LED circuit into a mini table lamp. Change the sketch so one
  press latches the LED on and the next turns it off, with debounce for clean presses.

