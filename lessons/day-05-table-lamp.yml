code:
  intro: >
    The circuit is the same; the loop is what changed. It now remembers the LED's
    state, waits out the switch's chatter, and flips only on a clean press. Switch
    to MicroPython to see the same idea in Python.
  arduino:
    file: Sketch_02.2_TableLamp.ino
    sketch: C/Sketches/Sketch_02.2_TableLamp/Sketch_02.2_TableLamp.ino
    excerpt: |
      void loop() {
        if (digitalRead(PIN_BUTTON) == LOW) {
          delay(20);                       // wait out the chatter
          if (digitalRead(PIN_BUTTON) == LOW) {
            reverseGPIO(PIN_LED);          // clean press -> flip the LED
          }
          while (digitalRead(PIN_BUTTON) == LOW);   // hold here until release
        }
      }

      void reverseGPIO(int pin) {
        digitalWrite(pin, !digitalRead(pin));
      }
    notes:
      - code: delay(20)
        text: The debounce pause — long enough for the switch's chatter to settle.
        explain: debounce
      - code: reverseGPIO(PIN_LED)
        text: Flips the LED to the opposite of whatever it is now — on becomes off, off becomes on.
        explain: toggle
      - code: while (digitalRead(PIN_BUTTON) == LOW);
        text: Waits right here until you let go, so one press can't count twice.
        explain: debounce
  micropython:
    file: 02.2_TableLamp/TableLamp.py
    path: Python/Python_Codes/02.2_TableLamp/TableLamp.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      def reverseGPIO():
          led.value(0 if led.value() else 1)

      if not button.value():
          time.sleep_ms(20)
          if not button.value():
              reverseGPIO()
              while not button.value():
                  time.sleep_ms(20)
    notes:
      - code: time.sleep_ms(20)
        text: The same 20 ms debounce pause, written in Python.
      - code: while not button.value()
        text: Holds until you release, so the press registers once.
    note: >
      Same pins, same wiring, same behaviour. Run it in Thonny if MicroPython is
      set up; otherwise skip it — it should never block the Arduino-first path.

theory:
  title: Memory and debounce
  summary: Remember the last state, wait out the switch's chatter, and flip only on a clean, released press.
  intro: >
    Two small ideas turn a button into a lamp: the code remembers the light's
    state, and it refuses to trust a press until the switch has stopped bouncing.
  flow:
    - { n: Notice, title: A press starts, body: The loop sees GPIO 13 go LOW and pauses briefly. }
    - { n: Confirm, title: Check again, body: If it is still LOW after the pause the press was real. }
    - { n: Flip, title: Toggle the LED, body: reverseGPIO sets the LED to the opposite of what it was. }
    - { n: Wait, title: Until release, body: The code holds until you let go so one press counts once. }
  formulaLabel: The model
  formula: one clean press → **flip** the remembered state → the lamp stays
  notes:
    - title: Why the LED bounced before
      explain: debounce
      body: A switch chatters for a few milliseconds as it closes. Without the pause the board would toggle many times per press.
    - title: What toggling really is
      explain: toggle
      body: Instead of following the button live, the code keeps a state and inverts it — that memory is the whole difference from Day 4.

test:
  mode: visual
  intro: >
    Nothing prints today — the proof is whether the lamp stays without your finger.
  expectedTitle: What you should see
  readoutLabel: Lamp
  expected:
    - Press once and release — the LED latches on and stays on.
    - Press once more — it turns off and stays off.
    - Each full press flips the light exactly once, cleanly.
  expectedNote: If a single press sometimes flips twice, the debounce pause is doing its job when it's present — and failing when it's removed.
  checksTitle: If it doesn't
  checks:
    - symptom: "One press flips it twice?"
      fix: "Confirm the debounce delay and the wait-until-release line are both present."
    - symptom: "Nothing latches?"
      fix: "Re-run Day 4's checks — LED direction, the resistors, GPIO 2 and 13."
    - symptom: "LED flickers while held?"
      fix: "You may be on the Day 4 sketch — upload Sketch_02.2_TableLamp."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: change how the lamp feels"
  railLabel: Try this
  intro: >
    Same working lamp, one deliberate change to its behaviour. Pick one and note
    what changed — it fits inside today's 30 minutes.
  summary: Change one aspect of the lamp's feel — the debounce timing, or a double-press behaviour — and describe the result.
  cards:
    - title: Tune the debounce
      explain: debounce
      body: Try `delay(5)` and then `delay(80)`. Find where presses feel crisp without ever double-flipping.
    - title: Name the interaction
      body: In one sentence, describe how this lamp should feel to use — then judge whether your timing delivers it.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    keep it to upload-and-watch on the existing circuit, explain debounce and
    toggle on request, and check wiring, board, port, and USB before changing code.
  coachInstructions:
    - Confirm the learner still has the Day 4 circuit before uploading; do not re-wire unless something is broken.
    - Keep the day to upload-and-watch; the new material is in the sketch, not the breadboard.
    - Explain debounce and toggle on request, using the learner's own double-press observations.
    - If a press flips the LED twice, check that both the debounce delay and the wait-until-release line are present.
    - Preserve the working lamp sketch before suggesting timing changes.
    - Keep the Arduino path primary; MicroPython is optional only if already set up.

