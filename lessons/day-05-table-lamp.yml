  instrument: none
  headline: Turn a press|into a {lamp}
  lede: >
    Yesterday the LED glowed only while you held the button. Today it stays. The
    loop reads that button thousands of times a second, so the leap to a lamp is
    teaching it to fire on the single moment a press begins — the edge — to
    remember whether the light is on, and to shrug off the milliseconds a switch
    bounces as it closes. That's the jump from a raw button to a product.
  pills:
    - { text: About 25 minutes, key: true }
    - Arduino first
    - MicroPython optional
    - Same circuit as Day 4

