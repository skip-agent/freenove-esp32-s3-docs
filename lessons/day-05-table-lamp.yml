# Day 5 — Mini table lamp · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-05-table-lamp/), the agent packet, and the course-map entry.
# Same circuit as Day 4 (Project 2.1); the code gains memory and debounce so a
# momentary button becomes a latching lamp — the arc's first tiny product.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY05-LAMP
day: 5
slug: day-05-table-lamp
title: Make a mini table lamp
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Keep yesterday's button-and-LED circuit and change only the code, so one press
  latches the LED on and the next turns it off. The whole trick is teaching the
  board to act on the moment a press begins rather than the whole time your finger
  is down — and to see past the few milliseconds a switch bounces as it closes.
unlocks: A momentary button can hold a lasting state once the code fires on the press's edge, remembers that state between loop passes, and waits out the switch's mechanical bounce.
seoDescription: >
  Turn the button-and-LED circuit into a mini table lamp. Learn the difference
  between a pin's steady level and the edge of a press, hold an on/off state across
  loops, and debounce the switch so one press flips the lamp exactly once.

