wiring:
  intro: >
    The official Freenove diagram is your chart. Click it to enlarge. Each
    connection below tells you where the wire goes and why it's there — hover a
    row to light it up.
  diagram:
    image: day-26/circuit-page-172.png
    alt: >-
      Official Freenove diagram showing HC-SR04 VCC connected to 5V, Trig to GPIO
      13, Echo to GPIO 14, and GND to ground on the ESP32-S3 GPIO extension board.
    caption: Official Freenove circuit — C Tutorial, Chapter 19, page 172. Production lessons keep this source and attribution.
    zoomCaption: Official Freenove circuit, C Tutorial Chapter 19, page 172.
    source: { pdf: C_Tutorial.pdf, chapter: 19, page: 172 }
  pins:
    - { from: VCC,  to: 5V,      why: Powers the ultrasonic sensor.,          explain: vcc }
    - { from: Trig, to: GPIO 13, why: The board sends a short "start" pulse here., explain: trig }
    - { from: Echo, to: GPIO 14, why: The sensor returns a timed pulse here.,  explain: echo }
    - { from: GND,  to: GND,     why: Gives board and sensor the same zero point., explain: gnd }
  safety:
    - label: Check before power.
      icon: "⚓"
