steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Place the HC-SR04 so the two round transducers face outward, away from loose wires.
    - Connect `VCC → 5V`, `Trig → GPIO 13`, `Echo → GPIO 14`, and `GND → GND`.
    - Pause and compare your wiring to the chart before powering or uploading.
    - Open `Sketch_19.1_Ultrasonic_Ranging.ino` in Arduino IDE.
    - Upload the sketch to the ESP32-S3.
    - Open Serial Monitor and set the baud rate to `115200`. {serial}
    - Hold a flat object 10–30 cm in front of the sensor and move it slowly closer and farther.
  done:
    icon: "🌊"
    title: Sounder's live.
    body: Your ESP32-S3 is now reading the room by ear. Head to Test & debug to confirm the numbers.

code:
  intro: >
    You don't need the whole sketch today — just four lines that carry the whole
    idea: name the two pins, time the echo, then turn that time into centimetres.
    Switch to MicroPython if you'd rather see the same idea in Python; the wiring
    stays the same.
  arduino:
    file: Sketch_19.1_Ultrasonic_Ranging.ino
    sketch: C/Sketches/Sketch_19.1_Ultrasonic_Ranging/Sketch_19.1_Ultrasonic_Ranging.ino
    variant: C/Sketches/Sketch_19.2_Ultrasonic_Ranging/Sketch_19.2_Ultrasonic_Ranging.ino
    excerpt: |
      #define trigPin 13
      #define echoPin 14

      pingTime = pulseIn(echoPin, HIGH, timeOut);
      distance = (float)pingTime * soundVelocity / 2 / 10000;
    notes:
      - code: "#define trigPin 13"
        text: Gives GPIO 13 the name `trigPin`, so the pin's job stays readable wherever the sketch drives it.
        explain: define
      - code: pulseIn(echoPin, HIGH, timeOut)
        text: Starts a stopwatch when Echo rises and stops it when Echo falls, returning the sound's round-trip time — the one measurement everything else is built from.
        explain: pulsein
      - code: … / 2 / 10000
        text: Halves the round trip to get the one-way distance, then scales the microsecond timing down into centimetres.
        explain: divideTwo
  micropython:
    file: 18.1_Ultrasonic_Ranging/Ultrasonic_Ranging.py
    path: Python/Python_Codes/18.1_Ultrasonic_Ranging/Ultrasonic_Ranging.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      trigPin = Pin(13, Pin.OUT, 0)
      echoPin = Pin(14, Pin.IN, 0)
    notes:
      - code: Pin(13, Pin.OUT, 0)
        text: Sets GPIO 13 as the trigger **output** — the board's side of the ping.
      - code: Pin(14, Pin.IN, 0)
        text: Sets GPIO 14 as the echo **input** — where the return pulse arrives.
    note: >
      Same pins, same behaviour. Run it in [Thonny](https://thonny.org) and compare the printed
      distance with the Arduino version. If MicroPython isn't set up yet, skip
      this — it should never block the Arduino-first day.

theory:
  title: Measuring distance by timing an echo
  summary: The sensor never touches the object — it times how long a sound pulse takes to fly out and echo back, and the board turns that time into distance.
  intro: >
    The trick behind the whole day is that the HC-SR04 measures time, not
    distance. It fires a sound pulse, then reports exactly how long that pulse
    takes to reach an object and return. Because sound moves at a known, steady
    speed, the board can turn that time into centimetres. It's the same idea as
    counting the seconds between lightning and thunder to judge how far off a
    storm is — you're timing something at a known speed and reading off a
    distance.
  flow:
    - n: "1"
      title: "Send the pulse"
      body: "The board holds Trig HIGH for about 10 microseconds. That short command tells the HC-SR04 to emit a burst of ultrasonic clicks, a pitch far above what you can hear."
    - n: "2"
      title: "Echo marks the flight"
      body: "The instant the burst leaves, the sensor raises the Echo pin and holds it HIGH. It keeps Echo HIGH for exactly as long as the sound is in flight — out to the object and back again."
    - n: "3"
      title: "pulseIn times it"
      body: "pulseIn(echoPin, HIGH, timeOut) starts a stopwatch when Echo rises and stops it when Echo falls. What it hands back is the round-trip time, measured in microseconds."
    - n: "4"
      title: "Speed turns time into length"
      body: "Sound travels at a fixed speed in room air, about 343 metres per second. Multiply that speed by the round-trip time and you get the total path the sound covered."
    - n: "5"
      title: "Halve the round trip"
      body: "The sound went to the object and came straight back, so it covered the gap twice. Divide the total path by two, and you're left with the one-way distance to the object."
  formulaLabel: The model
  formula: distance = **speed of sound** × **echo time** ÷ 2
  notes:
    - title: Why you divide by two
      explain: divideTwo
      body: The pulse makes a round trip — sensor to object, then object back to sensor. The raw echo time covers both legs, so halving it leaves the single one-way distance you actually want.
    - title: Why the speed of sound matters
      explain: wobble
      body: The whole conversion leans on sound moving at a known speed. That speed shifts slightly with air temperature, which is one reason a reading can drift by a little even when nothing has moved.
    - title: Why flat targets read cleaner
      explain: flat
      body: A flat surface square to the sensor bounces most of the sound straight back, giving Echo a strong, sharp pulse to time. Curved or soft targets scatter the sound, so the return is weaker and the timing less certain.

test:
  intro: >
    Success and recovery sit side by side, so you never have to go hunting when
    something looks off.
  expectedTitle: What you should see
  baud: 115200
  expected:
    - "Distance: 24.31cm"
    - "Distance: 23.92cm"
    - "Distance: 24.08cm"
  expectedNote: A good reading changes when you move the object. Small wobble is fine.
  checksTitle: If it doesn't
  checks:
    - symptom: "0 cm or frozen?"
      fix: "Check Trig, Echo, GND, and the target's shape."
    - symptom: "Blank monitor?"
      fix: "Confirm 115200 baud, then the board and port."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."
    - symptom: "Readings jump?"
      fix: "Aim straight at a flat object."

challenge:
  title: "Try this: check the sensor against a ruler"
  railLabel: Try this
  intro: >
    You've got a distance sensor and a claim to test — that timing an echo really
    does measure length. Hold it to a ruler and see. It fits inside today's 30
    minutes.
  summary: Measure a known distance with a ruler, compare it to the sensor's reading, then swap the flat target for a soft or angled one and watch the echo change.
  cards:
    - title: Measure it, then check it
      body: "Stand a book at a ruler-measured 15 cm from the sensor face, read what Serial Monitor reports, then repeat at 30 cm. Close agreement means the time-to-distance math is sound. A steady offset — the reading always a centimetre or two off in the same direction — tells you where the sensor's real zero point sits: the transducer face, not the board edge you measured from."
    - title: Break the echo on purpose
      explain: flat
      body: "Aim at a flat wall and note a steady reading. Now swap in a folded towel, or tilt the target to about 45 degrees, and watch the number get weaker, jumpier, or drop to zero. You're seeing the mechanism from the outside: a clean reading needs a strong echo, and soft or angled surfaces scatter the sound away instead of bouncing it back."

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical step at a time and wait for the learner to confirm. Once
    the circuit is reading, teach the real method — the sensor times an echo and
    the board converts that time into distance — and make sure the divide-by-two
    lands. Always check wiring, board, port, and USB before changing code.
  coachInstructions:
    - Guide one physical step at a time and wait for learner confirmation before proceeding.
    - "Once the circuit is reading, teach the core method: Trig sends a pulse, Echo stays HIGH for the round-trip time, pulseIn measures that time, and the fixed speed of sound converts it to distance."
    - "Make sure the divide-by-two lands: the sound travels to the object and back, so the round trip is halved to get the one-way distance."
    - If a reading is 0 or frozen, check Trig, Echo, GND, and whether the target is flat and square before touching code.
    - Preserve a working baseline before suggesting modifications.
    - Keep the Arduino path primary; MicroPython is optional only if already set up.

