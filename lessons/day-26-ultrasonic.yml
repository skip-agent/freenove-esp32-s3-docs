  lede: >
    Today you build a tiny depth sounder. The HC-SR04 sends a ping you can't
    hear, then holds a pin HIGH for exactly as long as the sound takes to travel
    out and echo back. The ESP32-S3 times that pulse and, knowing how fast sound
    moves, works out how far away things are — the same trick a boat uses to read
    the water beneath it.
