day: 26
slug: day-26-ultrasonic
title: Measure the room with sound
status: published
estimatedTimeMinutes: 30
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Build a tiny digital tape measure with the HC-SR04 ultrasonic sensor, upload
  the Arduino sketch, and read live distances in Serial Monitor. The real prize
  is the method underneath: the sensor measures one thing — how long a sound
  pulse takes to fly out and echo back — and because sound travels at a known
  speed, that single time reading becomes a distance in centimetres. Learn that
  pipeline and you can measure the physical world with a stopwatch.
unlocks: You can measure distance by timing an echo — send a pulse, time how long it takes to return, and convert that time to centimetres using the speed of sound. It's the same principle behind sonar and a boat's depth sounder.
seoDescription: >
  Build a tiny digital tape measure with the HC-SR04 ultrasonic sensor. Wire it,
  upload the sketch, and watch distance readings appear in Serial Monitor.

