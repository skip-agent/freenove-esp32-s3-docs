steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Place the HC-SR04 so the two round transducers face outward, away from loose wires.
    - Connect `VCC → 5V`, `Trig → GPIO 13`, `Echo → GPIO 14`, and `GND → GND`.
    - Pause and compare your wiring to the chart before powering or uploading.
    - Open `Sketch_19.1_Ultrasonic_Ranging.ino` in Arduino IDE.
    - Upload the sketch to the ESP32-S3.
    - Open Serial Monitor and set the baud rate to `115200`. {serial}
    - Hold a flat object 10–30 cm in front of the sensor and move it slowly closer and farther.
  done:
    icon: "🌊"
    title: Sounder's live.
    body: Your ESP32-S3 is now reading the room by ear. Head to Test & debug to confirm the numbers.

code:
  intro: >
    You don't need the whole sketch today — just four lines that do the real
    work. Switch to MicroPython if you'd rather see the same idea in Python; the
    wiring never changes.
  arduino:
    file: Sketch_19.1_Ultrasonic_Ranging.ino
    sketch: C/Sketches/Sketch_19.1_Ultrasonic_Ranging/Sketch_19.1_Ultrasonic_Ranging.ino
    variant: C/Sketches/Sketch_19.2_Ultrasonic_Ranging/Sketch_19.2_Ultrasonic_Ranging.ino
    excerpt: |
      #define trigPin 13
      #define echoPin 14

      pingTime = pulseIn(echoPin, HIGH, timeOut);
      distance = (float)pingTime * soundVelocity / 2 / 10000;
    notes:
      - code: "#define trigPin 13"
        text: Names GPIO 13 `trigPin` so the rest of the sketch reads plainly.
        explain: define
      - code: pulseIn(echoPin, HIGH, timeOut)
        text: Times how long Echo stays HIGH — that's the raw measurement.
        explain: pulsein
      - code: … / 2 / 10000
        text: Sound goes out *and* back, so halve it; the `/ 10000` just lands the answer in centimetres.
        explain: divideTwo
  micropython:
    file: 18.1_Ultrasonic_Ranging/Ultrasonic_Ranging.py
    path: Python/Python_Codes/18.1_Ultrasonic_Ranging/Ultrasonic_Ranging.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      trigPin = Pin(13, Pin.OUT, 0)
      echoPin = Pin(14, Pin.IN, 0)
    notes:
      - code: Pin(13, Pin.OUT, 0)
        text: Sets GPIO 13 as the trigger **output** — the board's side of the ping.
      - code: Pin(14, Pin.IN, 0)
        text: Sets GPIO 14 as the echo **input** — where the return pulse arrives.
    note: >
      Same pins, same behaviour. Run it in Thonny and compare the printed
      distance with the Arduino version. If MicroPython isn't set up yet, skip
      this — it should never block the Arduino-first day.

theory:
  title: Physics of a ping
  intro: >
    The whole day is one loop, running many times a second. It's the same idea as
    counting the seconds between lightning and thunder.
  flow:
    - { n: Send a ping,  title: Trig fires,       body: Trig tells the sensor to emit a short pulse above human hearing. }
    - { n: Wait for echo, title: It bounces,       body: The pulse hits an object and some of it returns. }
    - { n: Measure time,  title: Echo holds HIGH,  body: Echo stays HIGH for exactly the round-trip time. }
    - { n: Convert,       title: Time → distance,  body: Time × speed of sound gives how far the pulse travelled. }
  formulaLabel: Useful model
  formula: distance = **speed of sound** × **echo time** ÷ 2
  notes:
    - title: Why readings wobble
      explain: wobble
      body: Real sensors react to object shape, angle, movement, and air. A little wobble is normal — watch the trend, not one number.
    - title: Why flat targets help
      explain: flat
      body: Flat objects bounce more sound straight back. Curved or soft ones scatter it, so the echo gets weaker.

test:
  intro: >
    Success and recovery sit side by side, so you never have to go hunting when
    something looks off.
  expectedTitle: What you should see
  baud: 115200
  expected:
    - "Distance: 24.31cm"
    - "Distance: 23.92cm"
    - "Distance: 24.08cm"
  expectedNote: A good reading changes when you move the object. Small wobble is fine.
  checksTitle: If it doesn't
  checks:
    - symptom: "0 cm or frozen?"
      fix: "Check Trig, Echo, GND, and the target's shape."
    - symptom: "Blank monitor?"
      fix: "Confirm 115200 baud, then the board and port."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."
    - symptom: "Readings jump?"
      fix: "Aim straight at a flat object."

challenge:
  title: "Try this: a mini range log"
  railLabel: Try this
  intro: >
    Same working setup, one new skill: turning a measurement into a judgement. It
    fits inside today's 30 minutes.
  summary: Measure three targets, record expected and actual distances, then choose a keep-out-zone threshold and explain why.
  cards:
    - title: Measure three targets
      body: A book, a wall, and one object you pick. Note the expected distance, the reading, and anything odd.
    - title: Choose a threshold
      explain: threshold
      body: Pick a "too close" distance — say 15 cm. Later that line can become a beep or a warning.
  logbook:
    - What did you measure today?
    - Which reading seemed most stable?
    - What would you build if the sensor could warn you something's too close?

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical step at a time, wait for you to confirm, explain terms on
    request, and always check wiring, board, port, and USB before changing code.
  coachInstructions:
    - Guide one physical step at a time and wait for learner confirmation before proceeding.
    - Offer short explanations on request; do not dump theory before the learner has a working circuit.
    - If the learner is stuck, check wiring, board/port, baud rate, and USB cable before changing code.
    - Preserve a working baseline before suggesting modifications.
    - Keep the Arduino path primary; MicroPython is optional only if already set up.

