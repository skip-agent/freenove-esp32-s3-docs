tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Build a tiny digital tape measure with the HC-SR04 ultrasonic sensor, upload
  the Arduino sketch, and watch distance readings appear in Serial Monitor.
unlocks: The ESP32-S3 can measure the physical world by timing how long a signal takes to leave and come back.
seoDescription: >
  Build a tiny digital tape measure with the HC-SR04 ultrasonic sensor. Wire it,
  upload the sketch, and watch distance readings appear in Serial Monitor.

