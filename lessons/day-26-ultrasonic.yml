  instrument: sounder
  instrumentTitle: Live echo sounder
  readout: { label: Distance, value: "24.31", unit: cm }
  # "|" becomes a line break; "{word}" is emphasised (italic accent).
  headline: Measure the room|with {sound}
  lede: >
    Today you build a tiny depth sounder. The HC-SR04 sends a ping you can't
    hear, listens for the echo, and the ESP32-S3 times the round trip to work out
    how far away things are — the same trick a boat uses to read the water beneath
    it.
  pills:
    - { text: About 30 minutes, key: true }
    - Arduino first
    - MicroPython optional
    - No electronics assumed

