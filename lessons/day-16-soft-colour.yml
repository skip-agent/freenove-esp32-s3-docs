steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Place the three potentiometers on the breadboard with room to turn each knob. {potentiometer}
    - Wire each knob's outer legs to 3.3V and GND so its middle pin can sweep the full range.
    - Run the middle pins to GPIO 12, 13, and 14 — red, green, and blue in that order. {adc}
    - Wire the RGB LED's red leg through a 220 Ω resistor to GPIO 38, green to GPIO 39, blue to GPIO 40. {resistor}
    - Run the LED's long common pin to 3.3V. {commonAnode}
    - Compare every wire to the chart before you plug in USB.
    - Open `Sketch_10.2_SoftColorfulLight.ino` in Arduino IDE and upload it.
    - Turn each knob in turn and watch its colour rise and fall in the dome.
  done:
    icon: "💡"
    title: Your own mixing desk.
    body: Three knobs now hold the colour between them. Head to Test & debug to confirm each channel answers its own knob.

code:
  intro: >
    Day 15 ran one chain — read a knob, write a brightness — and its two scales
    happened to match, so it needed no map() call. A colour channel runs 0 to
    255 while the knob runs 0 to 4095, so today every pass leans on map() to
    rescale. Three small arrays and one loop run all three channels in a few
    lines. Switch to MicroPython if you'd rather see the same idea in Python —
    the wiring never changes.
  arduino:
    file: Sketch_10.2_SoftColorfulLight.ino
    sketch: C/Sketches/Sketch_10.2_SoftColorfulLight/Sketch_10.2_SoftColorfulLight.ino
    excerpt: |
      const byte adcChns[] = {12, 13, 14};    // define the adc channels
      const byte ledPins[] = {38, 39, 40};    // define led pins
      const byte pwmChns[] = { 0,  1,  2};    // define the pwm channels
      int colors[] = {0, 0, 0};               // red, green ,blue values of color.
      void setup() {
        for (int i = 0; i < 3; i++) {         //setup the pwm channels
          ledcAttachChannel(ledPins[i], 1000, 8, pwmChns[i]);//1KHz, 8bit(0-255).
        }
      }

      void loop() {
        for (int i = 0; i < 3; i++) {
          colors[i] = map(analogRead(adcChns[i]), 0, 4096, 0, 255); //calculate color value.
          ledcWrite(ledPins[i], 256 - colors[i]);                   //set color
        }
        delay(10);
      }
    notes:
      - code: const byte adcChns[] = {12, 13, 14}
        text: Three matched arrays pair each knob with a colour leg — position 0 links the knob on 12 to the red leg on 38 and so on down the line.
        explain: pinArray
      - code: colors[i] = map(analogRead(adcChns[i]), 0, 4096, 0, 255)
        text: Reads one knob and rescales it proportionally — where the reading sits between 0 and 4096 is where the colour value lands between 0 and 255.
        explain: mapValue
      - code: ledcWrite(ledPins[i], 256 - colors[i])
        text: Day 9's common-anode inversion — this dome lights when its pin goes LOW so the sketch subtracts the value before writing it.
        explain: commonAnode
      - code: ledcAttachChannel(ledPins[i], 1000, 8, pwmChns[i])
        text: Gives each colour leg its own hardware PWM channel at 1 kHz with 8-bit brightness.
        explain: ledc
  micropython:
    file: 09.2_Soft_Colorful_Light/Soft_Colorful_Light.py
    path: Python/Python_Codes/09.2_Soft_Colorful_Light/Soft_Colorful_Light.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      pwm0=PWM(Pin(40,Pin.OUT),10000)
      pwm1=PWM(Pin(39,Pin.OUT),10000)
      pwm2=PWM(Pin(38,Pin.OUT),10000)
      adc0=ADC(Pin(12))
      adc1=ADC(Pin(13))
      adc2=ADC(Pin(14))

      pwm0.duty(1023-remap(adc0.read(),0,4095,0,1023))
      pwm1.duty(1023-remap(adc1.read(),0,4095,0,1023))
      pwm2.duty(1023-remap(adc2.read(),0,4095,0,1023))
    notes:
      - code: pwm0.duty(1023-remap(adc0.read(),0,4095,0,1023))
        text: The whole chain in one line — read the knob, rescale to the 10-bit duty range, and subtract for the common-anode dome.
    note: >
      Same wiring, one difference to expect: Freenove's Python version pairs the
      knobs to the colours in the reverse order — the knob on GPIO 12 drives the
      leg on GPIO 40 — and both pairings work fine. Run it in [Thonny](https://thonny.org) if
      MicroPython is set up; otherwise skip it — it should never block the
      Arduino-first path.

theory:
  title: How map() turns a reading into a colour
  summary: map() finds where a number sits in its input range and drops it at the same spot in the output range — plain proportional arithmetic.
  intro: >
    A knob hands you a number from 0 to 4095. A colour channel wants a number
    from 0 to 255. map() is the one line that bridges the two, and it is the same
    move behind turning any sensor reading into any output. Day 13 gave you the
    reading, Day 9 gave you the channel, and map() is the adapter between them.
  flow:
    - n: "In"
      title: "The reading"
      body: "analogRead hands back a number from 0 to 4095 — where the knob sits between ground and 3.3V."
    - n: "Fraction"
      title: "How far along"
      body: "map asks where that number sits in its input span as a fraction — halfway up the knob is halfway along 0 to 4096."
    - n: "Out"
      title: "Same spot, other scale"
      body: "It places that same fraction on the output span, so halfway lands at about 128 out of 255."
    - n: "Colour"
      title: "Brightness"
      body: "That 0-to-255 number is the PWM level for one colour leg, and the loop repeats it for red, green, and blue every pass."
  formulaLabel: The arithmetic
  formula: "**out** = outLow + (value − inLow) × (outHigh − outLow) ÷ (inHigh − inLow)"
  notes:
    - title: Match the input ends to the real reading
      explain: mapValue
      body: >
        The input ends should be the smallest and largest numbers the sensor
        truly reaches. Claim a top of 4096 when the knob only reaches 3600 and
        the colour never quite hits full. Claim a top of 2048 when the knob
        reaches 4095 and everything past halfway pins at full and stops changing.
        The output uses its whole range only when the input ends are honest about
        the reading.
    - title: map() rescales, it does not clamp
      explain: adc
      body: >
        map() is straight proportional arithmetic, so a reading outside the
        stated input range lands outside the output range too. When a value might
        stray past its ends, fence it with constrain() first — the pairing you
        met in Day 15's glossary.
    - title: Where 4096 and 255 come from
      explain: pwm
      body: >
        4096 is the top of the ADC's 12-bit scale and 255 is the top of an 8-bit
        PWM channel, so this map squeezes a 4096-step reading down onto a
        256-step brightness. Change the chip or the settings and those numbers
        move, and map() still only needs the four ends.

test:
  mode: visual
  intro: >
    Nothing prints to the screen today — the proof is the colour under your
    fingers.
  expectedTitle: What you should see
  readoutLabel: RGB LED
  expected:
    - Turn one knob and one colour sweeps smoothly from dark to full while the other two hold steady.
    - Set the knobs in combinations and the dome mixes the shades — red and green up makes yellow.
    - All three knobs up glows white; all three down leaves the dome dark.
  expectedNote: Every knob turned down means darkness by design — white takes all three channels at full.
  checksTitle: If it doesn't
  checks:
    - symptom: "One colour never changes?"
      fix: "Check that knob's middle wire on GPIO 12, 13, or 14 — the board is reading air."
    - symptom: "Turning the red knob changes the wrong colour?"
      fix: "The RGB legs are in the wrong order — red goes to GPIO 38, green to 39, blue to 40."
    - symptom: "The dome stays dark with knobs up?"
      fix: "Check the common pin — it goes to 3.3V."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: bend the mapping"
  railLabel: Try this
  intro: >
    Same working circuit, two one-line edits to the red channel — each one puts
    a different pair of map()'s numbers under your hands. Both fit inside today's
    25 minutes.
  summary: Swap red's output ends to run the colour backwards, then narrow red's input top and watch the top of the knob's travel clip at full.
  cards:
    - title: Reverse one channel
      explain: mapValue
      body: "On the map line, swap red's output ends — write `map(analogRead(adcChns[0]), 0, 4096, 255, 0)`. Turning the red knob up now dims red instead of raising it. The output ends are simply the two numbers you choose, and swapping them runs the colour the other way."
    - title: Narrow the input
      explain: adc
      body: "Put the ends back, then drop red's input top from 4096 to 2048 — `map(analogRead(adcChns[0]), 0, 2048, 0, 255)`. Red now reaches full by the knob's halfway point and holds there across the whole top half. That dead travel is what a mismatched input range costs — set the ends to the numbers the knob really reaches."

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical connection at a time, wait for confirmation, and teach
    map() as proportional arithmetic — where a reading sits in its input range is
    where it lands in the output range. Always check wiring, board, port, and USB
    before changing code.
  coachInstructions:
    - Land the core idea early — map(value, inLow, inHigh, outLow, outHigh) drops a reading at the same fraction of the output range as it sits in the input range, and here it rescales a 0 to 4095 knob onto a 0 to 255 colour channel.
    - Show the composition — Day 13's analogRead gives the number, Day 9's RGB channel takes the brightness, and map() is the adapter between them.
    - Anchor the pairing early — knob on GPIO 12 drives red on 38, 13 drives green on 39, 14 drives blue on 40 — and have the learner say it back before debugging.
    - If one colour never changes, check that knob's middle wire on 12/13/14 and its outer legs on 3.3V and GND before touching code.
    - If turning a knob moves the wrong colour, the RGB legs are swapped on 38/39/40 — fix the wiring order rather than the sketch.
    - The 256-minus write is Day 9's common-anode inversion and stands apart from the mapping — explain it on request and keep the sketch's map input top of 4096 exactly as written.
    - For the challenge, swapping map's output ends reverses a channel and narrowing its input top clips the top of the knob's travel — both are one-line edits that show what the four map() numbers do.
    - Keep the Arduino path primary; MicroPython pairs the knobs to colours in reverse order (12 drives 40) and that difference is expected, so never "fix" it.

