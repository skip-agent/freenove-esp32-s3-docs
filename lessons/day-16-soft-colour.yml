  instrument: none
  headline: Mix your own colour|with three {knobs}
  lede: >
    Today the colour mixing moves into your hands. Three knobs each feed a reading
    to the board, and each reading sets the brightness of one colour in the RGB
    dome — red, green, and blue on their own channels. Turn them together and you
    are mixing light the way a deckhand trims three sheets at once.
  pills:
    - { text: About 25 minutes, key: true }
    - Arduino first
    - MicroPython optional
    - Day 9's dome meets Day 15's knob

