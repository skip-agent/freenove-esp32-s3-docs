wiring:
  intro: >
    The official Freenove diagram is your chart — schematic on top, the same
    circuit built on a breadboard below. Click it to enlarge. The pairing to keep
    in your head: the knob on GPIO 12 drives the red leg on GPIO 38, 13 drives
    green on 39, and 14 drives blue on 40.
  diagram:
    image: day-16/circuit-page-113.png
    alt: >-
      Official Freenove circuit for soft colourful light: three rotary
      potentiometers with their middle pins on GPIO 12, 13, and 14, and an RGB
      LED whose red, green, and blue legs run through 220 ohm resistors to GPIO
      38, 39, and 40, with the long common pin joined to 3.3 volts, shown as
      both a schematic and a breadboard photo.
    caption: Official Freenove circuit — C Tutorial, Chapter 10 (Potentiometer & LED), page 113.
    zoomCaption: Official Freenove circuit, C Tutorial Chapter 10, page 113.
    source: { pdf: C_Tutorial.pdf, chapter: 10, chapterTitle: Potentiometer & LED, page: 113 }
  pins:
    - { from: Red knob middle pin, to: GPIO 12, why: The board reads this knob to set how much red shows., explain: adc }
    - { from: Green knob middle pin, to: GPIO 13, why: The board reads this knob to set how much green shows., explain: potentiometer }
    - { from: Blue knob middle pin, to: GPIO 14, why: The board reads this knob to set how much blue shows. }
    - { from: Each knob's outer legs, to: 3.3V and GND, why: The two ends give the middle pin a full sweep from zero to full voltage., explain: gnd }
    - { from: Red leg (via 220 Ω), to: GPIO 38, why: PWM on this pin sets the red brightness., explain: pwm }
    - { from: Green leg (via 220 Ω), to: GPIO 39, why: PWM on this pin sets the green brightness. }
    - { from: Blue leg (via 220 Ω), to: GPIO 40, why: PWM on this pin sets the blue brightness., explain: rgb }
