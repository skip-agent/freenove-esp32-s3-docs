# Day 16 — Soft colourful light · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-16-soft-colour/), the agent packet, and the course-map entry.
# The heart of it is map() — rescaling three knob readings onto three colour channels.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY16-SOFTCOLOUR
day: 16
slug: day-16-soft-colour
title: 'Soft colourful light: map input to colour'
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire three knobs to three input pins and the RGB LED to three PWM pins, upload
  the Arduino sketch, and turn the knobs to mix any colour by hand. Under the
  colours sits the real lesson — map(), the single line that rescales one range
  onto another, so a knob reading of 0 to 4095 can drive a colour channel of 0
  to 255.
unlocks: You can read map() as plain proportional arithmetic and match its input ends to a sensor's real span, so any reading drives its output across the full range.
seoDescription: >
  Wire three potentiometers and an RGB LED to the ESP32-S3, upload the sketch,
  and mix colours by hand — each knob maps its reading onto one PWM colour
  channel in real time.

hero:
  instrument: none
  headline: Mix your own colour|with three {knobs}
  lede: >
    Today the colour mixing moves into your hands. Three knobs each feed a
    reading to the board, and one line of arithmetic — map() — rescales each
    reading onto one colour's brightness, red, green, and blue on their own
    channels. Learn how that one line works and you hold the move that turns any
    sensor into any output for the rest of the course.
  pills:
    - { text: About 25 minutes, key: true }
    - Arduino first
    - MicroPython optional
    - Day 13's reading meets Day 9's dome

