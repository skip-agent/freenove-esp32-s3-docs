steps:
  intro: >
    The whole day is upload-and-watch. Tap each step as you go to keep your
    place — you can finish without opening a single field note.
  items:
    - Plug the ESP32-S3 into your computer with a data-capable USB-C cable.
    - In Arduino IDE, select your ESP32-S3 board and the port it appears on.
    - Open `Sketch_01.1_Blink.ino`.
    - Press **Upload** and wait for the IDE to say `Done uploading`.
    - Watch the small onboard LED near the chip start to blink. {ledBuiltin}
  done:
    icon: "💡"
    title: It's alive.
    body: Your code is running on the board. Every later day starts from this exact upload-and-watch loop.

code:
  intro: >
    Five short lines. Two of them run once to get ready; three of them repeat
    forever. That's the shape of nearly every Arduino sketch.
  arduino:
    file: Sketch_01.1_Blink.ino
    sketch: C/Sketches/Sketch_01.1_Blink/Sketch_01.1_Blink.ino
    excerpt: |
      #define LED_BUILTIN 2

      void setup() {
        pinMode(LED_BUILTIN, OUTPUT);
      }

      void loop() {
        digitalWrite(LED_BUILTIN, HIGH);   // on
        delay(1000);                       // wait 1 second
        digitalWrite(LED_BUILTIN, LOW);    // off
        delay(1000);                       // wait 1 second
      }
    notes:
      - code: "#define LED_BUILTIN 2"
        text: Names the onboard LED's pin so the rest of the sketch reads plainly.
        explain: define
      - code: pinMode(LED_BUILTIN, OUTPUT)
        text: Runs once in `setup()` to say this pin will push signal out.
        explain: pinMode
      - code: digitalWrite(LED_BUILTIN, HIGH)
        text: Puts 3.3V on the pin so the LED lights; `LOW` puts 0V and it goes dark.
        explain: digitalWrite
      - code: delay(1000)
        text: Freezes the whole program for one second so the pin holds its state before the next line.
        explain: delayMs

theory:
  title: The two-function loop, and what a pin actually does
  summary: setup() runs once to get ready, loop() runs forever, and digitalWrite puts real volts on a pin — 3.3V for HIGH, 0V for LOW.
  intro: >
    Five lines, but they carry the shape of almost every program you'll write on
    this board. Two ideas do the real work- a sketch has one part that runs once
    and one part that repeats forever, and driving a pin HIGH or LOW is literally
    switching 3.3 volts onto a physical wire and off again.
  flow:
    - n: "1"
      title: setup() runs once
      body: >-
        The instant the board gets power or is reset, setup() runs a single time.
        Here it prepares the pin as an output — then it never runs again.
    - n: "2"
      title: loop() runs forever
      body: >-
        When loop() reaches its last line, the board jumps straight back to the
        top and runs it again. With no operating system waiting underneath,
        repeating loop() is the only thing the chip does.
    - n: "3"
      title: HIGH is 3.3 volts
      body: >-
        digitalWrite(pin, HIGH) puts 3.3V onto that physical pin; LOW puts 0V.
        The LED lights because real voltage now sits on its wire — the same 3.3V
        logic you met on Day 1.
    - n: "4"
      title: delay() freezes everything
      body: >-
        delay(1000) stops the whole program for one second. The board holds the
        pin where it is because every other line is frozen too — the count has to
        finish before anything else can run.
  formulaLabel: The shape
  formula: "**setup() once** → **loop() forever** → each pass drives the pin to **3.3V or 0V**"
  notes:
    - title: HIGH is literally 3.3 volts
      explain: logic33
      body: >-
        digitalWrite(pin, HIGH) connects the pin to the board's 3.3V rail; LOW
        connects it to 0V. The LED responds to that real voltage — the same 3.3V
        logic that decides what a pin can safely take in later on.
    - title: setup() once, loop() forever
      explain: setupLoop
      body: >-
        Anything that only needs doing at the start — preparing a pin, opening the
        serial port — belongs in setup(). Anything that should keep happening
        lives in loop(), which the board runs end to end and then restarts, with
        no pause between passes unless you add one.
    - title: Why delay() is a real limitation
      explain: delayMs
      body: >-
        While delay() counts, the processor can do nothing else — it can't read a
        button or drive a second LED on its own rhythm. A plain blink doesn't
        mind. Later days swap delay() for a running clock the program checks, so it
        can keep several things going at once.

test:
  mode: visual
  intro: >
    Nothing prints to the screen today — the proof is on the board itself.
  expectedTitle: What you should see
  readoutLabel: Onboard LED
  expected:
    - The small onboard LED turns on for one second.
    - Then off for one second.
    - Then it repeats, steady, for as long as the board has power.
  expectedNote: The larger LED that stays lit is the power light — look for the smaller one that blinks.
  checksTitle: If it doesn't
  checks:
    - symptom: "Nothing blinks?"
      fix: "Confirm the right board and port are selected, then upload again."
    - symptom: "No `Done uploading`?"
      fix: "Try a different USB-C cable — some are charge-only and carry no data."
    - symptom: "One LED glows steady?"
      fix: "That's the power LED. The blink is a second, smaller LED near the chip."

challenge:
  title: "Try this: blink faster than your eye"
  railLabel: Try this
  intro: >
    The same five lines, driven fast, reveal as much about your own eyes as about
    the board. Speed the blink up far enough and on-off-on-off stops looking like
    blinking and fuses into a single steady light — the effect every screen and
    dimmable bulb leans on.
  summary: Halve the two delay numbers step by step, watch the blink speed up, and keep going until it fuses into what looks like a steady, slightly dim glow once it flickers faster than your eye can resolve.
  cards:
    - title: Halve it, then halve again
      body: Change both `delay(1000)` lines to `delay(500)`, upload, and watch. Then `250`, then `120`, then `60`, re-uploading each time. The blink gets visibly faster at every step.
    - title: Watch it fuse to steady
      explain: delayMs
      body: At about `delay(5)` or below, your eye stops resolving separate blinks and reads one continuous, slightly dim light. The LED is still going fully on then fully off — you're watching persistence of vision, the trick that makes a fast flicker look solid.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    keep it to upload-and-watch and check board, port, and cable before touching
    code. Once it blinks, teach the two-function shape — setup() once, loop()
    forever — and that digitalWrite puts 3.3V or 0V on the pin while delay() blocks
    the whole program as it counts.
  coachInstructions:
    - Keep the day to upload-and-watch; there is nothing to wire.
    - If nothing blinks, check board, port, and a data-capable cable before changing code.
    - Once it works, teach the core model- setup() runs once to get ready, loop() runs forever, and the chip just repeats loop() with no OS to hand back to.
    - Explain that digitalWrite(pin, HIGH) puts 3.3V on the physical pin and LOW puts 0V, and tie it back to Day 1's 3.3V logic.
    - Make the delay() limitation land- while delay counts, nothing else in the program can run, which is why later days use a running clock instead of blocking.
    - For the challenge, have them halve the delay values step by step and watch the blink fuse into steady light (persistence of vision), keeping the working sketch intact.

