tracks: { main: arduino }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Upload five lines and make the board's own onboard LED blink — proof that your
  computer, the USB cable, the board, and the Arduino toolchain all talk to each
  other. Then read those five lines closely, because they hold the shape of nearly
  every sketch you'll write- one part that runs once, one part that repeats
  forever, and a single command that switches real voltage onto a pin.
unlocks: >
  The whole chain works end to end, and you can read the two-function shape of an
  Arduino sketch — setup() once, loop() forever — knowing that driving a pin HIGH
  puts 3.3V onto it and that delay() freezes the entire program while it counts.
seoDescription: >
  Upload your first sketch and blink the ESP32-S3's onboard LED. No wiring — plus
  the two-function program model (setup once, loop forever), what digitalWrite
  does to a pin, and why delay() blocks the whole program.

