lessonCode: TSK-DAY03-BLINK
day: 3
slug: day-03-blink
title: "Blink: prove the whole chain works"
status: published
estimatedTimeMinutes: 15
tracks: { main: arduino }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Make the ESP32-S3's own onboard LED blink from code you upload — proof that
  your computer, the USB cable, the board, and the Arduino toolchain all talk to
  each other.
unlocks: The whole chain works end to end, and a single pin can switch something on and off on a schedule you control.
seoDescription: >
  Upload your first sketch and blink the ESP32-S3's onboard LED. No wiring — just
  proof that your computer, cable, board, and Arduino IDE all work together.

