tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire the joystick module's five pins, upload the Arduino sketch, and watch
  three numbers stream in Serial Monitor — X and Y follow the stick's tilt, and
  Z drops from 1 to 0 when you press straight down.
unlocks: One module can hand the board three readings at once — two smooth analog axes and one crisp digital press, on just three signal pins.
seoDescription: >
  Wire a joystick module to the ESP32-S3, read its X and Y axes with analogRead
  and its push button with digitalRead, and watch all three values stream in
  Serial Monitor.

