steps:
  intro: >
    The whole day is upload, type, and read the reply. Tap each step as you go to
    keep your place — you can finish without opening a single field note.
  items:
    - Plug the ESP32-S3 into your computer with a data-capable USB cable.
    - In Arduino IDE, select your ESP32-S3 board and the port it appears on.
    - Open `Sketch_07.2_SerialRW.ino`.
    - Press **Upload** and wait for the IDE to say `Done uploading`.
    - Open Serial Monitor, set the baud rate to `115200`, and set the line ending to `Newline`. {serial}
    - Type a word into the input box, press Enter, and watch the board echo it back.
  done:
    icon: "🔁"
    title: The line runs both ways.
    body: The board is reading your input and answering. Head to Test & debug to confirm the echo.

code:
  intro: >
    The sketch waits for you. When characters arrive it collects them into one
    message, tidies the ends, and prints that message back. Switch to MicroPython
    if you'd rather see the same idea in Python.
  arduino:
    file: Sketch_07.2_SerialRW.ino
    sketch: C/Sketches/Sketch_07.2_SerialRW/Sketch_07.2_SerialRW.ino
    excerpt: |
      void loop() {
        if (Serial.available()) {
          inputString = Serial.readStringUntil('\n');
          inputString.trim();
          if (inputString.length() > 0) {
            stringComplete = true;
          }
        }

        if (stringComplete) {
          Serial.printf("inputString: %s\r\n", inputString.c_str());
          inputString = "";
          stringComplete = false;
        }
      }
    notes:
      - code: Serial.available()
        text: Reports how many of your characters are sitting in the receive buffer, so the board reads only when something has actually arrived rather than acting on an empty read.
        explain: serialAvailable
      - code: Serial.readStringUntil('\n')
        text: Pulls characters out of the buffer one after another and stops at the Enter key, handing you one whole message instead of loose bytes.
        explain: serialRead
      - code: inputString.trim()
        text: Trims the stray newline and spaces off the ends so the message you act on is exactly what you typed.
      - code: "Serial.printf(\"inputString: %s\\r\\n\", inputString.c_str())"
        text: Sends your message straight back as proof it was read, then the sketch clears its variable and waits for the next line.
        explain: serialPrint
  micropython:
    file: 07.2_Serial_Read_and_Write/Serial_Read_and_Write.py
    path: Python/Python_Codes/07.2_Serial_Read_and_Write/Serial_Read_and_Write.py
    optionalTag: Optional side path · no wiring
    excerpt: |
      print(str("\nESP32S3 initialization completed!\n")
            + str("Please input some characters,\n")
            + str("select \"Newline\" below and click send button. \n"))

      while True:
          print("inputString: ", input())
    notes:
      - code: input()
        text: In MicroPython, input() waits for a line you type in Thonny's shell — the same pause-and-read as Serial.available plus readStringUntil.
      - code: 'print("inputString: ", input())'
        text: Echoes your typed line straight back, just like the Arduino sketch.
    note: >
      Same cable, no wiring. MicroPython's input() reads from Thonny's shell
      instead of Serial Monitor, but the two-way idea is identical. If MicroPython
      isn't set up yet, skip this — it should never block the Arduino-first path.

theory:
  title: How your keystrokes reach the board
  summary: Each character you type crosses the same USB wires into a receive buffer; available() counts what's waiting, read() takes it out one byte at a time, and your code decides what it means.
  intro: >
    Yesterday the cable carried the board's voice out. The reverse trip is the
    whole idea today, and it does not happen the way you might picture. The board
    is not watching your keyboard. Your characters arrive on their own schedule
    and pile up in a small holding area until the sketch gets around to reading
    them. Understanding that gap between arriving and being read is what makes
    input reliable.
  flow:
    - n: "1 · Same wires"
      title: The direction reverses
      body: Nothing new is wired. The two data wires that sent readings out yesterday now carry each key you press back to the board.
    - n: "2 · Into a buffer"
      title: Characters wait to be read
      body: A typed character crosses the cable and lands in the board's receive buffer — a small queue — one byte at a time, whether or not the loop is ready for it.
    - n: "3 · How many waiting"
      title: available() counts
      body: Serial.available() reports how many bytes are sitting in that buffer right now. Zero means nothing has arrived yet.
    - n: "4 · Take one out"
      title: read() empties it
      body: Serial.read() removes the next byte and hands it to your code. readStringUntil is that same read run in a loop until it reaches your Enter key.
    - n: "5 · From byte to command"
      title: Decide what it means
      body: Each byte is a character code — the letter A arrives as the number 65. Compare it or convert it to a number, and the board can act on what you typed.
  formulaLabel: The path in
  formula: "**characters land in a buffer** → **available() counts** → **read() takes one** → **your code acts on it**"
  notes:
    - title: Why check available() before you read
      explain: serialAvailable
      body: Calling read() on an empty buffer returns -1, its stand-in for nothing here. Checking available() first means the board waits for real input instead of mistaking that -1 for something you sent.
    - title: Bytes arrive, not words
      explain: serialRead
      body: The board receives raw character codes one at a time, so a five-letter word is five separate bytes. readStringUntil gathers them up to your Enter key into one whole message; a comparison or toInt() then turns that message into something to act on.

test:
  mode: serial
  intro: >
    Success and recovery sit side by side, so you never have to go hunting when
    something looks off.
  expectedTitle: What you should see
  baud: 115200
  expected:
    - "ESP32S3 initialization completed!"
    - "Ready to receive data..."
    - "(you type) hello"
    - "inputString: hello"
  expectedNote: The start-up lines print once; after that, each line you send comes straight back prefixed with "inputString:".
  checksTitle: If it doesn't
  checks:
    - symptom: "Nothing echoes back?"
      fix: "Set the line ending to Newline so the board sees where your message ends."
    - symptom: "Garbled characters?"
      fix: "Set Serial Monitor to 115200 baud to match the sketch."
    - symptom: "Blank monitor at start?"
      fix: "Confirm the right board and port, then press the board's reset button."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: make it obey a command"
  railLabel: Try this
  intro: >
    Echoing text proves the board read you. Making it do something proves it can
    take orders. The onboard LED needs no wiring, so you can turn your typed words
    into a physical action without touching a single wire.
  summary: Add the onboard LED to the sketch, then make the board switch it with the word you type — first as an on/off command, then by acting on a typed number.
  cards:
    - title: Turn a word into an action
      explain: digitalWrite
      body: 'In setup() add `pinMode(LED_BUILTIN, OUTPUT)`. In the loop, where the message is ready, add `if (inputString == "on") digitalWrite(LED_BUILTIN, HIGH);` and an `off` line that writes LOW. Type on or off and the onboard LED follows your command — the board acting on words, no wiring.'
    - title: Act on a typed value
      explain: ledBuiltin
      body: Replace the word check with `int n = inputString.toInt();` and blink the onboard LED n times. Now a number you type drives real behaviour, and you have watched raw characters become a value the board acts on — exactly the byte-to-command step from the theory.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    keep the core loop to upload-type-read, and check board, port, cable, baud
    rate, and the Newline line ending before touching code. On request, explain
    how input arrives — characters landing in a receive buffer, available()
    counting them, read() taking one at a time, and read() returning -1 on an
    empty buffer — so the learner sees why the sketch checks before it reads.
  coachInstructions:
    - Keep the working day to upload, type, and read the reply; there is nothing to wire.
    - Teach the mechanism when asked - typed characters land in the board's receive buffer one byte at a time, available() reports how many are waiting, and read() takes one out.
    - Explain why the check comes first - read() on an empty buffer returns -1, so available() lets the board wait for real input instead of acting on that -1.
    - Point out that bytes arrive as character codes (A is 65), which is why readStringUntil gathers a whole line and why toInt() or a comparison is what turns input into a command.
    - If nothing echoes back, the Newline line ending is the first thing to check — the board waits for it to end a message; if text is garbled, confirm 115200 baud; if the monitor is blank at start, check board and port and press reset.
    - For the challenge, keep the working read loop and add to it - a word check that switches the onboard LED, then toInt() to act on a typed number; the onboard LED needs no wiring.
    - Keep the Arduino path primary; MicroPython's input() reads from Thonny's shell and is optional only if already set up.

