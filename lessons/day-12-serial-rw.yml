# Day 12 — Serial read and write · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-12-serial-rw/), the agent packet, and the course-map entry.
# The board starts listening — you type, it reads, it answers. Still no wiring.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY12-SERIALRW
day: 12
slug: day-12-serial-rw
title: Type to the board, hear it answer
status: published
estimatedTimeMinutes: 20
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Upload a sketch with no wiring, open Serial Monitor, and type. Each character
  you send crosses the USB cable into a small holding area on the board; the
  sketch checks how much is waiting, reads a whole line, and answers. Learn how
  input actually arrives — one byte at a time, waiting to be read — because that
  is what lets a board stop running a fixed script and start taking commands from
  you while it runs.
unlocks: You understand how typed input reaches the board — landing byte by byte in a receive buffer that available() counts and read() empties — so your code can act on what you type. That turns the board from a fixed program into something you can steer live.
seoDescription: >
  Type into Serial Monitor and watch the ESP32-S3 read your message and echo it
  back. Learn how input arrives byte by byte in a receive buffer, why you check
  Serial.available before reading, and how typed characters become commands.

hero:
  instrument: none
  headline: Type to the board|hear it {answer}
  lede: >
    Yesterday the board only talked. Today it listens. The same two USB wires that
    carried its readings out now carry your keystrokes back in — each character
    landing in a small buffer on the board, waiting there until the sketch reads
    it. Once your code can read what you type, it can act on it, and the board
    becomes something you steer while it runs.
  pills:
    - { text: About 20 minutes, key: true }
    - Arduino first
    - MicroPython optional
    - No wiring today

