# Day 12 — Serial read and write · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-12-serial-rw/), the agent packet, and the course-map entry.
# The board starts listening — you type, it reads, it answers. Still no wiring.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY12-SERIALRW
day: 12
slug: day-12-serial-rw
title: Type to the board, hear it answer
status: published
estimatedTimeMinutes: 15
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Upload a sketch with no wiring, open Serial Monitor, type a message, and watch
  the ESP32-S3 read what you sent and echo it straight back — the USB line
  working both ways for the first time.
unlocks: The USB link runs both ways, so your code can react to what you type — the start of a real conversation between you and the board.
seoDescription: >
  Type into Serial Monitor and watch the ESP32-S3 read your message and echo it
  back. No wiring — just Serial.available and readStringUntil turning USB two-way.

hero:
  instrument: none
  headline: Type to the board|hear it {answer}
  lede: >
    Yesterday the board only talked. Today it listens. You upload a short sketch,
    type a message into Serial Monitor, and the ESP32-S3 reads what you sent and
    sends it right back — the same USB cable now carrying words in both directions.
  pills:
    - { text: About 15 minutes, key: true }
    - Arduino first
    - MicroPython optional
    - No wiring today

