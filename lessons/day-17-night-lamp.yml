# Day 17 — Night lamp · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-17-night-lamp/), the agent packet, and the course-map entry.
# The first day the board reads the world — room light in, lamp brightness out.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY17-NIGHTLAMP
day: 17
slug: day-17-night-lamp
title: "Night lamp: respond to ambient light"
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire a photoresistor and a 10 kΩ resistor into a voltage divider on GPIO 1,
  put an LED on GPIO 14, and upload the Arduino sketch so the lamp answers the
  room's light. Then learn the move underneath every automatic light — holding
  the reading against a threshold so the board decides, on its own, when the room
  has gone dark enough to switch the lamp on.
unlocks: A sensor in a voltage divider lets the ADC read the room, and a threshold turns that reading into a decision — the pattern behind every device that acts on its surroundings with no hand on a switch.
seoDescription: >
  Build a night lamp with the ESP32-S3. A photoresistor voltage divider on GPIO 1
  reads the room's light, and you learn to compare that reading against a
  threshold so the board decides when to switch an LED on GPIO 14.

