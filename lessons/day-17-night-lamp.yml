title: "Night lamp: respond to ambient light"
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire a photoresistor and a 10 kΩ resistor into a voltage divider on GPIO 1,
  put an LED on GPIO 14, upload the Arduino sketch, and watch the lamp shift
  brightness as you cover and light the sensor — the first day the board senses
  the room on its own.
unlocks: A sensor in a voltage divider lets the ADC read the room itself, so the board can respond to its surroundings while your hands stay in your pockets.
seoDescription: >
  Build a night lamp with the ESP32-S3. A photoresistor voltage divider on GPIO 1
  reads the room's light, and the sketch maps that reading onto an LED's
  brightness on GPIO 14.

