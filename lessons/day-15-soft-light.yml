  pins:
    - { from: Pot middle pin, to: GPIO 1, why: The divider's midpoint — the board reads this voltage as a number., explain: adc }
    - { from: Pot outer pin, to: 3.3V, why: Sets the top of the knob's voltage divider at 3.3V., explain: voltageDivider }
    - { from: Pot other outer pin, to: GND, why: Sets the bottom of the divider at 0V., explain: gnd }
    - { from: LED long leg (+), to: GPIO 14 via 220 Ω, why: This pin shades the LED with PWM., explain: pwm }
