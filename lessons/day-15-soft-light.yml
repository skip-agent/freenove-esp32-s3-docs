mission: >
  Wire a potentiometer to one pin and an LED to another, upload the Arduino
  sketch, and turn the knob to set the LED's brightness — the reading on one
  pin drives the glow on the other, live.
unlocks: A number the board reads can drive a number the board writes, so any knob or sensor can steer any light, sound, or motor.
seoDescription: >
  Wire a potentiometer and an LED to the ESP32-S3, upload the sketch, and turn
  the knob to set the LED's brightness — ADC in, PWM out, one loop from hand to
