    share the board today, so check the knob's side and the LED's side
    separately.
  diagram:
    image: day-15/circuit-page-110.png
    alt: >-
      Official Freenove circuit for Soft Light: a potentiometer with its outer
      pins on 3.3V and ground and its middle pin on GPIO 1, and an LED on GPIO
      14 through a 220 ohm resistor to ground, shown as both a schematic and a
      breadboard photo.
    caption: Official Freenove circuit — C Tutorial, Chapter 10 (Potentiometer & LED), page 110.
    zoomCaption: Official Freenove circuit, C Tutorial Chapter 10, page 110.
