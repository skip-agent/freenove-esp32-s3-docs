wiring:
  intro: >
    The official Freenove diagram is your chart — schematic on top, the same
    circuit built on a breadboard below. Click it to enlarge. Two small circuits
    share the board today, so check the knob's side and the LED's side
    separately.
  diagram:
    image: day-15/circuit-page-110.png
    alt: >-
      Official Freenove circuit for Soft Light: a potentiometer with its outer
      pins on 3.3V and ground and its middle pin on GPIO 1, and an LED on GPIO
      14 through a 220 ohm resistor to ground, shown as both a schematic and a
      breadboard photo.
    caption: Official Freenove circuit — C Tutorial, Chapter 10 (Potentiometer & LED), page 110.
    zoomCaption: Official Freenove circuit, C Tutorial Chapter 10, page 110.
    source: { pdf: C_Tutorial.pdf, chapter: 10, chapterTitle: Potentiometer & LED, page: 110 }
  pins:
    - { from: Pot middle pin, to: GPIO 1, why: The board reads the knob's voltage here., explain: adc }
    - { from: Pot outer pin, to: 3.3V, why: Gives the knob its top voltage., explain: potentiometer }
    - { from: Pot other outer pin, to: GND, why: Gives the knob its bottom voltage., explain: gnd }
    - { from: LED long leg (+), to: GPIO 14 via 220 Ω, why: This pin shades the LED with PWM., explain: pwm }
    - { from: LED short leg (−), to: GND, why: Completes the LED's path back to zero volts., explain: led }
  safety:
    - label: Mind the LED's legs.
      icon: "⚓"
      body: >
        The LED only lights one way round — long leg toward GPIO 14 through the
        220 Ω resistor, short leg to ground. Unplug USB before you move any
