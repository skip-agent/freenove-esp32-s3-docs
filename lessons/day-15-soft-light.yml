steps:
  intro: >
    This is the main path — you can finish the day without opening a single
    field note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Stand the potentiometer on the breadboard so each of its three pins lands in its own row. {potentiometer}
    - Wire one outer pot pin to 3.3V and the other outer pin to GND.
    - Run the pot's middle pin to GPIO 1 — this is the wire the board reads. {adc}
    - Place the LED so its long leg (+) is on the GPIO 14 side and its short leg (−) heads toward ground. {led}
    - Put the 220 Ω resistor in series between GPIO 14 and the LED's long leg. {resistor}
    - Compare every wire to the chart before you plug in USB.
    - Open `Sketch_10.1_SoftLight.ino` in Arduino IDE and upload it. {arduino}
    - Turn the knob slowly from end to end and watch the LED follow your hand.
  done:
    icon: "💡"
    title: The knob owns the light.
    body: Every turn of your wrist becomes a brightness. Head to Test & debug to confirm the sweep.

code:
  intro: >
    The whole sketch is four working lines. One line sets up PWM on the LED's
    pin; the loop reads the knob and hands that number straight to the light.
    Switch to MicroPython if you'd rather see the same idea in Python — the
    wiring never changes.
  arduino:
    file: Sketch_10.1_SoftLight.ino
    sketch: C/Sketches/Sketch_10.1_SoftLight/Sketch_10.1_SoftLight.ino
    excerpt: |
      #define PIN_ANALOG_IN   1
      #define PIN_LED         14
      #define CHAN            0
      void setup() {
        ledcAttachChannel(PIN_LED, 1000, 12, CHAN);
      }

      void loop() {
        int adcVal = analogRead(PIN_ANALOG_IN); //read adc
        int pwmVal = adcVal;        // adcVal re-map to pwmVal
        ledcWrite(PIN_LED, pwmVal);    // set the pulse width.
        delay(10);
      }
    notes:
      - code: ledcAttachChannel(PIN_LED, 1000, 12, CHAN)
        text: Sets up PWM on GPIO 14 at 12-bit resolution, so brightness runs 0 to 4095 — the same span the ADC produces.
        explain: ledc
      - code: analogRead(PIN_ANALOG_IN)
        text: Reads the knob's voltage on GPIO 1 as a number from 0 to 4095.
        explain: adc
      - code: ledcWrite(PIN_LED, pwmVal)
        text: Sets the LED's duty to that number. The two scales match, so the raw reading passes straight through as a brightness — the "re-map" comment overstates what this line does.
        explain: pwm
  micropython:
    file: 09.1_Soft_LED/Soft_LED.py
    path: Python/Python_Codes/09.1_Soft_LED/Soft_LED.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      pwm =PWM(Pin(14,Pin.OUT),1000)
      adc=ADC(Pin(1))
      adc.atten(ADC.ATTN_11DB)
      adc.width(ADC.WIDTH_12BIT)

      adcValue=adc.read()
      pwmValue=remap(adcValue,0,4095,0,1023)
      pwm.duty(pwmValue)
    notes:
      - code: adc.width(ADC.WIDTH_12BIT)
        text: Sets the ADC to 12 bits so readings run 0 to 4095 — the same span the Arduino sketch reads.
      - code: remap(adcValue,0,4095,0,1023)
        text: MicroPython's duty here is 10-bit, so the reading is squeezed from 0–4095 down to 0–1023 before it drives the LED.
    note: >
      Same pins, same wiring. MicroPython's duty runs 0–1023, so this version
      remaps the reading down before writing it; the Arduino sketch matches the
      two resolutions so the number passes straight through. Run it in Thonny
      if MicroPython is set up; otherwise skip it — it should never block the
      Arduino-first path.

theory:
  title: One loop from hand to light
  summary: The knob's voltage becomes a number, the number becomes a duty, and the duty becomes brightness — a complete control chain in four lines.
  intro: >
    Everything you've learned about pins joins up today. Day 13 turned a voltage
    into a number; Day 7 turned a number into brightness. This sketch links the
    two, many times a second.
  flow:
    - { n: Sense, title: Knob in, body: analogRead turns the wiper's voltage into a number from 0 to 4095. }
    - { n: Carry, title: One variable, body: pwmVal takes the ADC number straight across — both scales run 0 to 4095. }
    - { n: Act, title: LED out, body: ledcWrite sets the duty so the LED holds that brightness. }
    - { n: Repeat, title: Every 10 ms, body: The loop runs again at once so the light tracks your hand as you turn. }
  formulaLabel: The model
  formula: knob voltage → **ADC number** → PWM duty → brightness
  notes:
    - title: Why there's no map() call
      explain: mapValue
      body: The sketch sets the PWM to 12 bits on purpose. Both scales run 0 to 4095, so the ADC reading is already a valid duty and passes through untouched. When the scales differ — as in the MicroPython version — you remap first.
    - title: What the potentiometer is doing
      explain: potentiometer
      body: Its two outer pins hold 3.3V and 0V across a resistive track, and the middle pin slides along that track as you turn — picking off any voltage in between.

test:
  mode: visual
  intro: >
    Nothing prints to the screen today — the proof is the LED under your
    fingertips.
  expectedTitle: What you should see
  readoutLabel: LED
  expected:
    - Turn the knob to one end — the LED sits dark.
    - Turn it to the other end — the LED reaches full brightness.
    - Everywhere in between, the brightness follows the knob smoothly, with no jumps or dead spots.
  expectedNote: Which end is dark depends on which outer pin you wired to GND — either way round is a working circuit.
  checksTitle: If it doesn't
  checks:
    - symptom: "LED stuck at full or stuck dark?"
      fix: "Check the pot's middle-pin wire — it must reach GPIO 1."
    - symptom: "Turning the knob changes nothing?"
      fix: "Check the outer pot pins — one to 3.3V, one to GND."
    - symptom: "LED dark at every knob position?"
      fix: "Check the LED's direction and the 220 Ω resistor on the GPIO 14 side."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: bend the response"
  railLabel: Try this
  intro: >
    Same working circuit, one line to play with — the line that carries the
    number across. It fits inside today's 20 minutes.
  summary: Reverse the knob so turning up dims the light, then turn the smooth fade into a three-step lamp with if-bands.
  cards:
    - title: Reverse the direction
      body: Change the middle line to `int pwmVal = 4095 - adcVal;` and upload. The light now fades the opposite way as you turn — the same chain, flipped in one subtraction.
    - title: Make a three-step lamp
      explain: threshold
      body: Replace the pass-through with if-bands — below 1000 write 0, up to 3000 write 2048, above that write 4095 — and feel the knob become an off / half / full switch.
  logbook:
    - Which way round did your knob end up — clockwise for brighter or for dimmer?
    - Where did you put the band edges for the three-step lamp, and how did it feel to use?
    - What in your home would you rather control with a knob like this?

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent
    can guide you with full context.
  behaviour: >
    guide one physical connection at a time, wait for you to confirm, explain
    terms on request, and always check wiring, board, port, and USB before
    changing code.
  coachInstructions:
    - Guide one physical connection at a time and wait for learner confirmation before proceeding.
    - The pot's middle pin goes to GPIO 1. One page of the manual's prose names a different pin; the code uses GPIO 1 and the code is truth — always route the middle pin to GPIO 1.
    - If the LED is stuck at full or stuck dark at every position, suspect the middle-pin wire on GPIO 1 first.
    - If turning the knob changes nothing at all, check the outer pot pins on 3.3V and GND.
    - If the LED never lights, check its direction, the 220 Ω resistor, and the GPIO 14 wire before changing code.
    - If asked why there's no map() call, explain that 12-bit PWM matches the 12-bit ADC so the raw reading is already a valid duty; the MicroPython path remaps to 0–1023 and its numbers will differ.

