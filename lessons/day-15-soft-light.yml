# Day 15 — Soft light · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-15-soft-light/), the agent packet, and the course-map entry.
# The first input-drives-output day — a voltage divider (Day 13's knob) sets
# Day 7's brightness.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY15-SOFTLIGHT
day: 15
slug: day-15-soft-light
title: "Soft light: map input to brightness"
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire a potentiometer to one pin and an LED to another, upload the Arduino
  sketch, and turn the knob to set the LED's brightness. Then see the mechanism
  underneath — the knob is a voltage divider that splits 3.3V into a value the
  board reads, and that value becomes the light, live. One unbroken loop, from
  your hand to the glow.
unlocks: You can read a voltage divider as a number and hand it straight to a PWM output — the sense-to-act loop behind every knob, and the same divider a light or heat sensor uses.
seoDescription: >
  Wire a potentiometer and an LED to the ESP32-S3, upload the sketch, and turn
  the knob to set the LED's brightness. The knob is a voltage divider, the ADC
  reads its midpoint, and PWM turns that number into light — one analog control
  loop from hand to glow.

