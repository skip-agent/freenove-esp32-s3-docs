    7-segment display and upload a sketch that sends one byte per character, and
    the display counts 0 through F. Each byte is an encoding: eight bits that say
    which of the seven bars to light. Choosing a character is choosing the right
    byte, and the sketch keeps a table of them so it only has to look each up —
    the same three wires you ran on Day 20.
  pills:
