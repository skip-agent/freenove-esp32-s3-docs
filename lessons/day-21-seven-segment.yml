lessonCode: TSK-DAY21-SEVENSEG
day: 21
slug: day-21-seven-segment
title: "Seven-segment display: show one clear digit"
status: published
estimatedTimeMinutes: 30
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire Day 20's 74HC595 to a 7-segment display and upload the Arduino sketch,
  then watch it count 0 through F, one character per second. The real lesson
  sits underneath: how a numeral turns into a pattern of lit bars, how that
  pattern packs into one byte, and why the sketch keeps a small table of those
  bytes to look up rather than working each character out on the fly.
unlocks: You can read the encoding a seven-segment display runs on — seven bars become eight bits, each numeral is one byte's on-off pattern, and a lookup table turns a chosen digit into the byte the shift register sends.
seoDescription: >
  Drive a 7-segment display from the ESP32-S3 with a 74HC595 shift register.
  Upload the sketch and watch it count 0 through F — one byte per character,
  three wires from the board.

