# Day 21 — Seven-segment display · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-21-seven-segment/), the agent packet, and the course-map entry.
# Same three wires as Day 20 — the shift register now draws a digit you can read.

