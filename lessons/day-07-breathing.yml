# Day 7 — Breathing LED · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-07-breathing/), the agent packet, and the course-map entry.
# The first analog day — a pin learns to fade instead of only switch.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY07-BREATHE
day: 7
slug: day-07-breathing
title: Make an LED breathe
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Keep yesterday's single-LED circuit, upload the Arduino sketch, and watch the
  light fade up to full and back down to dark on a loop. The fade is the part you
  see; the real lesson is how a pin that only knows on and off produces every
  brightness in between — by switching far too fast to watch and staying on for a
  bigger or smaller share of each instant. That one trick, PWM, runs dimmers,
  motor speeds, and servos for the rest of the course.
unlocks: You understand PWM — brightness is the duty cycle, the share of each fast on/off cycle the pin holds on — and you know the ESP32-S3's ledc hardware does that switching so your code just names a level.
seoDescription: >
  Fade an LED on the ESP32-S3 with PWM. Upload the sketch, watch the light breathe
  from dark to full and back, and learn how duty cycle and fast switching turn a
  strictly on-or-off pin into a brightness dial.

