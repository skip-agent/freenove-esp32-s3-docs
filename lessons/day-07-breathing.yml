mission: >
  Wire the same single LED as Blink, upload the Arduino sketch, and watch it fade
  up to full and back down to dark over and over — your first pin that does more
  than switch on and off.
unlocks: A pin can sit at any brightness in between on and off, so the board can shade a light instead of only flipping it.
seoDescription: >
  Fade an LED on the ESP32-S3 with PWM. Upload the sketch and watch the light
  breathe smoothly from dark to full and back — your first analog-feeling output.

