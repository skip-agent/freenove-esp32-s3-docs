    body: The LED is sliding through every brightness in between. Head to Test & debug to confirm the breathing.

code:
  intro: >
    The whole sketch is short. A few lines hand GPIO 2 to a hardware PWM channel;
    two loops then sweep its duty cycle up and back down, which is the brightness
    climbing and sinking. Switch to MicroPython if you'd rather see the same idea in
    Python — the wiring never changes.
  arduino:
    file: Sketch_04.1_BreathingLight.ino
    sketch: C/Sketches/Sketch_04.1_BreathingLight/Sketch_04.1_BreathingLight.ino
    excerpt: |
      #define PIN_LED  2
      #define CHN      0        // PWM channel
      #define FRQ      1000     // switching frequency, Hz
      #define PWM_BIT  8        // resolution: 0-255

      void setup() {
        ledcAttachChannel(PIN_LED, FRQ, PWM_BIT, CHN);
      }

      void loop() {
        for (int i = 0; i < 255; i++) {   // fade in
          ledcWrite(PIN_LED, i);
          delay(10);
        }
        for (int i = 255; i > -1; i--) {  // fade out
          ledcWrite(PIN_LED, i);
          delay(10);
        }
      }
    notes:
      - code: ledcAttachChannel(PIN_LED, FRQ, PWM_BIT, CHN)
        text: Hands GPIO 2 to one of the board's hardware PWM channels at 1000 Hz with 8-bit resolution, so from here the chip does the fast switching itself.
        explain: ledc
      - code: ledcWrite(PIN_LED, i)
        text: Sets the duty cycle from 0 (never on, dark) to 255 (always on, full) — the share of each cycle the pin holds on, which your eye reads as brightness.
        explain: pwm
      - code: for (int i = 0; i < 255; i++)
        text: The first loop walks the duty up and the second walks it back down; delay(10) sets how long each of the steps lingers, so it sets the breathing speed.
        explain: delayMs
  micropython:
    file: 04.1_BreatheLight/BreatheLight.py
    path: Python/Python_Codes/04.1_BreatheLight/BreatheLight.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      pwm = PWM(Pin(2), 10000)

      while True:
          for i in range(1024):      # fade in
              pwm.duty(i)
              sleep_ms(1)
          for i in range(1023, -1, -1):  # fade out
              pwm.duty(i)
              sleep_ms(1)
    notes:
      - code: PWM(Pin(2), 10000)
        text: Sets up PWM on GPIO 2 at 10 kHz — the same fast-switching trick the Arduino sketch uses.
      - code: pwm.duty(i)
        text: Sets brightness by duty, which is how much of each instant the pin is on.
    note: >
      Same pin, same wiring. MicroPython here uses a 10-bit duty (0–1023), so the
      numbers differ from Arduino's 0–255 while the idea is identical. Run it in
      Thonny if MicroPython is set up; otherwise skip it — it should never block
      the Arduino-first path.

theory:
  title: How a pin builds brightness out of time
  summary: A pin can only be fully on or fully off, so PWM fakes every middle brightness by switching fast and holding on for a chosen share of each cycle.
  intro: >
    On Day 3 a pin only ever went full on or full off — HIGH or LOW, nothing
    between. So how does the same pin now sit at half brightness? It doesn't hold
    half a voltage. It switches on and off a thousand times a second and spends part
    of each cycle on. Your eye can't follow flicker that fast, so it averages the
    on-time into a steady brightness. That is pulse-width modulation, and it is the
    mechanism behind almost every "analog" thing the board does.
  flow:
    - { n: The limit, title: A pin is binary, body: The output pin has two settings only — fully on or fully off. There is no dial for half a volt. }
    - { n: The trick, title: Switch faster than sight, body: To fake a middle level PWM flips the pin on and off about 1000 times a second, far past what your eye can resolve. }
    - { n: Duty cycle, title: The share that's on, body: In each on-off cycle the pin holds on for some fraction. On a quarter of the time reads as roughly quarter brightness; on the whole time is full. }
    - { n: The hardware, title: ledc does the switching, body: The board's ledc channels generate the pulses in dedicated hardware, so the processor sets one level and never has to babysit the flicker. }
    - { n: The breath, title: Sweep the duty, body: Sliding the duty from 0 up to 255 and back down is the fade — brightness following the share that's on. }
  formulaLabel: The model
  formula: brightness = **duty cycle** = the share of each fast cycle the pin holds on
  notes:
    - title: Two dials, and only one is brightness
      explain: pwm
      body: Frequency and duty cycle are separate settings. Frequency is how many on-off cycles happen each second (1000 here) and only has to be fast enough to beat your eye. Duty cycle is the share of each cycle that is on, and that one alone sets how bright it looks.
    - title: Set it once, then walk away
      explain: ledc
      body: You attach the pin to a channel a single time in setup(). PWM_BIT is 8, so each cycle is split into 256 slices and the level 0 to 255 chooses how many are on. After that the ledc hardware keeps pulsing on its own while ledcWrite() just names a new level.

test:
  mode: visual
  intro: >
    Nothing prints to the screen today — the proof is the LED fading in front of
    you.
  expectedTitle: What you should see
  readoutLabel: LED
  expected:
    - The LED brightens smoothly from dark up to full.
    - Then it dims smoothly back down to dark.
    - It repeats, over and over, like slow breathing.
  expectedNote: The change should be a smooth slide, never a hard on/off snap. If it snaps, you're likely still running the Blink sketch.
  checksTitle: If it doesn't
  checks:
    - symptom: "LED just blinks hard on and off?"
      fix: "You may be on the Blink sketch — re-upload Sketch_04.1_BreathingLight."
    - symptom: "LED stays dim or dark?"
      fix: "Check the 220 Ω resistor and the GPIO 2 wire, then the LED's direction."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: slow PWM down until you can see it"
  railLabel: Try this
  intro: >
    The fade hides the whole trick, because the switching is too fast to watch.
    Slow the frequency down by a few thousand times and the flicker becomes
    visible — and you can see, with your own eyes, that a duty number is really an
    on-time. Work on a copy of the sketch so today's breathing one stays intact.
  summary: Drop the PWM frequency to a few hertz and hold one fixed brightness so the switching becomes a visible blink, then change the level and watch the on-flash grow and shrink — duty cycle made tangible.
  cards:
    - title: Make the flicker visible
      explain: pwm
      body: On a copy, set `FRQ` to `4` and replace the two fade loops with a single `ledcWrite(PIN_LED, 128)`, then upload. Instead of a steady half-glow the LED now blinks on and off about four times a second — that blink is the switching your eye normally averages into brightness.
    - title: Watch the duty cycle change the on-time
      explain: ledc
      body: Still at `FRQ 4`, try `ledcWrite(PIN_LED, 64)`, then `192`, uploading each. At 64 the on-flash is brief and the dark gap long; at 192 it flips the other way. The number is the duty cycle — the share of each cycle the pin holds on — so you are watching brightness be built out of time. Restore `FRQ 1000` and the fade loops when you're done.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical connection at a time and wait for confirmation, then teach
    how PWM builds brightness out of time — duty cycle as the share each fast cycle
    is on, with the ledc hardware doing the switching. Always check wiring, board,
    port, and USB before changing code.
  coachInstructions:
    - Let the learner see the LED breathe first, then land the mechanism- a pin is only ever on or off, so PWM fakes every in-between brightness by switching fast and holding on for a bigger or smaller share of each cycle.
    - Separate the two dials clearly- frequency is how fast it switches (1000 Hz, just past what the eye can follow) and duty cycle is the share that's on, which is the brightness.
    - Point out that the ledc hardware does the switching- the pin is attached to a channel once in setup(), then ledcWrite() just names a level from 0 to 255 while the chip keeps pulsing on its own.
    - Confirm this is the same single-LED circuit as Blink — LED direction and the 220 Ω series resistor are the usual first mistakes.
    - If the LED snaps hard on and off instead of fading, suspect the Blink sketch is still loaded and have them re-upload 04.1.
    - If the LED stays dim or dark, check the 220 Ω resistor, the GPIO 2 wire, and the LED's direction before changing code.
    - For the slow-frequency experiment, always work on a copy- drop FRQ to about 4 and hold one fixed ledcWrite so the flicker is visible, then restore FRQ 1000 and the fade loops.
    - Keep the Arduino path primary; MicroPython is optional only if already set up, and its 0–1023 duty is expected to differ from Arduino's 0–255.

