    upload a sketch that sweeps the pin's brightness from dark to full and back, so
    the light breathes like a slow tide. The pin still only knows on and off — the
    fade is that pin flicking thousands of times a second, held on a little longer
    or shorter each moment. Understand that, and the dimmers, motor speeds, and
    tones later in the course are all the same move.
