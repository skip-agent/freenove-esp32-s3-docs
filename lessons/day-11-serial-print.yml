# Day 11 — Serial print · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-11-serial-print/), the agent packet, and the course-map entry.
# The first day the board talks back — no wiring, just words over USB.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY11-SERIALPRINT
day: 11
slug: day-11-serial-print
title: Make the board talk back
status: published
estimatedTimeMinutes: 20
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Upload a sketch with no wiring at all, open Serial Monitor, and watch the
  ESP32-S3 print a start-up line and then count its own running time in seconds.
  This is the day you gain a window into a running program — the one tool that
  turns every later "why isn't it working?" into a question you can actually
  answer by asking the board what it's doing.
unlocks: The board can send text back over USB, so from here on you can watch a variable's real value instead of inferring it from lights and guesses. This is the debugging tool the rest of the course leans on.
seoDescription: >
  Open Serial Monitor and watch the ESP32-S3 print text over USB. No wiring — just
  Serial.begin, println, and printf reporting the board's running time in seconds,
  and why serial is your main debugging tool.

