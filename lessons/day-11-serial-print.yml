  headline: Make the board|{talk back}
  lede: >
    No wiring today. You upload a short sketch, open Serial Monitor, and the
    ESP32-S3 starts sending text up the same USB cable that carries your code — a
    start-up line first, then a running clock that ticks up every second. The same
    cable, now running text the other way, becomes your window into the program.
  pills:
    - { text: About 20 minutes, key: true }
    - Arduino first
    - MicroPython optional
    - Your main debug tool

