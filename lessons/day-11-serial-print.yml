steps:
  intro: >
    The whole day is upload, open the monitor, and read. Tap each step as you go
    to keep your place — you can finish without opening a single field note.
  items:
    - Plug the ESP32-S3 into your computer with a data-capable USB cable.
    - In Arduino IDE, select your ESP32-S3 board and the port it appears on.
    - Open `Sketch_07.1_SerialPrinter.ino`.
    - Press **Upload** and wait for the IDE to say `Done uploading`.
    - Open Serial Monitor and set the baud rate to `115200`. {serial}
    - Watch the start-up line appear, then a running-time count that climbs every second.
  done:
    icon: "📡"
    title: The board has a voice.
    body: Your ESP32-S3 is sending text back over USB, and you can read what it's thinking. Head to Test & debug to confirm what should scroll past.

code:
  intro: >
    The whole sketch is short. Two lines in `setup()` open the link and announce
    the board is ready; the `loop()` prints a running-time line once a second.
    Switch to MicroPython if you'd rather see the same idea in Python.
  arduino:
    file: Sketch_07.1_SerialPrinter.ino
    sketch: C/Sketches/Sketch_07.1_SerialPrinter/Sketch_07.1_SerialPrinter.ino
    excerpt: |
      void setup() {
        Serial.begin(115200);
        Serial.println("ESP32S3 initialization completed!");
      }

      void loop() {
        Serial.printf("Running time : %.1f s\r\n", millis() / 1000.0f);
        delay(1000);
      }
    notes:
      - code: Serial.begin(115200)
        text: Opens the USB serial link and sets its speed to 115200 baud — the same number Serial Monitor has to use, so both ends read the stream the same way.
        explain: serialBegin
      - code: Serial.println("ESP32S3 initialization completed!")
        text: Sends one line of text up the cable, then moves to the next line — a start-up marker that proves the link is live before any real data flows.
        explain: serialPrint
      - code: 'Serial.printf("Running time : %.1f s\r\n", millis() / 1000.0f)'
        text: Slots a live value into a text template — one decimal place — and sends it, so a number inside the program becomes something you can read.
        explain: millis
  micropython:
    file: 07.1_Serial_Print/Serial_Print.py
    path: Python/Python_Codes/07.1_Serial_Print/Serial_Print.py
    optionalTag: Optional side path · no wiring
    excerpt: |
      import time

      print("ESP32S3 initialization completed!")

      while True:
          print("Running time : ", time.ticks_ms()/1000, "s")
          time.sleep(1)
    notes:
      - code: print("ESP32S3 initialization completed!")
        text: In MicroPython, print() sends text up the same USB serial link [Thonny](https://thonny.org) reads.
      - code: time.ticks_ms()/1000
        text: Milliseconds since the board started, divided into seconds — the same running clock as the Arduino sketch.
    note: >
      Same cable, no wiring. MicroPython's print() lands in Thonny's shell instead
      of Serial Monitor, but the idea is identical. If MicroPython isn't set up
      yet, skip this — it should never block the Arduino-first path.

theory:
  title: Serial is your window into a running program
  summary: The USB-to-serial bridge from Day 2 now runs the other way — text from the board to your screen — which is the only way to see a value the program holds but never shows.
  intro: >
    On Day 2 the USB-to-serial bridge carried your code down onto the board. It
    runs both directions. Today the same wire carries text back up, so the board
    can report what it's actually doing. Everything before this you judged from the
    outside — a light on, a light off. From here you can ask the board directly,
    which is why serial is the single most useful debugging tool in the course.
  flow:
    - n: "1 · Open the link"
      title: "Serial.begin"
      body: "One line puts the USB bridge into text mode and fixes its speed. Until this runs, the board has no voice."
    - n: "2 · Agree on speed"
      title: "Same baud"
      body: "Baud is bits per second, and both ends must use the same number. Serial Monitor set to 115200 reads the board's 115200 stream cleanly; a mismatch samples the wire at the wrong rate and prints garbage."
    - n: "3 · Send characters"
      title: "print / println"
      body: "Each print pushes characters up the cable to your screen. printf slots a live value into a template first, so a number inside the program lands as readable text."
    - n: "4 · See the invisible"
      title: "Watch it change"
      body: "millis() rises with no light to show it. Printing it every second makes an internal value visible and live — the essence of debugging."
  formulaLabel: The rule
  formula: readable text needs **board baud** = **monitor baud**
  notes:
    - title: Why a wrong baud is garbage, not silence
      explain: serialBegin
      body: The characters still arrive on the wire. Baud sets how often each side reads the signal, so a mismatched monitor samples between the real bits and reconstructs the wrong letters. The fix is always to match the number, never to resend.
    - title: Printing is how you debug from here on
      explain: serialPrint
      body: When a later sketch misbehaves, a print of the suspect value tells you what the code truly saw — a sensor reading, a state, a counter — instead of guessing from an LED. Reach for a print before you rewrite anything.

test:
  mode: serial
  intro: >
    Success and recovery sit side by side, so you never have to go hunting when
    something looks off.
  expectedTitle: What you should see
  baud: 115200
  expected:
    - "ESP32S3 initialization completed!"
    - "Running time : 1.0 s"
    - "Running time : 2.0 s"
    - "Running time : 3.0 s"
  expectedNote: The first line prints once at start-up; the running time then climbs by about one each second.
  checksTitle: If it doesn't
  checks:
    - symptom: "Garbled or random characters?"
      fix: "The characters are arriving; the monitor is reading them at the wrong rate. Set Serial Monitor to 115200 to match the sketch."
    - symptom: "Blank monitor?"
      fix: "Confirm the right board and port, then press the board's reset button so setup() runs and prints the start-up line again."
    - symptom: "Only the first line, no count?"
      fix: "Give it a second — the running time prints once per delay(1000)."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: reveal the board's real speed"
  railLabel: Try this
  intro: >
    Printing earns its keep when it shows you something you could never see from
    the outside. Add a value the program has always held, then make the invisible
    obvious. No wiring, and it fits inside today's time.
  summary: Add a counter that the loop increments and prints, then remove the delay so you watch how fast the board truly runs — a number that was there all along but had no way to show itself.
  cards:
    - title: Print a hidden counter
      explain: serialPrint
      body: "Before `setup()`, add `int count = 0;`. Inside `loop()`, add `count = count + 1;` then `Serial.println(count);`. Re-upload. You're now watching a value that lived inside the program every run before this, invisible until you printed it."
    - title: Take the brake off
      explain: millis
      body: "Comment out `delay(1000);` and re-upload. The counter stops climbing once a second and races into the thousands — the board was always looping this fast, and printing is the only reason you can see it. That is debugging: making the code's real behaviour visible."

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    keep it to upload-and-read, check board, port, cable, and baud before touching
    code, and frame serial as the learner's main debugging tool — the way to see a
    value the program holds. Explain Serial.begin, println, and millis on request.
  coachInstructions:
    - Keep the day to upload-and-read; there is nothing to wire.
    - Frame serial as a window into a running program — the same USB bridge from Day 2, now carrying text from the board back to the screen.
    - If the monitor shows garbled text, explain the characters are arriving but read at the wrong rate; the fix is to set the monitor to 115200 to match the sketch.
    - If the monitor is blank, check board, port, and a data-capable cable, then have the learner press reset so setup() prints again.
    - For the challenge, help them add a counter and print it, then remove delay(1000) so they see how fast the board really loops — the point is that printing reveals a value they could not otherwise see.
    - Keep the Arduino path primary; MicroPython's print() lands in Thonny's shell and is optional only if already set up.

