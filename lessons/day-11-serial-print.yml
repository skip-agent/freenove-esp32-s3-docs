lessonCode: TSK-DAY11-SERIALPRINT
day: 11
slug: day-11-serial-print
title: Make the board talk back
status: published
estimatedTimeMinutes: 15
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Upload a sketch with no wiring at all, open Serial Monitor, and watch the
  ESP32-S3 print a start-up line and then count its own running time in seconds —
  the board's first words back to you over the USB cable.
unlocks: The board can send text back to your computer over USB, so you can watch what your code is doing instead of only guessing from lights.
seoDescription: >
  Open Serial Monitor and watch the ESP32-S3 print text over USB. No wiring — just
  Serial.begin, println, and printf reporting the board's running time in seconds.

