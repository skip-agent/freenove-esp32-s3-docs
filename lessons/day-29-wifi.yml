# Day 29 — Wi-Fi modes · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-29-wifi/), the agent packet (/course/packets/…json), and the
# course-map entry. The board's radio wakes up — no wiring, just credentials.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY29-WIFI
day: 29
slug: day-29-wifi
title: Put the board on the network
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Upload the Wi-Fi station sketch with your own network name and password, and
  watch the ESP32-S3 join your router over Serial Monitor. Learn what joining a
  network actually means — the board finds your network by name, proves the
  password, and the router hands it an IP address of its own — then read that
  address back and reach the board across your network to prove it is really on
  it. That is the doorway to Day 30, where another machine talks to the board.
unlocks: You understand how the board joins a Wi-Fi network as a station and is handed its own IP address by the router, how that differs from access-point mode where the board hosts the network, and how other machines can now reach the board by that address.
seoDescription: >
  Connect the ESP32-S3 to Wi-Fi in station mode: the board finds your network by
  name, authenticates with the password, and the router assigns it an IP address
  you read in Serial Monitor. Then reach the board with a ping to confirm it is
  on your network, and see how station mode differs from access-point mode.

