steps:
  intro: >
    The whole day is edit two lines, upload, and read the monitor. Tap each step
    as you go to keep your place — you can finish without opening a single field
    note.
  items:
    - Plug the ESP32-S3 into your computer with a data-capable USB cable. {usbData}
    - Open `Sketch_23.1_WiFi_Station.ino` in Arduino IDE. {stationMode}
    - Replace both `"********"` strings with your own Wi-Fi name and password — keep the double quotes, and use your 2.4 GHz network. {wifi}
    - Select your ESP32-S3 board and its port, then press **Upload**.
    - Open Serial Monitor and set the baud rate to `115200`. {serial}
    - Watch `Setup start`, then dots while the board negotiates, then the IP address your router assigns. {ipAddress}
    - Note that address down — Day 30 dials it.
  done:
    icon: "📶"
    title: You're aboard the network.
    body: Your ESP32-S3 holds an address on your Wi-Fi. Head to Test & debug to confirm each line of the monitor.

code:
  intro: >
    The sketch is short enough to read whole. Two lines near the top hold the
    placeholders you replace with your own credentials; `setup()` does all the
    work and `loop()` stays empty. Switch to MicroPython if you'd rather see the
    same idea in Python.
  arduino:
    file: Sketch_23.1_WiFi_Station.ino
    sketch: C/Sketches/Sketch_23.1_WiFi_Station/Sketch_23.1_WiFi_Station.ino
    excerpt: |
      #include <WiFi.h>

      const char *ssid_Router     = "********"; //Enter the router name
      const char *password_Router = "********"; //Enter the router password

      void setup(){
        Serial.begin(115200);
        delay(2000);
        Serial.println("Setup start");
        WiFi.begin(ssid_Router, password_Router);
        Serial.println(String("Connecting to ")+ssid_Router);
        while (WiFi.status() != WL_CONNECTED){
          delay(500);
          Serial.print(".");
        }
        Serial.println("\nConnected, IP address: ");
        Serial.println(WiFi.localIP());
        Serial.println("Setup End");
      }

      void loop() {
      }
    notes:
      - code: WiFi.begin(ssid_Router, password_Router)
        text: Starts the join — the board finds your network by name and offers the password from the two strings above. This is station mode, the board acting as a guest on your network.
        explain: stationMode
      - code: while (WiFi.status() != WL_CONNECTED)
        text: Waits for the router to accept the board, printing a dot every half second — and it will wait forever, so endless dots mean wrong credentials.
        explain: wifi
      - code: Serial.println(WiFi.localIP())
        text: Prints the IP address the router leased once the join succeeds — the board's own number on the network, and the address Day 30 dials.
        explain: ipAddress
  micropython:
    file: 20.1_Station_mode/Station_mode.py
    path: Python/Python_Codes/20.1_Station_mode/Station_mode.py
    optionalTag: Optional side path · no wiring
    excerpt: |
      ssidRouter     = '********' #Enter the router name
      passwordRouter = '********' #Enter the router password

      def STA_Setup(ssidRouter,passwordRouter):
          print("Setup start")
          sta_if = network.WLAN(network.STA_IF)
          if not sta_if.isconnected():
              print('connecting to',ssidRouter)
              sta_if.active(True)
              sta_if.connect(ssidRouter,passwordRouter)
              while not sta_if.isconnected():
                  pass
          print('Connected, IP address:', sta_if.ifconfig())
          print("Setup End")
    notes:
      - code: network.WLAN(network.STA_IF)
        text: Creates the station interface — MicroPython's handle on the board's radio in join-a-network mode.
      - code: sta_if.ifconfig()
        text: Returns the board's network details once connected — the first value is its IP address.
    note: >
      Same radio, same credentials — replace both '********' strings before you
      run it in Thonny. If MicroPython isn't set up yet, skip this — it should
      never block the Arduino-first day.

theory:
  title: What it means to join a network and get an address
  summary: Joining is a short handshake — the board finds your network by name, proves the password, and the router leases it an IP address of its own.
  intro: >
    "Connecting to Wi-Fi" sounds like one thing, but the board runs a three-part
    handshake to get on, and it ends with something it did not have before: an
    address of its own on the local network. Today's sketch runs this in station
    mode — the board joins your network the way a phone does. The same radio can
    play the opposite role, an access point that hosts a network instead, and
    knowing the difference is what makes the address make sense.
  flow:
    - n: "1"
      title: "Associate"
      body: "The board looks for your network by its name, the SSID, and asks the router to let it join."
    - n: "2"
      title: "Authenticate"
      body: "It offers the password you typed into the sketch; the router checks it and either accepts the board or turns it away."
    - n: "3"
      title: "Get an address"
      body: "Once accepted, the router leases the board a free IP address — its own number on the local network, so other devices can find it."
    - n: "4"
      title: "Report"
      body: "The sketch reads that assigned address with localIP and prints it, which is why you always use the number the board shows rather than any example."
  formulaLabel: The two modes
  formula: "station = **join** a network and be handed an address · access point = **be** the network and hand them out"
  notes:
    - title: Why the address is the router's to give
      explain: ipAddress
      body: >
        The router runs a service called DHCP that keeps a pool of free
        addresses and leases one to every device that joins. The board does not
        choose its own number, so the IP it prints will differ from the one in
        this lesson — always read the address the board shows, never the example.
    - title: Station versus access point
      explain: apMode
      body: >
        In station mode the board is a guest on your network, joining a router
        that hands out the addresses. In access-point mode it becomes the network
        itself — broadcasting its own name and leasing addresses to phones that
        join it, with no router involved. The two roles can even run at once.

test:
  mode: serial
  intro: >
    Success and recovery sit side by side, so you never have to go hunting when
    something looks off.
  expectedTitle: What you should see
  baud: 115200
  expected:
    - "Setup start"
    - "Connecting to YourNetworkName"
    - "......"
    - "Connected, IP address: "
    - "192.168.1.23"
    - "Setup End"
  expectedNote: >
    Your network name and the address itself will differ — the IP is whatever
    your router assigns. A handful of dots is normal; they should stop within a
    few seconds.
  checksTitle: If it doesn't
  checks:
    - symptom: "Dots marching forever?"
      fix: "The network name or password is wrong. Fix both strings in the sketch, re-upload, and press reset — the loop has no timeout."
    - symptom: "Your network never connects at all?"
      fix: "The board speaks 2.4 GHz Wi-Fi only. Check that your router broadcasts a 2.4 GHz band."
    - symptom: "Blank monitor?"
      fix: "Confirm 115200 baud, then the board and port."
    - symptom: "Ping gets no reply?"
      fix: "Ping the exact address the monitor printed, from a computer on the same 2.4 GHz network, and allow a few seconds — the board answers once it is fully joined."

challenge:
  title: "Try this: reach the board across your network"
  railLabel: Try this
  intro: >
    The address the monitor printed is a real, routable number — not a label the
    board keeps to itself. The fastest way to prove the board is truly on your
    network, and to set up Day 30, is to reach it from another machine that
    shares the same Wi-Fi.
  summary: Read the board's IP address from Serial Monitor, ping it from a computer on the same network to confirm the board answers, then note the address for Day 30.
  cards:
    - title: Read the address
      explain: ipAddress
      body: >
        In Serial Monitor, find the line after `Connected, IP address:` —
        something like `192.168.1.23`. That is the board's own number on your
        network, leased to it by the router. Copy it exactly.
    - title: Ping it from your computer
      body: >
        On a computer joined to the same 2.4 GHz Wi-Fi, open a terminal and run
        `ping 192.168.1.23`, swapping in your board's address. Replies coming
        back mean the board is reachable at that address — the whole point of
        putting it on the network. On macOS or Linux press Ctrl-C to stop.
    - title: Note it for Day 30
      explain: ipAddress
      body: >
        Write the address down. Day 30 has your computer dial exactly this
        number to open a connection to the board, so keeping it handy saves a
        re-upload. If the board reboots you can reopen the monitor to read it
        again.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    teach what joining a network actually means — the board finds the network by
    name, authenticates with the password, and the router leases it an IP address
    of its own — and keep credentials private, since the learner edits them into
    the sketch locally, never into chat. Before touching code, check the 2.4 GHz
    band, both placeholder strings, and the baud rate. Have the learner read the
    printed address and reach the board with a ping to prove it is on the network.
  coachInstructions:
    - Never ask the learner to paste their Wi-Fi password into the chat; have them edit the two strings in the sketch locally.
    - Teach the join as three moves — the board associates with the network by name, authenticates with the password, and the router leases it an IP address of its own.
    - Make the router-assigned address concrete- it comes from the router's DHCP, so the board's IP will differ from any example; always use the one the serial monitor prints.
    - Draw the contrast with access-point mode when it helps- in station mode the board joins a network and is handed an address; in AP mode it hosts a network and hands addresses out.
    - If dots march forever, the network name or password is wrong — have the learner fix both `"********"` strings, re-upload, and press reset; the connect loop has no timeout.
    - The board joins 2.4 GHz networks only; if it never connects, confirm the router broadcasts a 2.4 GHz band before touching code.
    - Remind the learner to keep the double quotes around the credentials and to match the network name exactly, including capitals.
    - For the challenge, have the learner ping the printed IP from a computer on the same network to confirm the board is reachable, and note the address for Day 30.
    - Keep the Arduino path primary; MicroPython is optional only if already set up.

