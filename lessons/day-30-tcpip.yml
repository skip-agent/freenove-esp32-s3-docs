steps:
  intro: >
    All the wiring days led here — today the path is code, one download, and a
    conversation across your own network. Tap each step as you go to keep your
    place.
  items:
    - Open `Sketch_24.2_WiFiServer.ino` in Arduino IDE.
    - Replace the two `********` placeholders with your own Wi-Fi name and password — the same network your computer is on. {wifi}
    - On your computer, install Processing from [processing.org/download](https://processing.org/download).
    - In Processing, add the [ControlP5](https://github.com/sojamo/controlp5) library — Sketch → Import Library → Add Library, then search ControlP5.
    - Back in the sketch folder, open the bundled `sketchWiFi/sketchWiFi.pde` in Processing and click Run.
    - Upload the Arduino sketch, then open Serial Monitor at `115200` and watch the board join your network and print its IP address and port 80. {ipAddress}
    - In sketchWiFi, choose **TCP CLIENT** mode, enter the board's printed IP and port `80`, and connect. {tcp}
    - Type a line in sketchWiFi and press Enter — it lands in Serial Monitor. Answer from Serial Monitor's send box — it lands in sketchWiFi.
  done:
    icon: "⚓"
    title: Two machines, one line.
    body: >
      Text is crossing your own network between computer and board. Head to
      Test & debug to confirm the exchange — the last check of the voyage.

code:
  intro: >
    The sketch does two jobs. `setup()` joins your Wi-Fi as a station, prints
    the address the router assigned, and starts the server; `loop()` is a
    relay, carrying each line from the network to the monitor and each line
    from the monitor to the network. Switch to MicroPython to see the same
    idea in raw sockets.
  arduino:
    file: Sketch_24.2_WiFiServer.ino
    sketch: C/Sketches/Sketch_24.2_WiFiServer/Sketch_24.2_WiFiServer.ino
    variant: C/Sketches/Sketch_24.1_WiFiClient/Sketch_24.1_WiFiClient.ino
    excerpt: |
      #define port 80
      WiFiServer  server(port);

      WiFi.begin(ssid_Router, password_Router);
      server.begin(port);

      WiFiClient client = server.accept();               // listen for incoming clients
      Serial.println(client.readStringUntil('\n')); // print it out the serial monitor
      client.print(Serial.readStringUntil('\n')); // print it out the client.
    notes:
      - code: WiFi.begin(ssid_Router, password_Router)
        text: Joins your router's network as a station — the router hands the board an IP address.
        explain: stationMode
      - code: server.begin(port)
        text: Starts listening at port 80 — a numbered door other machines can knock on.
        explain: tcp
      - code: client.print(Serial.readStringUntil('\n'))
        text: Reads the line you typed in Serial Monitor and sends it down the network to the computer.
        explain: serialRead
  micropython:
    file: 21.2_TCP_as_Server/TCP_as_Server.py
    path: Python/Python_Codes/21.2_TCP_as_Server/TCP_as_Server.py
    optionalTag: Optional side path · no wiring
    excerpt: |
      port           =   8000            #input the remote port
      listenSocket = socket.socket()
      listenSocket.bind((ip,port))
      listenSocket.listen(1)
      print ('tcp waiting...')
      conn,addr = listenSocket.accept()
      print(addr,"connected")
      conn.send('I am Server')
    notes:
      - code: listenSocket.bind((ip,port))
        text: Ties the listening socket to the board's own address and to port 8000.
      - code: conn.send('I am Server')
        text: The first line down the wire the moment a client connects.
    note: >
      Raw sockets this time, and port 8000 where the C sketch uses 80 — dial
      whichever port the running code printed. Run it in [Thonny](https://thonny.org) if MicroPython
      is set up; otherwise skip it — it should never block the Arduino-first
      day.

theory:
  title: How two machines talk over a network
  summary: A server listens at an address and a port, a client dials that exact address and port, and then both ends read and write one reliable stream that always arrives in order. That is how the whole web moves data, and your board now does it too.
  intro: >
    Yesterday the board earned an address on your network. Today it puts that
    address to work and holds a real conversation with another machine. Every
    connection on the internet — every page you load, every message you send —
    is the same four-beat exchange you are about to run entirely inside your own
    router.
  flow:
    - n: "Join"
      title: "The board gets an address"
      body: "In station mode the board joins your Wi-Fi and the router hands it an IP address — its number on the network, printed to Serial Monitor for you to copy."
    - n: "Listen"
      title: "It opens a port"
      body: "Calling server.begin() makes the board wait at port 80 — a numbered door at that address. Ports are how one machine can host many services at once, each behind its own door."
    - n: "Dial"
      title: "The other machine calls in"
      body: "Your computer takes the client role. It dials the exact IP and port the monitor printed, the board accepts, and the two are now joined."
    - n: "Stream"
      title: "One reliable line, both ways"
      body: "Once joined, both ends read and write the same stream of bytes. TCP re-sends anything that goes missing and hands each side the bytes in the order they were sent, so you just watch whole lines of text arrive intact."
  formulaLabel: The model
  formula: "**server** listens at an address and port → **client** dials that address and port → one reliable stream, in order, both ways"
  notes:
    - title: Day 29 gave it the address
      explain: ipAddress
      body: Yesterday the board joined the network and the router handed it a number. Today it opens a door at that number and offers a service that answers when dialled — an address, a port, and something listening.
    - title: Why the stream is reliable
      explain: tcp
      body: Networks drop and shuffle pieces of data all the time. TCP hides that for you — it numbers each chunk, re-sends anything that goes missing, and reassembles them in order before your code ever sees them. You read clean text in the right sequence, and every web server in the world leans on exactly this.
    - title: One address, many doors
      body: A port is a number that picks which service you mean at an address. The board answers on 80 here, while other ports could serve other things — which is how a single machine hosts many services at once without them getting tangled.

test:
  intro: >
    Success and recovery sit side by side, so you never have to go hunting when
    something looks off.
  expectedTitle: What you should see
  baud: 115200
  expected:
    - "Connecting to YourNetworkName"
    - "....."
    - "WiFi connected."
    - "IP address: 192.168.1.42"
    - "IP port: 80"
    - "Client connected."
    - "hello from the chart table"
    - "Client Disconnected."
  expectedNote: >
    Your address will differ — always dial the one your monitor just printed.
    The middle lines are whatever the two machines say to each other.
  checksTitle: If it doesn't
  checks:
    - symptom: "Dots forever?"
      fix: "Re-check the Wi-Fi name and password in the sketch, confirm the network has a 2.4 GHz band, then press the board's reset button."
    - symptom: "Processing can't connect?"
      fix: "Both machines must be on the same network — and use the IP the monitor just printed, since it changes between networks."
    - symptom: "ControlP5 error on Run?"
      fix: "Install the library from Processing's Add Library window, then run the sketch again."
    - symptom: "Nothing arrives?"
      fix: "Connect before typing, and end every line with Enter."

challenge:
  title: "Try this: dial your board from your phone"
  railLabel: Try this
  intro: >
    One last experiment, and it needs nothing but the phone in your pocket. A
    web browser is a TCP client — the same role sketchWiFi just played. Point one
    at your board, watch the two talk, then teach the board to answer on its own.
    It fits inside today's 30 minutes, and it closes the course.
  summary: From your phone on the same Wi-Fi, open the board's address in a browser and watch the raw request land in Serial Monitor, type a reply back to the phone, then teach the board to answer "aye" to "ahoy" on its own — and note what you'd build next, because the whole kit is yours now.
  cards:
    - title: Let your phone dial in
      explain: tcp
      body: On your phone, joined to the same Wi-Fi, open a browser and go to `http://` followed by the board's printed IP address. The browser dials port 80 — exactly what sketchWiFi did — and the request it sends lands in Serial Monitor as a line beginning `GET /`. Your phone just spoke to your board the way it speaks to any website.
    - title: Make it answer back
      body: With the browser still waiting, type a line into Serial Monitor's send box and press Enter — it travels back down the same connection to your phone. Then, in the sketch, check each incoming line and have the board `client.print("aye\n")` whenever the line contains "ahoy". A two-word protocol that answers on its own, and it's yours.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one step at a time, wait for you to confirm, explain terms on request,
    and check credentials, the 2.4 GHz band, and the printed IP before changing
    code.
  coachInstructions:
    - Guide one step at a time and wait for learner confirmation before proceeding.
    - Endless dots after upload mean credentials or band — confirm both `********` placeholders were replaced and the network broadcasts 2.4 GHz before touching code.
    - If Processing cannot connect, confirm both machines are on the same network and that the learner dialled the exact IP and port the monitor just printed.
    - If ControlP5 errors on Run, install it via Processing's Add Library window before debugging anything else.
    - If lines go missing, have the learner connect first, then type, and end every line with Enter.
    - Ground the mechanism when asked- one side listens as a server at an address and port, the other dials in as a client, and TCP then hands both ends the same reliable stream in order; ports are what let one machine host many services.
    - For the challenge, have them open the board's printed IP in a phone browser on the same Wi-Fi and watch the `GET /` request land in Serial Monitor — proof that a browser is just a TCP client dialling address and port.
    - This is the final day — when the exchange works, invite the learner to note what they'd build next before packing up.

