# Day 30 — TCP/IP · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-30-tcpip/), the agent packet, and the course-map entry.
# The final day — the board becomes a device on the network, and the voyage
# comes to anchor.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY30-TCPIP
day: 30
slug: day-30-tcpip
title: "TCP/IP: a mini web-connected device"
status: published
estimatedTimeMinutes: 30
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Turn the ESP32-S3 into a TCP server on your own Wi-Fi, dial in from your
  computer with the bundled sketchWiFi tool, and pass lines of text both ways —
  the final upload of the course, and the moment your board becomes a
  web-connected device.
unlocks: The board now lives on your network with an address, a port, and a service that answers — the exact shape of every device on the internet.
seoDescription: >
  Turn the ESP32-S3 into a TCP server. Join Wi-Fi, read the board's IP in Serial
  Monitor, dial in from Processing's sketchWiFi tool, and exchange text between
  your computer and your board.

hero:
  instrument: none
  headline: Put your board|on the {network}
  lede: >
    Day thirty — the last leg. The ESP32-S3 joins your Wi-Fi, opens port 80, and
    waits for your computer to dial in. When a line you type on one machine
    appears on the other, your board has become what this course promised on
    day one: a device on the network, with an address, a door, and something
    to say.
  pills:
    - { text: About 30 minutes, key: true }
    - Arduino first
    - MicroPython optional
    - Final day — no wiring

parts:
  intro: >
    Three things on the bench, plus one download for your computer — Processing,
    which arrives in the steps. Tap *Define* on anything unfamiliar; the answer
    opens as a field note you can read and dismiss without losing your place.
  items:
    - name: ESP32-S3 board
      image: shared/item-esp32-s3-board.jpg
      imageKind: Manual photo
      alt: Official manual photo of the ESP32-S3 development board.
      blurb: The brain — today it joins your network and listens.
      explain: esp32
    - name: Arduino IDE
      image: shared/item-arduino-ide.png
      imageKind: Manual screenshot
      alt: Official manual screenshot of the Arduino IDE interface.
      blurb: Uploads the sketch and opens Serial Monitor.
      explain: arduino
    - name: Official sketch
      image: shared/item-official-sketch.png
      imageKind: Manual sketch
      alt: Official manual page showing the WiFi Server sketch and its Serial Monitor output.
      blurb: "`Sketch_24.2_WiFiServer.ino`"
      explain: sketch

steps:
  intro: >
    All the wiring days led here — today the path is code, one download, and a
    conversation across your own network. Tap each step as you go to keep your
    place.
  items:
    - Open `Sketch_24.2_WiFiServer.ino` in Arduino IDE.
    - Replace the two `********` placeholders with your own Wi-Fi name and password — the same network your computer is on. {wifi}
    - On your computer, install Processing from processing.org/download.
    - In Processing, add the ControlP5 library — Sketch → Import Library → Add Library, then search ControlP5.
    - Back in the sketch folder, open the bundled `sketchWiFi/sketchWiFi.pde` in Processing and click Run.
    - Upload the Arduino sketch, then open Serial Monitor at `115200` and watch the board join your network and print its IP address and port 80. {ipAddress}
    - In sketchWiFi, choose **TCP CLIENT** mode, enter the board's printed IP and port `80`, and connect. {tcp}
    - Type a line in sketchWiFi and press Enter — it lands in Serial Monitor. Answer from Serial Monitor's send box — it lands in sketchWiFi.
  done:
    icon: "⚓"
    title: Two machines, one line.
    body: >
      Text is crossing your own network between computer and board. Head to
      Test & debug to confirm the exchange — the last check of the voyage.

code:
  intro: >
    The sketch does two jobs. `setup()` joins your Wi-Fi as a station, prints
    the address the router assigned, and starts the server; `loop()` is a
    relay, carrying each line from the network to the monitor and each line
    from the monitor to the network. Switch to MicroPython to see the same
    idea in raw sockets.
  arduino:
    file: Sketch_24.2_WiFiServer.ino
    sketch: C/Sketches/Sketch_24.2_WiFiServer/Sketch_24.2_WiFiServer.ino
    variant: C/Sketches/Sketch_24.1_WiFiClient/Sketch_24.1_WiFiClient.ino
    excerpt: |
      #define port 80
      WiFiServer  server(port);

      WiFi.begin(ssid_Router, password_Router);
      server.begin(port);

      WiFiClient client = server.accept();               // listen for incoming clients
      Serial.println(client.readStringUntil('\n')); // print it out the serial monitor
      client.print(Serial.readStringUntil('\n')); // print it out the client.
    notes:
      - code: WiFi.begin(ssid_Router, password_Router)
        text: Joins your router's network as a station — the router hands the board an IP address.
        explain: stationMode
      - code: server.begin(port)
        text: Starts listening at port 80 — a numbered door other machines can knock on.
        explain: tcp
      - code: client.print(Serial.readStringUntil('\n'))
        text: Reads the line you typed in Serial Monitor and sends it down the network to the computer.
        explain: serialRead
  micropython:
    file: 21.2_TCP_as_Server/TCP_as_Server.py
    path: Python/Python_Codes/21.2_TCP_as_Server/TCP_as_Server.py
    optionalTag: Optional side path · no wiring
    excerpt: |
      port           =   8000            #input the remote port
      listenSocket = socket.socket()
      listenSocket.bind((ip,port))
      listenSocket.listen(1)
      print ('tcp waiting...')
      conn,addr = listenSocket.accept()
      print(addr,"connected")
      conn.send('I am Server')
    notes:
      - code: listenSocket.bind((ip,port))
        text: Ties the listening socket to the board's own address and to port 8000.
      - code: conn.send('I am Server')
        text: The first line down the wire the moment a client connects.
    note: >
      Raw sockets this time, and port 8000 where the C sketch uses 80 — dial
      whichever port the running code printed. Run it in Thonny if MicroPython
      is set up; otherwise skip it — it should never block the Arduino-first
      day.

theory:
  title: An address, a port, a service
  summary: A server listens at an address and port; a client dials it. That is the whole shape of the internet, and your board now has it.
  intro: >
    Strip away the scale, and every connection on the internet is this same
    four-beat exchange. Today it happens entirely inside your own router.
  flow:
    - { n: Join,   title: Station mode,     body: The board joins your Wi-Fi and the router hands it an address. }
    - { n: Listen, title: A door opens,     body: server.begin() waits at port 80 — one numbered door at that address. }
    - { n: Dial,   title: The client calls, body: Your computer knocks with the exact IP and port the monitor printed. }
    - { n: Talk,   title: One shared line,  body: Both ends read and write the same stream until one hangs up. }
  formulaLabel: The model
  formula: "**server** listens at an address and port → **client** dials it → one shared line"
  notes:
    - title: Day 29 gave it the address
      explain: ipAddress
      body: Yesterday the board joined the network and the router handed it a number. Today it opens a door at that number and offers a service — an address, a port, and something listening.
    - title: What "on the internet" means
      explain: tcp
      body: Every web server in the world is this same shape at larger scale — an address, a port, a service that answers when dialled. Your board now has all three.

test:
  intro: >
    Success and recovery sit side by side, so you never have to go hunting when
    something looks off.
  expectedTitle: What you should see
  baud: 115200
  expected:
    - "Connecting to YourNetworkName"
    - "....."
    - "WiFi connected."
    - "IP address: 192.168.1.42"
    - "IP port: 80"
    - "Client connected."
    - "hello from the chart table"
    - "Client Disconnected."
  expectedNote: >
    Your address will differ — always dial the one your monitor just printed.
    The middle lines are whatever the two machines say to each other.
  checksTitle: If it doesn't
  checks:
    - symptom: "Dots forever?"
      fix: "Re-check the Wi-Fi name and password in the sketch, confirm the network has a 2.4 GHz band, then press the board's reset button."
    - symptom: "Processing can't connect?"
      fix: "Both machines must be on the same network — and use the IP the monitor just printed, since it changes between networks."
    - symptom: "ControlP5 error on Run?"
      fix: "Install the library from Processing's Add Library window, then run the sketch again."
    - symptom: "Nothing arrives?"
      fix: "Connect before typing, and end every line with Enter."

challenge:
  title: "Try this: swap the roles"
  railLabel: Try this
  intro: >
    Same network, one last idea: the roles are a choice. It fits inside today's
    30 minutes — and it closes the course.
  summary: Run the client sketch with sketchWiFi as the server, teach the board to answer "aye" to "ahoy", and note what you'd build next — the whole kit is yours now.
  cards:
    - title: Let the board dial out
      explain: tcp
      body: Open `Sketch_24.1_WiFiClient.ino`, put your computer's address in `REMOTE_IP`, and run sketchWiFi in **TCP SERVER** mode on port 8888. The board dials in and introduces itself — "Hello", then "This is my IP."
    - title: Teach it a word
      body: Back in the server sketch, check each incoming line and have the board `client.print("aye\n")` whenever the line contains "ahoy". A two-word protocol, and it's yours.
  logbook:
    - What was the first line your board and your computer exchanged?
    - Which role did you leave the board in — listening or dialling — and why?
    - Thirty days on, the whole kit is yours. What will you build next?

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one step at a time, wait for you to confirm, explain terms on request,
    and check credentials, the 2.4 GHz band, and the printed IP before changing
    code.
  coachInstructions:
    - Guide one step at a time and wait for learner confirmation before proceeding.
    - Endless dots after upload mean credentials or band — confirm both `********` placeholders were replaced and the network broadcasts 2.4 GHz before touching code.
    - If Processing cannot connect, confirm both machines are on the same network and that the learner dialled the exact IP and port the monitor just printed.
    - If ControlP5 errors on Run, install it via Processing's Add Library window before debugging anything else.
    - If lines go missing, have the learner connect first, then type, and end every line with Enter.
    - This is the final day — when the exchange works, invite the learner to log what they'd build next before packing up.

