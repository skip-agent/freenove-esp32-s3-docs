  instrument: none
  headline: Make input|control {output}
  lede: >
    Today the board starts listening. You wire a push button to one pin and a LED
    to another, then upload a sketch that watches the button and lights the LED
    whenever it's pressed — the smallest complete loop of sense, decide, and act.
  pills:
    - { text: About 25 minutes, key: true }
    - Arduino first
    - MicroPython optional
    - No electronics assumed

