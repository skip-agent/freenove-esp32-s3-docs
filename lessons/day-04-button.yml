wiring:
  intro: >
    The official Freenove diagram is your chart — schematic on top, the same
    circuit built on a breadboard below. Click it to enlarge. Each connection
    tells you where the wire goes and why.
  diagram:
    image: day-04/circuit-page-48.png
    alt: >-
      Official Freenove circuit for Button and LED: a LED on GPIO 2 through a 220
      ohm resistor to ground, and a push button on GPIO 13 held by 10 kilo-ohm
      resistors, shown as both a schematic and a breadboard photo.
    caption: Official Freenove circuit — C Tutorial, Chapter 2 (Button & LED), page 48.
    zoomCaption: Official Freenove circuit, C Tutorial Chapter 2, page 48.
    source: { pdf: C_Tutorial.pdf, chapter: 2, chapterTitle: Button & LED, page: 48 }
  pins:
    - { from: LED long leg (+), to: GPIO 2 via 220 Ω, why: This pin switches the LED on and off., explain: led }
    - { from: LED short leg (−), to: GND, why: Completes the LED's path back to zero volts., explain: gnd }
    - { from: Push button, to: GPIO 13, why: The board reads this pin to feel each press., explain: digitalRead }
    - { from: 10 kΩ resistor, to: 3.3V, why: Holds GPIO 13 HIGH until a press pulls it LOW., explain: pullResistor }
  safety:
    - label: Mind the LED's legs.
      icon: "⚓"
      body: >
        The LED only lights one way round — long leg toward GPIO 2 through the
        220 Ω resistor, short leg to ground. Unplug USB before you move any wire.

steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Place the LED so its long leg (+) is on the GPIO 2 side and its short leg (−) heads toward ground. {led}
    - Put the 220 Ω resistor in series between GPIO 2 and the LED's long leg. {resistor}
    - Wire the push button so one side reaches GPIO 13 and the other reaches ground.
    - Add the 10 kΩ resistor that holds GPIO 13 steady until the button is pressed. {pullResistor}
    - Compare every wire to the chart before you plug in USB.
    - Open `Sketch_02.1_ButtonAndLed.ino` in Arduino IDE and upload it.
    - Press the button and watch the LED.
  done:
    icon: "💡"
    title: Input meets output.
    body: The board is now reacting to you, not to a timer. Head to Test & debug to confirm the press-and-light behaviour.

code:
  intro: >
    The whole sketch is short. Two lines set the pins up; the loop just asks the
    button and answers with the LED. Switch to MicroPython if you'd rather see the
    same idea in Python — the wiring never changes.
  arduino:
    file: Sketch_02.1_ButtonAndLed.ino
    sketch: C/Sketches/Sketch_02.1_ButtonAndLed/Sketch_02.1_ButtonAndLed.ino
    excerpt: |
      #define PIN_LED    2
      #define PIN_BUTTON 13

      void setup() {
        pinMode(PIN_LED, OUTPUT);
        pinMode(PIN_BUTTON, INPUT);
      }

      void loop() {
        if (digitalRead(PIN_BUTTON) == LOW) {
          digitalWrite(PIN_LED, HIGH);   // pressed -> on
        } else {
          digitalWrite(PIN_LED, LOW);    // released -> off
        }
      }
    notes:
      - code: pinMode(PIN_BUTTON, INPUT)
        text: Sets GPIO 13 as an input so the board can read the button.
        explain: pinMode
      - code: digitalRead(PIN_BUTTON) == LOW
        text: True only while the button is held — a press pulls the pin LOW.
        explain: digitalRead
      - code: digitalWrite(PIN_LED, HIGH)
        text: Lights the LED; the else branch turns it off again.
        explain: digitalWrite
  micropython:
    file: 02.1_ButtonAndLed/ButtonAndLed.py
    path: Python/Python_Codes/02.1_ButtonAndLed/ButtonAndLed.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      led = Pin(2, Pin.OUT)
      button = Pin(13, Pin.IN, Pin.PULL_UP)

      if not button.value():
          led.value(1)
      else:
          led.value(0)
    notes:
      - code: Pin(13, Pin.IN, Pin.PULL_UP)
        text: Reads GPIO 13 as an input with a built-in pull-up — the same job the 10 kΩ resistor does in hardware.
      - code: if not button.value()
        text: True when the pin reads LOW, which is the press.
    note: >
      Same pins, same wiring. Run it in Thonny if MicroPython is set up; otherwise
      skip it — it should never block the Arduino-first path.

theory:
  title: How the board reads a button
  summary: An input pin reads its voltage as HIGH or LOW; a pull resistor gives it a resting level so a press has something to flip.
  intro: >
    Driving the LED is the easy half — the board pushes voltage out of a pin.
    Reading the button is the subtle half, because an input pin is a listener, and
    a listener with nothing wired to it invents noise. One resistor fixes that, and
    understanding why is the real lesson of your first wiring day.
  flow:
    - { n: 1 · Listen, title: An input pin, body: "pinMode INPUT turns GPIO 13 into a high-impedance listener. It senses the pin's voltage — near 3.3V reads HIGH, near 0V reads LOW — while drawing almost no current itself, which is exactly what makes it easy to sway." }
    - { n: 2 · The catch, title: A floating pin, body: With nothing holding it, that sensitive input picks up ambient electrical noise from the wiring and even your body, and its reading drifts between HIGH and LOW at random. A pin left floating cannot be trusted. }
    - { n: 3 · The anchor, title: A pull resistor, body: The 10 kΩ resistor ties GPIO 13 up to 3.3V, giving it a steady resting HIGH. The resistor is weak enough that a solid connection elsewhere can still overrule it, which is the whole trick. }
    - { n: 4 · The press, title: Override to LOW, body: "Pressing connects the pin straight to ground through a near-zero-resistance path. That solid path wins over the gentle pull-up, so the pin snaps to LOW — and the sketch reads the change on its very next pass." }
  formulaLabel: The loop
  formula: sense (digitalRead) → **decide** (if) → act (digitalWrite) → repeat
  notes:
    - title: Why a press reads LOW
      explain: activeLow
      body: The pull-up holds GPIO 13 at 3.3V, so at rest it reads HIGH. A press connects the pin to ground and it reads LOW, which is why the sketch checks for LOW. This backwards-feeling wiring is common in real circuits, so it's worth meeting early.
    - title: The pull-up the chip already has
      explain: inputPullup
      body: This circuit wires its own 10 kΩ pull-up and reads the pin with plain INPUT. Every ESP32-S3 input pin also carries a pull-up resistor built into the chip; INPUT_PULLUP switches that one on so you can skip the external part. The MicroPython version does precisely this with Pin.PULL_UP.

test:
  mode: visual
  intro: >
    Nothing prints to the screen today — the proof is the LED under your finger.
  expectedTitle: What you should see
  readoutLabel: LED
  expected:
    - Press and hold the button — the LED lights immediately.
    - Let go — the LED goes dark.
    - It follows your finger with no delay for as long as the board has power.
  expectedNote: This press is momentary — the LED only stays on while you hold it. Tomorrow's lamp will make it latch.
  checksTitle: If it doesn't
  checks:
    - symptom: "LED never lights?"
      fix: "Check the LED's direction and the 220 Ω resistor, then the GPIO 2 wire."
    - symptom: "LED always on?"
      fix: "The button or its 10 kΩ resistor is likely miswired on GPIO 13."
    - symptom: "Nothing responds?"
      fix: "Re-check the shared ground, then that the sketch uploaded."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: make the pin float"
  railLabel: Try this
  intro: >
    The pull resistor is invisible while it works. The way to see what it does is
    to take it out for a minute and watch the input pin lose its footing, then put
    it back and watch the reading settle. It fits inside today's session.
  summary: With power off, remove the 10 kΩ resistor so GPIO 13 floats, run the sketch and watch the LED drift and react to your hand, then restore the resistor and watch the reading go rock steady.
  cards:
    - title: Take the anchor away
      explain: pullResistor
      body: With USB unplugged, remove the 10 kΩ resistor that ties GPIO 13 to 3.3V, so nothing holds the pin. Reconnect USB and run the same sketch. The LED loses its footing — it flickers, drifts, or reacts when your hand comes near the wire — because the floating pin is reading ambient noise with no resting level to hold.
    - title: Put it back
      explain: inputPullup
      body: Unplug USB, wire the 10 kΩ resistor back to 3.3V, then reconnect. The LED goes rock steady — dark at rest, lit only while you press. That steadiness is the resistor's whole job, and INPUT_PULLUP would earn the same result from inside the chip.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical connection at a time, wait for you to confirm, explain
    terms on request, and always check wiring, board, port, and USB before
    changing code. Once the circuit works, use the floating-pin experiment to make
    the pull resistor's job real.
  coachInstructions:
    - Guide one physical connection at a time and wait for learner confirmation before proceeding.
    - Watch for LED polarity and the 220 Ω series resistor — the two most common first-circuit mistakes.
    - Teach the core idea once the circuit works- an input pin is high-impedance, so a floating pin reads random noise and the 10 kΩ pull-up gives it a steady resting level a press can override.
    - Explain the active-low reading- the pull-up holds GPIO 13 HIGH at rest, and a press to ground reads LOW, which is why the sketch checks for LOW.
    - Connect the two code paths- the Arduino sketch uses an external pull-up with plain INPUT, while the MicroPython version uses the chip's built-in pull-up via INPUT_PULLUP (Pin.PULL_UP).
    - If the LED never lights, check its direction, the resistor, the GPIO 2 wire, and the shared ground before changing code.
    - If the LED is always on, suspect the button wiring or its 10 kΩ resistor on GPIO 13.
    - For the challenge, have them remove the pull-up with power off to watch the pin float, then restore it — supervise so USB is unplugged during any rewiring.
    - Offer short explanations on request; do not dump theory before the learner has a working circuit.
    - Keep the Arduino path primary; MicroPython is optional only if already set up.

