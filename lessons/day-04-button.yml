# Day 4 — Button + LED · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-04-button/), the agent packet, and the course-map entry.
# The first wiring day — an input pin now changes what an output pin does.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY04-BUTTON
day: 4
slug: day-04-button
title: Make a button light an LED
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire a push button to one pin and a LED to another, upload the Arduino sketch,
  and watch the LED light the instant you press. Along the way, learn why an input
  pin needs a resistor to read reliably at all — the idea behind every button,
  switch, and sensor you'll wire from here on.
unlocks: A pin can read the world as well as drive it, so the board can react to you instead of only running on a timer.
seoDescription: >
  Wire a push button and a LED to the ESP32-S3, upload the sketch, and make the
  LED light while the button is pressed — your first input-controls-output circuit.

hero:
  instrument: none
  headline: Make input|control {output}
  lede: >
    Today the board starts listening. You wire a push button to one pin and a LED
    to another, then upload a sketch that watches the button and lights the LED
    whenever it's pressed — the smallest complete loop of sense, decide, and act.
    The wiring hides the real lesson: a resistor whose only job is to give the
    input pin a steady reading to start from.
  pills:
    - { text: About 25 minutes, key: true }
    - Arduino first
    - MicroPython optional
    - No electronics assumed

