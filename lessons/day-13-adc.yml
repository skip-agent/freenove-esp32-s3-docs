steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Push the potentiometer into the breadboard so each of its three pins has its own row. {potentiometer}
    - Run a jumper from one outer pin to 3.3V and a second jumper from the other outer pin to GND.
    - Run the third jumper from the middle pin (pin 3) to GPIO 1. {adc}
    - Compare every wire to the chart before you plug in USB.
    - Open `Sketch_08.1_ADC.ino` in Arduino IDE and upload it.
    - Open Serial Monitor and set the baud rate to `115200`. {serial}
    - Turn the knob slowly from one end to the other and watch the numbers sweep.
  done:
    icon: "🎛️"
    title: The board can feel a dial.
    body: Turn the knob and the numbers follow your hand. Head to Test & debug to confirm the full sweep.

code:
  intro: >
    The working part of the sketch is four lines, five times a second — read the
    pin, do one line of arithmetic, print, wait. Switch to MicroPython if you'd
    rather see the same idea in Python — the wiring never changes.
  arduino:
    file: Sketch_08.1_ADC.ino
    sketch: C/Sketches/Sketch_08.1_ADC/Sketch_08.1_ADC.ino
    excerpt: |
      #define PIN_ANALOG_IN  1
      void setup() {
        Serial.begin(115200);
      }

      void loop() {
        int adcVal = analogRead(PIN_ANALOG_IN);
        double voltage = adcVal / 4095.0 * 3.3;
        Serial.printf("ADC Val: %d, \t Voltage: %.2fV\r\n", adcVal, voltage);
        delay(200);
      }
    notes:
      - code: analogRead(PIN_ANALOG_IN)
        text: Measures the voltage on GPIO 1 and returns which of the 4096 steps it lands on, as a number from 0 to 4095.
        explain: adc
      - code: adcVal / 4095.0 * 3.3
        text: Converts the reading back into volts — 4095.0 is the top reading, so a full turn lands exactly on 3.30V.
      - code: 'Serial.printf("ADC Val: %d, \t Voltage: %.2fV\r\n", adcVal, voltage)'
        text: Prints the raw reading and the voltage on one line, five times a second.
        explain: serialPrint
  micropython:
    file: 08.1_AnalogRead/AnalogRead.py
    path: Python/Python_Codes/08.1_AnalogRead/AnalogRead.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      adc=ADC(Pin(1))
      adc.atten(ADC.ATTN_11DB)
      adc.width(ADC.WIDTH_12BIT)

      adcVal=adc.read()
      voltage = adcVal / 4095.0 * 3.3
      print("ADC Val:",adcVal,"\tVoltage:",voltage,"V")
    notes:
      - code: adc.atten(ADC.ATTN_11DB)
        text: Opens the input range so the pin can read the full 0 to 3.3V sweep.
      - code: adc.width(ADC.WIDTH_12BIT)
        text: Sets 12-bit readings — 0 to 4095 — the same scale the Arduino core uses by default.
    note: >
      Same pins, same wiring. MicroPython asks you to set the range and the
      resolution yourself — the two `adc.` lines above — where the Arduino core
      picks those defaults for you. Run it in [Thonny](https://thonny.org) if MicroPython is set up;
      otherwise skip it — it should never block the Arduino-first path.

theory:
  title: Voltage in, number out
  summary: An ADC measures the actual voltage on a pin and reports it as one of 4096 numbered steps — from 0 at ground to 4095 at 3.3V. This is the doorway from the digital world into the analogue one.
  intro: >
    Every day until now, a pin gave your code one bit — high or low, on or off.
    A knob doesn't work in bits; it sits anywhere across a range. Today's chip has
    a piece of hardware, the ADC, built to measure that range and translate it
    into a number. Understanding how it slices the range is the whole lesson.
  flow:
    - n: "Until now"
      title: Pins spoke in two states
      body: >
        Every pin you've used reports one of two things — near 3.3V for HIGH or
        near 0V for LOW, a single bit. A turning knob rests anywhere across that
        span, so reading it needs a pin that can measure the whole voltage, not
        just pick a side.
    - n: "The knob"
      title: Position becomes voltage
      body: >
        The potentiometer wires across 3.3V and ground as a voltage divider you
        turn by hand. Its middle pin — the wiper — taps off a voltage that slides
        smoothly from 0 up to 3.3V as you rotate the shaft.
    - n: "The slice"
      title: Voltage becomes a number
      body: >
        The ADC — analogue-to-digital converter — divides the 0 to 3.3V range into
        4096 evenly spaced steps and reports which step the wiper's voltage lands
        on. That step count is the ADC's resolution — twelve bits, and 2 to the
        12th is 4096 levels.
    - n: "The read"
      title: analogRead hands it over
      body: >
        analogRead returns that step as a whole number from 0 to 4095, five times
        a second. One line of arithmetic scales it back into volts, so you see both
        the raw step and the voltage it stands for.
  formulaLabel: The conversion
  formula: voltage = **reading** ÷ 4095 × 3.3
  notes:
    - title: Why the top step is 4095
      explain: adc
      body: Twelve bits number the steps 0 through 4095, so the count stops one short of 4096 — 4095 is the top step and stands for the full 3.3V, which is why the code divides by 4095.0. Each single step covers about 0.8 mV, since 3.3V is spread across 4096 levels.
    - title: The knob is a divider you turn
      explain: voltageDivider
      body: The resistive track splits 3.3V along its length, and the wiper taps off the share at its position. Turning the shaft moves that tap, so the middle-pin voltage — and the number the ADC reports — follows your hand.
    - title: Why the last digit wobbles
      explain: adc
      body: The finest steps are tiny — under a millivolt each — and any real circuit carries a little electrical noise, so a held reading drifts by a count or two. Judge a knob position by the whole sweep rather than the last digit.

test:
  mode: serial
  intro: >
    Success and recovery sit side by side, so you never have to go hunting when
    something looks off.
  expectedTitle: What you should see
  baud: 115200
  expected:
    - "ADC Val: 0, Voltage: 0.00V"
    - "ADC Val: 2048, Voltage: 1.65V"
    - "ADC Val: 4095, Voltage: 3.30V"
  expectedNote: The values track the knob — one end reads near 0, the other near 4095, and every position between prints its own pair.
  checksTitle: If it doesn't
  checks:
    - symptom: "Stuck at 0 or 4095?"
      fix: "Check the middle-pin wire on GPIO 1, then the two outer pins on 3.3V and GND."
    - symptom: "Garbled or random characters?"
      fix: "Set Serial Monitor to 115200 baud to match the sketch."
    - symptom: "Blank monitor?"
      fix: "Confirm the right board and port, then swap in a data-capable USB cable."
    - symptom: "Reading jitters by a few counts?"
      fix: "That's normal for a real ADC — judge by the whole sweep."

challenge:
  title: "Try this: chart your knob"
  railLabel: Try this
  intro: >
    Same working circuit, one new habit: reading the world through numbers. It
    fits inside today's 20 minutes.
  summary: Find the knob's midpoint by numbers alone, then map three positions to their readings and voltages and see whether the dial's angle maps evenly onto the 0 to 4095 scale.
  cards:
    - title: Find the midpoint
      body: Turn the knob until the reading sits near 2048 — half of 4095. Now look at the shaft. Is it pointing roughly halfway round its travel? You just found a physical position using nothing but a number.
    - title: Map the sweep
      explain: potentiometer
      body: Pick three spots — a quarter turn, halfway, three-quarters — and write down both the reading and the printed voltage at each. Then check the pattern. Does halfway on the dial land near halfway up the scale, close to 2048 and 1.65V? Hold one spot still and watch how few counts the number drifts.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one wire at a time, wait for you to confirm, and explain the analogue
    idea on request — that this pin measures a whole voltage range and reports it
    as a number from 0 to 4095. Always check wiring, board, port, and baud rate
    before changing code.
  coachInstructions:
    - Guide one physical connection at a time and wait for learner confirmation before proceeding.
    - Land the core idea- the ADC measures the actual voltage on GPIO 1 and reports it as a number from 0 to 4095, because twelve bits slice the 0 to 3.3V range into 4096 steps.
    - Connect the number to the knob- have the learner turn until the reading sits near 2048 and confirm the shaft points roughly halfway round.
    - If values sit stuck at 0 or 4095, check the middle-pin wire on GPIO 1 first, then the outer pins on 3.3V and GND.
    - If the monitor shows garbled text, set the baud rate to 115200 before touching anything else.
    - If the monitor is blank, check board, port, and a data-capable USB cable before changing code.
    - A few counts of jitter in a held reading is normal ADC behaviour; have the learner judge by the whole sweep.
    - Keep the Arduino path primary; in MicroPython the atten and width lines are required to match the 0-4095 range.

