lessonCode: TSK-DAY13-ADC
day: 13
slug: day-13-adc
title: Read a knob as a number
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire a rotary potentiometer to GPIO 1, upload the Arduino sketch, and watch
  Serial Monitor print a reading from 0 to 4095 — with its voltage — that
  follows every turn of the knob. Today a pin reads a whole range for the first
  time. You'll see how the ADC slices the 0 to 3.3V span into 4096 steps, and why
  that turns a physical knob into a number your code can use.
unlocks: The board can now measure how much voltage a pin sees — the ADC slices the 0 to 3.3V range into 4096 steps and hands your code a number from 0 to 4095 for the voltage the knob is dialled to.
seoDescription: >
  Wire a rotary potentiometer to the ESP32-S3, upload the sketch, and read the
  knob's position as a number from 0 to 4095 in Serial Monitor — your first
  analogue input with the ADC.

