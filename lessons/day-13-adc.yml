wiring:
  intro: >
    The official Freenove diagram is your chart — schematic on top, the same
    circuit built on a breadboard below. Click it to enlarge. Three wires today,
    and each row below tells you where one goes and why.
  diagram:
    image: day-13/circuit-page-96.png
    alt: >-
      Official Freenove circuit for reading a potentiometer: the pot's two outer
      pins wired to 3.3V and ground, and its middle pin wired to GPIO 1, shown
      as both a schematic and a breadboard photo.
    caption: Official Freenove circuit — C Tutorial, Chapter 8 (AD Converter), page 96.
    zoomCaption: Official Freenove circuit, C Tutorial Chapter 8, page 96.
    source: { pdf: C_Tutorial.pdf, chapter: 8, chapterTitle: AD Converter, page: 96 }
  pins:
    - { from: Pot outer pin 1, to: 3.3V, why: Feeds one end of the knob's track with full voltage., explain: potentiometer }
    - { from: Pot outer pin 2, to: GND, why: Holds the other end of the track at zero volts., explain: gnd }
    - { from: Pot middle pin 3, to: GPIO 1, why: The wiper delivers the in-between voltage for the ADC to read., explain: adc }
  safety:
    - label: Keep the pot on 3.3V.
      icon: "⚓"
      body: >
        GPIO 1 is built to read voltages up to 3.3V, so power the potentiometer
        from the 3.3V pin — the 5V pin would push the wiper past that limit.
        Unplug USB before you move any wire.

steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Push the potentiometer into the breadboard so each of its three pins has its own row. {potentiometer}
    - Run a jumper from one outer pin to 3.3V and a second jumper from the other outer pin to GND.
    - Run the third jumper from the middle pin (pin 3) to GPIO 1. {adc}
    - Compare every wire to the chart before you plug in USB.
    - Open `Sketch_08.1_ADC.ino` in Arduino IDE and upload it.
    - Open Serial Monitor and set the baud rate to `115200`. {serial}
    - Turn the knob slowly from one end to the other and watch the numbers sweep.
  done:
    icon: "🎛️"
    title: The board can feel a dial.
    body: Turn the knob and the numbers follow your hand. Head to Test & debug to confirm the full sweep.

code:
  intro: >
    The working part of the sketch is four lines, five times a second — read the
    pin, do one line of arithmetic, print, wait. Switch to MicroPython if you'd
    rather see the same idea in Python — the wiring never changes.
  arduino:
    file: Sketch_08.1_ADC.ino
    sketch: C/Sketches/Sketch_08.1_ADC/Sketch_08.1_ADC.ino
    excerpt: |
      #define PIN_ANALOG_IN  1
      void setup() {
        Serial.begin(115200);
      }

      void loop() {
        int adcVal = analogRead(PIN_ANALOG_IN);
        double voltage = adcVal / 4095.0 * 3.3;
        Serial.printf("ADC Val: %d, \t Voltage: %.2fV\r\n", adcVal, voltage);
        delay(200);
      }
    notes:
      - code: analogRead(PIN_ANALOG_IN)
        text: Samples the voltage on GPIO 1 and returns a number from 0 to 4095.
        explain: adc
      - code: adcVal / 4095.0 * 3.3
        text: Converts the reading back into volts — 4095.0 is the top reading, so a full turn lands exactly on 3.30V.
      - code: 'Serial.printf("ADC Val: %d, \t Voltage: %.2fV\r\n", adcVal, voltage)'
        text: Prints the raw reading and the voltage on one line, five times a second.
        explain: serialPrint
  micropython:
    file: 08.1_AnalogRead/AnalogRead.py
    path: Python/Python_Codes/08.1_AnalogRead/AnalogRead.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      adc=ADC(Pin(1))
      adc.atten(ADC.ATTN_11DB)
      adc.width(ADC.WIDTH_12BIT)

      adcVal=adc.read()
      voltage = adcVal / 4095.0 * 3.3
      print("ADC Val:",adcVal,"\tVoltage:",voltage,"V")
    notes:
      - code: adc.atten(ADC.ATTN_11DB)
        text: Opens the input range so the pin can read the full 0 to 3.3V sweep.
      - code: adc.width(ADC.WIDTH_12BIT)
        text: Sets 12-bit readings — 0 to 4095 — the same scale the Arduino core uses by default.
    note: >
      Same pins, same wiring. MicroPython asks you to set the range and the
      resolution yourself — the two `adc.` lines above — where the Arduino core
      picks those defaults for you. Run it in Thonny if MicroPython is set up;
      otherwise skip it — it should never block the Arduino-first path.

theory:
  title: Voltage in, number out
  summary: The ADC measures the voltage on a pin and reports it as a number from 0 to 4095 — the knob dials which voltage it sees.
  intro: >
    Two ideas meet today. The potentiometer turns position into voltage, and the
    ADC turns voltage into a number your code can hold.
  flow:
    - { n: Turn, title: Wiper slides, body: The knob moves a contact along a track between 3.3V and ground. }
    - { n: Divide, title: Voltage settles, body: The middle pin sits at a voltage that matches the knob's position. }
    - { n: Sample, title: ADC measures, body: analogRead converts that voltage into a number from 0 to 4095. }
    - { n: Report, title: Serial prints, body: The sketch sends the reading and the voltage up the USB cable five times a second. }
  formulaLabel: The conversion
  formula: voltage = **reading** ÷ 4095 × 3.3
  notes:
    - title: Why the top is 4095
      explain: adc
      body: Twelve bits give 4096 steps numbered 0 through 4095 — so 4095 means the pin sees the full 3.3V, and the code divides by 4095.0 to match.
    - title: The knob is a voltage divider
      explain: voltageDivider
      body: The track splits 3.3V along its length and the wiper taps off the share at its position — a divider you adjust by hand.

test:
  mode: serial
  intro: >
    Success and recovery sit side by side, so you never have to go hunting when
    something looks off.
  expectedTitle: What you should see
  baud: 115200
  expected:
    - "ADC Val: 0, Voltage: 0.00V"
    - "ADC Val: 2048, Voltage: 1.65V"
    - "ADC Val: 4095, Voltage: 3.30V"
  expectedNote: The values track the knob — one end reads near 0, the other near 4095, and every position between prints its own pair.
  checksTitle: If it doesn't
  checks:
    - symptom: "Stuck at 0 or 4095?"
      fix: "Check the middle-pin wire on GPIO 1, then the two outer pins on 3.3V and GND."
    - symptom: "Garbled or random characters?"
      fix: "Set Serial Monitor to 115200 baud to match the sketch."
    - symptom: "Blank monitor?"
      fix: "Confirm the right board and port, then swap in a data-capable USB cable."
    - symptom: "Reading jitters by a few counts?"
      fix: "That's normal for a real ADC — judge by the whole sweep."

challenge:
  title: "Try this: chart your knob"
  railLabel: Try this
  intro: >
    Same working circuit, one new habit: reading the world through numbers. It
    fits inside today's 20 minutes.
  summary: Find the knob's midpoint by numbers alone, map a few positions to their readings, and note how steadily a held value sits.
  cards:
    - title: Find the midpoint
      body: Turn the knob until the reading sits near 2048 — half of 4095. Check the shaft — is it pointing halfway round?
    - title: Map the sweep
      explain: potentiometer
      body: Pick three positions — a quarter turn, halfway, three quarters — and write down the reading at each. Then hold one position still and watch how steady the number stays.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one wire at a time, wait for you to confirm, explain terms on request,
    and always check wiring, board, port, and baud rate before changing code.
  coachInstructions:
    - Guide one physical connection at a time and wait for learner confirmation before proceeding.
    - If values sit stuck at 0 or 4095, check the middle-pin wire on GPIO 1 first, then the outer pins on 3.3V and GND.
    - If the monitor shows garbled text, set the baud rate to 115200 before touching anything else.
    - If the monitor is blank, check board, port, and a data-capable USB cable before changing code.
    - A few counts of jitter in a held reading is normal ADC behaviour; have the learner judge by the whole sweep.
    - Keep the Arduino path primary; in MicroPython the atten and width lines are required to match the 0-4095 range.

