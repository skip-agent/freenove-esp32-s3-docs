# Day 13 — Potentiometer / ADC · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-13-adc/), the agent packet, and the course-map entry.
# The first analogue day — a pin reads a whole range of voltages as numbers.

