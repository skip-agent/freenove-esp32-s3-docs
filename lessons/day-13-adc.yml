title: Read a knob as a number
status: published
estimatedTimeMinutes: 20
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire a rotary potentiometer to GPIO 1, upload the Arduino sketch, and watch
  Serial Monitor print a reading from 0 to 4095 — with its voltage — that
  follows every turn of the knob.
unlocks: The board can measure how much — the ADC turns any voltage between 0 and 3.3V into a number your code can work with.
seoDescription: >
  Wire a rotary potentiometer to the ESP32-S3, upload the sketch, and read the
  knob's position as a number from 0 to 4095 in Serial Monitor — your first
  analogue input with the ADC.

