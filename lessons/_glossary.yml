# Shared explainer glossary — tinyskiff.lesson.v1
# One entry per term, keyed by topic. Lessons reference a key in any `explain:`
# field; the build inlines the definition into both the page lightbox and the
# agent packet. Write each term once here and reuse it across all 30 days.
#
# Each entry: title / body / shortcut.

esp32:
  title: ESP32-S3 board
  body: >
    A development board is a friendly package around a tiny computer chip. The
    ESP32-S3 runs your uploaded sketch, controls pins, reads sensors, and can
    also use USB, Wi-Fi, and Bluetooth. In this lesson, it sends the ping signal
    and measures the echo time.
  shortcut: Think of it as the project's brain, not just a USB gadget.

gpio:
  title: GPIO extension board
  body: >
    GPIO means general-purpose input/output. These pins are connection points
    your code can use. The extension board makes them easier to see, reach, and
    wire without cramming everything onto the ESP32-S3 itself.
  shortcut: When a lesson says GPIO 13, look for the pin labelled 13 on the extension board.

hcsr04:
  title: HC-SR04 ultrasonic sensor
  body: >
    The HC-SR04 is a distance sensor. One round transducer sends a sound pulse
    above human hearing, and the other listens for the echo. The board measures
    the echo time and turns it into distance.
  shortcut: Aim the two round transducers straight at a flat target for steadier readings.

jumpers:
  title: Jumper wires
  body: >
    Jumper wires make temporary connections without soldering. Female-to-male
    wires have a socket on one end and a pin on the other, useful when a sensor
    module and board use different connector styles.
  shortcut: If a reading seems impossible, gently reseat the jumper wires before changing code.

arduino:
  title: Arduino IDE
  body: >
    Arduino IDE is the desktop app that opens the sketch, compiles it, uploads
    it to the ESP32-S3, and shows messages from the board in Serial Monitor.
  shortcut: Today, the IDE is both your uploader and your measuring display.

sketch:
  title: Official sketch
  body: >
    A sketch is the Arduino name for a program. This lesson uses Freenove's
    Sketch_19.1_Ultrasonic_Ranging.ino so you can focus first on wiring,
    observation, and the measurement model.
  shortcut: Treat the sketch as a working example to read and modify, not a spell to copy blindly.

vcc:
  title: VCC / 5V
  body: >
    VCC is the positive power input for the sensor. In the Freenove circuit, the
    HC-SR04 is powered from 5V. Power is separate from the signal pins: VCC lets
    the sensor run; Trig and Echo carry information.
  shortcut: Do not swap VCC and GND. That is the first wiring check.

trig:
  title: Trig pin
  body: >
    Trig is short for trigger. The ESP32-S3 briefly turns this pin HIGH for
    about 10 microseconds. That tells the ultrasonic module to start a
    measurement.
  shortcut: Trig is an output — from the board, to the sensor.

echo:
  title: Echo pin
  body: >
    Echo is the return signal. The sensor holds Echo HIGH while the sound pulse
    is making its round trip. Longer HIGH time means the object is farther away.
  shortcut: Echo is an input — from the sensor, to the board.

gnd:
  title: Ground / GND
  body: >
    Ground is the shared zero-voltage reference. The board and sensor need a
    common ground so a signal like HIGH or LOW means the same thing to both
    parts.
  shortcut: A missing ground can make everything look haunted. Check it early.

serial:
  title: Serial Monitor
  body: >
    Serial Monitor is a text window in Arduino IDE. The board can print messages
    to it over USB. Here, it prints the measured distance so you can see what
    the sensor is doing.
  shortcut: If the window is blank, check that the baud rate is 115200.

define:
  title: "#define"
  body: >
    #define creates a nickname before the code is compiled. #define trigPin 13
    means: whenever the sketch says trigPin, use the number 13. It makes the code
    easier to read.
  shortcut: Nicknames matter because physical pin numbers are easy to forget.

pulsein:
  title: pulseIn()
  body: >
    pulseIn() waits for a pin to enter the requested state, then measures how
    long it stays there. Here it measures how long Echo stays HIGH, which is the
    sound pulse's round-trip time.
  shortcut: The raw measurement is time. Distance comes after the math.

divideTwo:
  title: Why divide by two?
  body: >
    The sound travels from sensor to object, then from object back to sensor.
    That is two trips. The formula divides by two because you only want the
    one-way distance to the object.
  shortcut: Round trip ÷ 2 = one-way distance.

wobble:
  title: Why readings wobble
  body: >
    Real sensors are imperfect. Soft objects absorb sound. Curved or angled
    objects bounce sound away. Your hand may move. Air temperature slightly
    changes the speed of sound. A little wobble is normal.
  shortcut: Watch the trend — the number should rise as the object moves away and fall as it comes closer.

flat:
  title: Why flat targets help
  body: >
    A flat target reflects more sound straight back to the sensor. Round, soft,
    fuzzy, or angled targets scatter the sound, so the echo can be weaker or
    inconsistent.
  shortcut: Use a book or a wall when testing.

threshold:
  title: Threshold
  body: >
    A threshold turns a measurement into a decision. For example: if distance is
    less than 15 cm, beep. That pattern is the bridge from reading a sensor to
    building an interactive device.
  shortcut: Pick a threshold that would make sense in a real project, not a random number.

ledBuiltin:
  title: The onboard LED
  body: >
    Most ESP32-S3 boards have a small LED wired to a GPIO pin at the factory, so
    you can prove code runs without wiring anything. In this sketch it is named
    LED_BUILTIN, which stands for GPIO 2 on this board.
  shortcut: Look for the small LED near the chip — not the steady power LED.

pinMode:
  title: pinMode()
  body: >
    pinMode() tells the board how you will use a pin before you use it. OUTPUT
    means the board will push a signal out of the pin — here, enough to light the
    LED. The other common mode, INPUT, is for reading a signal in.
  shortcut: Set a pin's direction once in setup(), before the loop uses it.

digitalWrite:
  title: digitalWrite()
  body: >
    digitalWrite() sets a pin fully on or fully off. HIGH puts voltage on the pin
    (LED on); LOW removes it (LED off). It is the simplest way for code to change
    something in the physical world.
  shortcut: HIGH = on, LOW = off. No in-between — that is what PWM is for later.

delayMs:
  title: delay()
  body: >
    delay() pauses the whole program for a number of milliseconds — 1000 is one
    second. The blink you see is the LED held on for a moment, then off for a
    moment, on a loop.
  shortcut: "The number is milliseconds — 1000 = 1 second, 200 = a fifth of a second."

setupLoop:
  title: setup() and loop()
  body: >
    Every Arduino sketch has two parts. setup() runs once when the board powers
    on or resets — a good place to prepare pins. loop() runs again and again,
    forever, as fast as the board can, which is what makes the LED keep blinking.
  shortcut: setup() = get ready once; loop() = do this over and over.

pinout:
  title: Pinout map
  body: >
    A pinout is a labelled drawing of the board that names every pin — power,
    ground, USB, and the numbered GPIO pins your code uses. It does not come in
    the kit, so Day 1 provides it for you to keep; you'll reach for it whenever a
    lesson names a pin.
  shortcut: When a lesson says GPIO 13, the pinout shows you which physical pin that is.

usbData:
  title: Data-capable USB cable
  body: >
    Some USB cables only carry power (for charging), with no data wires inside.
    Uploading code needs a cable that carries data. A charge-only cable will
    power the board but never let the IDE talk to it.
  shortcut: If uploads fail on a cable that charges phones fine, suspect the cable first.

esd:
  title: Static electricity (ESD)
  body: >
    A bare circuit board can be harmed by a static shock you cannot feel. Touch
    something metal and grounded before handling the board, hold it by the edges,
    and keep it off wool or fluffy surfaces.
  shortcut: Touch metal first, hold by the edges.

boardPackage:
  title: ESP32 board package
  body: >
    Arduino IDE does not know about the ESP32-S3 until you add a board package —
    a bundle that teaches the IDE how to compile and upload for this chip. You
    install it once from the Boards Manager.
  shortcut: Install the ESP32 boards package once, then pick your board from the list.

serialPort:
  title: Port
  body: >
    The port is the connection the IDE uses to reach your board over USB. After
    you plug the board in, you pick it from Tools then Port. If nothing uploads,
    the wrong port (or none) is a common cause.
  shortcut: Board tells the IDE what chip; Port tells it where to find it.

usbDriver:
  title: USB driver (CH343)
  body: >
    A driver lets your computer recognise the board's USB-to-serial chip. Most
    modern systems include it, but some (often macOS) need the CH343 driver
    installed once before the board shows up as a port.
  shortcut: No port appears after plugging in? Install the CH343 driver, then replug.

led:
  title: LED
  body: >
    A LED is a one-way light. It only lights when its longer leg (the +) faces
    the pin and its shorter leg (the −) faces ground. Too much current burns it
    out, so a LED always sits behind a resistor.
  shortcut: Long leg toward the pin side; short leg toward ground.

resistor:
  title: Resistor
  body: >
    A resistor is a small component whose whole job is to limit how much current
    flows through a wire. Current is the flow of electricity through the circuit;
    a resistor throttles that flow down to a safe amount. Its strength is measured
    in ohms (Ω) — a larger number resists harder and lets less current through. A
    LED wired straight to power pulls far more current than it can survive and
    burns out at once, so it always sits in series with a resistor. The 220 Ω value
    here holds the current gentle enough to light the LED and keep it alive. The
    coloured bands print the resistor's value, and it works the same either way
    round — a resistor has no positive or negative end.
  shortcut: A resistor throttles current; the 220 Ω one keeps the LED from burning out, either way round.

pushButton:
  title: Push button
  body: >
    This push button has four pins in two connected pairs. Pressing it bridges
    the pairs and completes the circuit; releasing it breaks the connection
    again. It is the simplest way to hand the board a yes-or-no input.
  shortcut: Pressed means connected; released means open.

pullResistor:
  title: Pull resistor (10 kΩ)
  body: >
    This is the same kind of component as the 220 Ω resistor, put to a different
    job. Rather than limiting current to a LED, it ties an input pin to a known
    voltage. An input pin with nothing wired to it floats — it drifts between HIGH
    and LOW and reads at random. The 10 kΩ resistor holds GPIO 13 up at 3.3V so it
    rests at a steady HIGH. Its value is large on purpose: it pulls just firmly
    enough to set that resting level, yet gently enough that pressing the button —
    a near-zero-resistance path to ground — easily overrules it and drags the pin
    to LOW.
  shortcut: A 10 kΩ resistor holds GPIO 13 at a steady level until a press overrules it.

digitalRead:
  title: digitalRead()
  body: >
    digitalRead() checks whether a pin is currently HIGH or LOW and hands that
    answer back to your code. Here it reads GPIO 13 every loop to find out
    whether the button is being pressed.
  shortcut: digitalWrite() sets a pin; digitalRead() asks a pin.

activeLow:
  title: Why a press reads LOW
  body: >
    In this wiring, pressing the button pulls GPIO 13 toward ground, so a press
    reads LOW and rest reads HIGH. That is why the sketch checks for LOW. It
    feels backwards at first and is very common in real circuits.
  shortcut: Pressed reads LOW here — the code checks for LOW on purpose.

debounce:
  title: Debounce
  body: >
    A switch does not snap cleanly from open to closed. For a few milliseconds it
    chatters between the two, and the board is fast enough to read that chatter as
    many presses. Debouncing waits a moment and checks again so one press counts
    once.
  shortcut: A tiny wait-and-recheck turns mechanical chatter into one clean press.

toggle:
  title: Toggle
  body: >
    A toggle flips a remembered state each time, instead of following the button
    live. Press once and the LED latches on; press again and it latches off. That
    memory is what turns a momentary button into a lamp switch.
  shortcut: Button-and-LED reacts while held; the lamp remembers and flips.

ledBar:
  title: LED bar graph
  body: >
    A LED bar packs ten separate LEDs into one strip, with a row of pins along
    each edge. Each LED is wired and driven on its own — exactly like the single
    LED from earlier days, just ten of them in a tidy line.
  shortcut: Ten LEDs in one part. If it stays dark, rotate it 180° — the label direction is easy to get backwards.

pinArray:
  title: An array of pins
  body: >
    Instead of naming ten pins one by one, the sketch keeps them in a list (an
    array) and walks the list with a loop. Change the order or length of the list
    and the pattern changes with it — no rewiring needed.
  shortcut: One loop over a list of pins does the work of ten copied-and-pasted lines.

pwm:
  title: PWM — dimming by blinking
  body: >
    A pin is only ever fully on or fully off. But if it flicks on and off
    thousands of times a second, your eye blends it into a steady in-between
    brightness. The share of time it stays on is the duty cycle — more on-time
    looks brighter.
  shortcut: PWM fakes "half on" by switching fast. Duty 0 = off, maximum = brightest.

ledc:
  title: ledcWrite() and PWM channels
  body: >
    The ESP32-S3 has hardware PWM "channels" (its LEDC controller). You attach a
    pin to a channel once, then ledcWrite() sets its level. The board does the
    fast switching for you, so your loop just names a brightness number.
  shortcut: Attach the pin to a channel once; then ledcWrite(pin, level) sets brightness.

rgb:
  title: RGB colour mixing
  body: >
    An RGB LED is three tiny LEDs — red, green, and blue — in one dome. Set each
    one's brightness with PWM and your eye blends them into a single colour. All
    off is dark; all full is white; everything else is a mix — the same trick a
    screen uses.
  shortcut: Red + green + blue at different brightnesses makes any colour.

commonAnode:
  title: Common anode — why brightness looks inverted
  body: >
    In this RGB LED all three colours share one positive pin, so a colour lights
    when its own pin is pulled LOW, not HIGH. The sketch writes 255 minus your
    value, so 255 still means "brightest" to you even though the hardware works
    upside down.
  shortcut: A bigger number still means brighter — the 255 − value in code hides the inversion.

buzzer:
  title: Active vs passive buzzer
  body: >
    A buzzer turns electricity into sound. An active buzzer has its own oscillator
    inside, so switching it on plays one fixed tone. A passive buzzer has no
    oscillator — you feed it a changing signal to choose the pitch, which is how
    you get melodies or a siren.
  shortcut: Active buzzer = on/off, one note. Passive buzzer = you choose the pitch.

transistor:
  title: Transistor — a current amplifier
  body: >
    A GPIO pin can switch things but only supplies a trickle of current — not
    enough for a buzzer. An NPN transistor uses that trickle on its base to switch
    a much larger current from the 5V rail through the buzzer. It is an
    electrically controlled switch.
  shortcut: The pin controls the transistor; the transistor drives the buzzer.

tone:
  title: Tone and frequency
  body: >
    Pitch is frequency — how many times a second the signal repeats, measured in
    hertz. Send a passive buzzer a higher frequency and it plays a higher note.
    Sweeping the frequency up and down is what turns a beep into a siren.
  shortcut: Higher frequency = higher pitch. This passive buzzer is loudest around 2 kHz.

serialBegin:
  title: Serial.begin() and baud rate
  body: >
    Serial.begin() opens the USB serial link and sets the baud rate — how many
    signal changes a second both sides agree to use. The board and Serial Monitor
    must pick the same number, here 115200, or the text arrives as garbage.
  shortcut: Set the same baud on both ends — 115200 in this sketch — or the words turn to gibberish.

serialPrint:
  title: Serial.println() and printf()
  body: >
    Serial.println() sends a line of text to the computer and moves to the next
    line. Serial.printf() does the same but fills in values first — %.1f drops a
    number in with one decimal place — so the board can report live readings.
  shortcut: println() sends plain lines; printf() slots numbers into a template before sending.

millis:
  title: millis()
  body: >
    millis() hands back the number of milliseconds since the board last powered
    on or reset. Dividing it by 1000 turns it into seconds, which is how this
    sketch reports how long it has been running.
  shortcut: millis() is the board's stopwatch — milliseconds since it booted.

serialAvailable:
  title: Serial.available()
  body: >
    Serial.available() asks whether the computer has sent any characters the
    board hasn't read yet. It returns how many are waiting, so the loop only
    tries to read when something has actually arrived.
  shortcut: Check available() before reading, so the board waits for input instead of reading nothing.

serialRead:
  title: Serial.readStringUntil()
  body: >
    readStringUntil('\n') collects incoming characters into a string and stops at
    the newline you send when you press Enter. That gives the board one complete
    message to work with instead of a scatter of single letters.
  shortcut: It gathers what you typed up to the Enter key into one whole message.

adc:
  title: ADC — analogRead()
  body: >
    Digital pins read only HIGH or LOW. An ADC (analog-to-digital converter) pin
    measures the actual voltage and hands your code a number: 0 volts reads 0,
    3.3 volts reads 4095, and everything in between lands proportionally. That
    number is what analogRead() returns.
  shortcut: analogRead() turns a voltage into a number from 0 to 4095.

potentiometer:
  title: Potentiometer
  body: >
    A potentiometer is a resistor with a third pin on a movable contact. Turning
    the shaft slides that contact along the resistor, so the voltage on the
    middle pin sweeps smoothly between the two ends. Wire the ends to 3.3V and
    ground and the knob becomes a voltage dial your ADC pin can read.
  shortcut: The middle pin carries the voltage the knob is dialled to.

touchPin:
  title: Touch pins — touchRead()
  body: >
    Several ESP32-S3 pins can sense the touch of your skin through its
    electrical capacitance. touchRead(T14) returns a number from the pin behind
    the alias T14 — GPIO 14 — and on this board that number jumps far higher the
    moment a fingertip lands on the wire.
  shortcut: On this board a touch reads as a much BIGGER number — check your own values with 9.1 before trusting a threshold.

mapValue:
  title: map() and constrain()
  body: >
    map(value, 0, 4095, 0, 255) rescales a number from one range into another —
    here squeezing the ADC's 0–4095 into PWM's 0–255. constrain(value, low,
    high) clamps a number so it stays inside a window before you map it. The two
    together turn any sensor range into any output range.
  shortcut: constrain() fences the value in; map() rescales it to the range you need.

photoresistor:
  title: Photoresistor
  body: >
    A photoresistor changes resistance with light: bright light drops the
    resistance, darkness raises it. On its own the board can't read resistance —
    pair it with a fixed resistor as a voltage divider and the changing light
    becomes a changing voltage on an ADC pin.
  shortcut: More light = lower resistance. The divider turns that into a voltage the pin can read.

voltageDivider:
  title: Voltage divider
  body: >
    Two resistances in series split the supply voltage at their midpoint in
    proportion to their values. Make one of them a sensor — a photoresistor or a
    thermistor — and the midpoint voltage moves as the sensor's resistance
    moves. That midpoint is exactly what the ADC pin reads.
  shortcut: Fixed resistor + sensing resistor = a voltage that tracks whatever the sensor senses.

thermistor:
  title: Thermistor
  body: >
    A thermistor changes resistance with temperature. In a voltage divider its
    changing resistance becomes a changing ADC voltage, and a short formula (the
    B-equation, with B=3950 for this part) converts that resistance back into
    degrees. That's the whole thermometer.
  shortcut: Resistance tells you the temperature — the formula in the sketch does the conversion.

joystick:
  title: Joystick
  body: >
    Inside the joystick module are two potentiometers set at right angles — one
    follows left-right, the other up-down — plus a push button under the stick.
    X and Y arrive as ADC values; pressing straight down closes the button on
    the Z pin.
  shortcut: X and Y are analog knobs in disguise; Z is a plain button.

inputPullup:
  title: INPUT_PULLUP
  body: >
    pinMode(pin, INPUT_PULLUP) switches on a small resistor inside the chip that
    holds the pin HIGH while nothing pulls on it. Wire a button from the pin to
    ground and the reading becomes steady: 1 at rest, 0 while pressed — with no
    external resistor needed.
  shortcut: "Built-in pull-up: idle reads 1, pressed reads 0."

shiftRegister:
  title: 74HC595 shift register
  body: >
    The 74HC595 takes data one bit at a time on a single wire and presents it as
    eight parallel outputs. Three GPIO pins — data, clock, and latch — can drive
    eight LEDs, and chips can be chained for eight more. It's how a small board
    controls a big row of outputs.
  shortcut: Three pins in, eight outputs out — the chip holds the pattern for you.

shiftOut:
  title: shiftOut() and the latch
  body: >
    shiftOut(dataPin, clockPin, LSBFIRST, x) clocks the eight bits of x into the
    74HC595 one at a time. The outputs update when the latch pin goes LOW before
    the shift and HIGH after — that HIGH edge is the moment the new pattern
    appears on all eight pins at once.
  shortcut: Latch LOW, shift the byte, latch HIGH — the pattern lands on the outputs at the HIGH edge.

sevenSegment:
  title: Seven-segment display
  body: >
    Eight LEDs — seven bars in a figure-8 plus a decimal point — share one
    positive pin (a common anode). Each byte in the code table switches a
    pattern of segments on with LOW bits, and the lit pattern draws the digit.
    0xc0 lights every segment of a "0"; 0xff blanks the display.
  shortcut: One byte per character; a 0 bit lights its segment because the display is common-anode.

dcMotor:
  title: DC motor
  body: >
    A DC motor spins whenever current flows through it — faster with more
    current, and the other way round when the current reverses. It draws far
    more current than a GPIO pin can supply, which is why a driver chip and its
    own power source sit between the board and the motor.
  shortcut: Speed comes from how much current, direction from which way it flows.

motorDriver:
  title: L293D motor driver
  body: >
    The L293D is a driver chip that switches a motor's heavy current on behalf
    of the board. Two input pins set the direction (In1 HIGH + In2 LOW spins one
    way; swapped spins the other), the Enable pin takes PWM for speed, and the
    +Vmotor pin brings in the motor's own power supply.
  shortcut: In1/In2 pick the direction, PWM on Enable picks the speed, +Vmotor carries the battery.

externalPower:
  title: Powering the motor
  body: >
    A motor draws 0.2–0.3 A with no load — far beyond what the board's USB
    supply should feed. The 9V battery powers the motor through the extension
    board, and the battery and board share a ground so their signals agree.
    Freenove's warning is blunt: powering the motor straight from the ESP32-S3
    can permanently damage it.
  shortcut: The battery drives the motor; the board only sends signals. Always share a ground.

servo:
  title: Servo
  body: >
    A servo packs a DC motor, reduction gears, a position sensor, and a control
    circuit into one case. Send it a timing signal and it rotates its horn to
    the angle you asked for and holds there — 0 to 180 degrees. Three wires:
    orange signal, red power, brown ground.
  shortcut: A motor that goes TO an angle and holds it, instead of spinning freely.

pulseWidth:
  title: Servo pulses — 0.5 to 2.5 ms
  body: >
    A servo listens for a pulse repeated 50 times a second and reads the
    pulse's width as an angle: 0.5 ms means 0°, 1.5 ms means the middle, 2.5 ms
    means 180°. The sketch's map(angle, 0, 180, 103, 512) turns a degree number
    into exactly that pulse width on the ESP32-S3's PWM hardware.
  shortcut: The width of the pulse IS the angle — 0.5 ms at one end, 2.5 ms at the other.

i2c:
  title: I2C — a two-wire bus
  body: >
    I2C carries data between the board and a device over just two wires: SDA
    for data and SCL for the clock that paces it. Every device on the bus has
    an address, so the board names which one it's talking to — the LCD's
    backpack chip answers at 0x27 (some at 0x3F).
  shortcut: Two wires, many devices, each with its own address.

lcd1602:
  title: LCD1602 module
  body: >
    A 16-character by 2-line liquid crystal display with an I2C backpack chip
    (PCF8574T) soldered on, so four wires run the whole screen: power, ground,
    SDA, and SCL. The sketch addresses it, switches on the backlight, places
    the cursor, and prints text.
  shortcut: 16 columns × 2 rows over four wires; if it powers up blank, check the address and the contrast dial.

ble:
  title: Bluetooth Low Energy
  body: >
    BLE is short-range radio built for small messages. The board runs as a
    peripheral: it broadcasts its name, a phone connects, and the two exchange
    data through a service the board offers. This differs from the classic
    Bluetooth in your phone's pairing menu — a BLE device is opened with a
    GATT app like LightBlue, and never appears in that menu.
  shortcut: Find the board inside the LightBlue app's scan list, never in the phone's Bluetooth settings.

bleCharacteristic:
  title: Characteristics — write and notify
  body: >
    A BLE service holds characteristics — named slots the phone can use. This
    one has two: an RX slot the phone WRITES into (phone → board) and a TX slot
    the board NOTIFIES through (board → phone, for subscribers). Two one-way
    lanes make the two-way link.
  shortcut: Phone writes into RX; board notifies out of TX. Subscribe to TX to hear the board.

uuid:
  title: UUIDs
  body: >
    A UUID is a long unique number that names a BLE service or characteristic,
    the way a port number names a TCP service. This sketch uses the widely
    adopted Nordic UART trio — one UUID for the service, one for RX, one for
    TX — so serial-style apps recognise it on sight.
  shortcut: The long hex strings are names, copied exactly — one for the service, one per direction.

wifi:
  title: Wi-Fi on the ESP32-S3
  body: >
    The chip has a full Wi-Fi radio and can join networks or create them. One
    hard rule: it speaks 2.4 GHz only, so a 5 GHz-only network is invisible to
    it. Check that your router broadcasts a 2.4 GHz band before troubleshooting
    anything else.
  shortcut: 2.4 GHz only — if the board can't find your network, check the band first.

stationMode:
  title: Station mode
  body: >
    In station mode the board joins an existing network, like any laptop or
    phone: it presents the router's name and password, waits for the
    connection, and the router assigns it an IP address. WiFi.begin() starts
    the process; WiFi.status() reports when it's connected.
  shortcut: Station = the board joins YOUR network and the router hands it an address.

apMode:
  title: AP mode
  body: >
    In AP (access point) mode the board becomes the network: it broadcasts its
    own name, hands out addresses, and phones join it directly — with no router
    involved. The two modes can even run at once (AP+station), with the board
    joined to your network while hosting its own.
  shortcut: AP = the board IS the network. Look for its name in your phone's Wi-Fi list.

ipAddress:
  title: IP address
  body: >
    An IP address is a device's number on a network, like a berth number in a
    marina. The router assigns one to the board when it joins (yours will
    differ from any example), and other machines reach the board by that
    number. The serial monitor prints it so you can copy it.
  shortcut: Your board's address WILL differ from the manual's — always use the one your serial monitor prints.

tcp:
  title: TCP — client and server, ports
  body: >
    TCP is the internet's reliable pipe. One side listens (the server) at an
    address and port; the other side dials (the client). A port is a numbered
    door at an address, so one machine can host many services. Once connected,
    both ends read and write the same stream — the web itself runs on this.
  shortcut: Server listens at address:port, client dials it. Both sides must be on the same network.

microcontroller:
  title: Microcontroller
  body: >
    The laptop on your desk runs an operating system that juggles many programs.
    A microcontroller is a whole small computer — processor, memory, and storage
    — on a single chip that runs exactly one program, from the instant it gets
    power until you cut it. There is no desktop, no apps to launch. The code you
    upload IS the software the chip runs. That is the shift the whole course
    turns on: you write the only program in the machine.
  shortcut: One chip, one program, running from power-on. Your sketch is the whole operating system.

module:
  title: The metal can (the module)
  body: >
    The small metal box soldered to the board is the ESP32-S3 module. Under the
    shield sit the processor, its memory, the flash chip that holds your program,
    and the radio for Wi-Fi and Bluetooth. The rest of the board exists to serve
    it — power, the USB port, buttons, and the pins that fan its signals out to
    the world. The shield keeps the radio clean and stops it interfering.
  shortcut: The whole computer is inside that metal can; everything else on the board feeds it.

bootReset:
  title: BOOT and RESET buttons
  body: >
    Two small buttons sit near the USB port. RESET restarts the program from the
    beginning, the same as cutting and restoring power. BOOT chooses what runs at
    startup: held down as the board powers up, it enters the download mode that
    lets new code be written to flash. The upload tool normally presses this pair
    for you electronically; when it can't, you do it by hand.
  shortcut: RESET restarts your program. BOOT held at power-up means "listen for new code".

regulator:
  title: The power path (5V to 3.3V)
  body: >
    USB delivers 5 volts, but the ESP32-S3 runs at 3.3 volts. A small component
    called a voltage regulator sits between them and steps 5V down to a steady
    3.3V for the chip. This is why the board's logic runs at 3.3V, and why the
    3.3V and 5V pins on the header are different rails you must not mix up.
  shortcut: USB is 5V, the chip is 3.3V; the regulator on the board bridges them.

logic33:
  title: 3.3V logic (the safety rule)
  body: >
    Every input and output pin on the ESP32-S3 speaks in 3.3 volts: roughly 3.3V
    means "high", near 0V means "low". The pins are not built to survive 5V. A
    sensor that outputs 5V, or 5V wired straight to a pin by mistake, can damage
    the input. When a part runs on 5V, its signal into the board needs care —
    later lessons show how.
  shortcut: Pins are 3.3V devices. Powering a part from 5V is fine; feeding 5V into a pin is not.

compile:
  title: Compiling
  body: >
    You write a sketch in C++, which is text a person can read. The processor
    cannot run text — it runs machine code, the raw numeric instructions for its
    own design. Compiling is the step where the IDE translates your text into
    machine code built specifically for the ESP32-S3. This is what the board
    package taught the IDE how to do.
  shortcut: Compiling turns your readable C++ into the raw instructions this exact chip runs.

bootloader:
  title: The bootloader
  body: >
    Every time the board powers on, a tiny built-in program runs first: the
    bootloader. Normally it hands straight over to your sketch. But if the board
    enters download mode at power-up, the bootloader instead listens on the USB
    connection and writes whatever new program arrives into flash. That is how
    your code gets onto the chip in the first place.
  shortcut: A small program that runs at power-on and can receive new code before your sketch starts.

flashMem:
  title: Flash memory
  body: >
    Flash is the board's permanent storage. Your program is written there during
    upload and stays put with the power off — unplug the board, plug it back in a
    week later, and it runs the same sketch. Uploading new code overwrites the
    old program in flash; there is only ever one sketch resident at a time.
  shortcut: Permanent storage that keeps your program with the power off. Upload overwrites it.

usbSerial:
  title: The USB-to-serial bridge
  body: >
    The bootloader talks in an old, simple format called serial (UART) — one wire
    in, one wire out. Your computer talks USB. A small chip on the board, the
    CH343, translates between the two so the two can converse. That translator is
    why the board shows up as a "port", and why some computers need its driver
    before the board appears at all.
  shortcut: A translator chip so your computer's USB can talk to the board's serial bootloader.

autoReset:
  title: Automatic reset into download mode
  body: >
    To upload, the board must be in download mode at the moment code arrives. The
    IDE arranges this by pulsing two control lines on the serial connection —
    effectively pressing BOOT and RESET for you — so upload just works. When that
    handshake fails (some cables, some hubs), do it by hand: hold BOOT, tap RESET,
    release BOOT, then upload.
  shortcut: The IDE presses BOOT+RESET electronically. If upload stalls, do that by hand.
