steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Push a jumper into each of the servo's three sockets — orange, red, and brown. {servo}
    - Run the orange signal wire to GPIO 21. {gpio}
    - Run the red wire to 5V and the brown wire to GND. {gnd}
    - Press a horn onto the servo's shaft so you can see it move.
    - Compare every wire to the chart before you plug in USB.
    - Open `Sketch_17.1_Servo_Sweep.ino` in Arduino IDE and upload it.
    - Watch the horn sweep from one end of its travel to the other and back.
  done:
    icon: "🧭"
    title: The arm answers.
    body: The horn is swinging on your command. Head to Test & debug to confirm the pace and the full 180° reach.

code:
  intro: >
    The whole sketch is short, and it drives the servo with the same LEDC
    hardware that faded your LEDs — set to 50 Hz and 12 bits, the timing a servo
    listens for. The loop counts angles up and down; one `map()` line turns each
    angle into a pulse. Switch to MicroPython if you'd rather see the same idea
    in Python — the wiring never changes.
  arduino:
    file: Sketch_17.1_Servo_Sweep.ino
    sketch: C/Sketches/Sketch_17.1_Servo_Sweep/Sketch_17.1_Servo_Sweep.ino
    excerpt: |
      #define SERVO_PIN 21  //define the pwm pin
      #define SERVO_CHN 0   //define the pwm channel
      #define SERVO_FRQ 50  //define the pwm frequency
      #define SERVO_BIT 12  //define the pwm precision

      void servo_set_pin(int pin);
      void servo_set_angle(int angle);

      void setup() {
        servo_set_pin(SERVO_PIN);
      }

      void loop() {
        for (int i = 0; i < 180; i++) {
          servo_set_angle(i);
          delay(10);
        }
        for (int i = 180; i > 0; i--) {
          servo_set_angle(i);
          delay(10);
        }
      }

      void servo_set_pin(int pin) {
        ledcAttachChannel(pin, SERVO_FRQ, SERVO_BIT, SERVO_CHN);
      }

      void servo_set_angle(int angle) {
        if (angle > 180 || angle < 0)
          return;
        long pwm_value = map(angle, 0, 180, 103, 512);
        ledcWrite(SERVO_PIN, pwm_value);
      }
    notes:
      - code: ledcAttachChannel(pin, SERVO_FRQ, SERVO_BIT, SERVO_CHN)
        text: Sets GPIO 21 switching at 50 Hz with 12-bit precision — the frame rate a servo expects.
        explain: ledc
      - code: map(angle, 0, 180, 103, 512)
        text: Translates degrees into pulse counts — 103 counts for 0° up to 512 counts for 180°.
        explain: mapValue
      - code: ledcWrite(SERVO_PIN, pwm_value)
        text: Sends a pulse of that width every 20 ms; the servo turns until its shaft matches.
        explain: pwm
  micropython:
    file: 16.1_Servo_Sweep/Servo_Sweep.py
    path: Python/Python_Codes/16.1_Servo_Sweep/Servo_Sweep.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      from myservo import myServo
      servo=myServo(21)
      servo.myServoWriteAngle(0)
      time.sleep_ms(1000)
      for i in range(0,180,1):
          servo.myServoWriteAngle(i)
          time.sleep_ms(15)
      for i in range(180,0,-1):
          servo.myServoWriteAngle(i)
          time.sleep_ms(15)
    notes:
      - code: servo=myServo(21)
        text: Builds the kit's servo helper on GPIO 21 — the same pin as the Arduino sketch.
      - code: servo.myServoWriteAngle(i)
        text: Hands the helper an angle in degrees; it works out the pulse width for you.
    note: >
      Same pin, same wiring. Copy the kit's own `myservo.py` module to the board
      alongside the main file — it holds the pulse maths (a 10-bit duty from 26
      to 128, the same 0.5–2.5 ms). Run it in Thonny if MicroPython is set up;
      otherwise skip it — it should never block the Arduino-first path.

theory:
  title: The pulse is the position
  summary: "A servo is a small geared motor with a control circuit inside; it reads the width of a pulse repeated every 20 ms and drives its shaft to the matching angle and holds there. The sketch only counts degrees and lets map() set the width."
  intro: >
    A plain motor spins for as long as you feed it current. A servo does
    something harder — it arrives at an exact angle and holds it against a push.
    Today is about the one signal that tells it which angle, and how the servo
    itself does all the work of getting there.
  flow:
    - n: "Inside"
      title: "A motor that knows where it is"
      body: "The case holds a small motor, reduction gears, a sensor on the shaft, and a control circuit comparing where the shaft is against where you asked."
    - n: "Beat"
      title: "A pulse every 20 ms"
      body: "The signal wire carries one short pulse repeated 50 times a second. Its width is the whole message; the gaps between pulses carry nothing."
    - n: "Width"
      title: "Width names the angle"
      body: "A 0.5 ms pulse asks for 0°, 1.5 ms for the middle, and 2.5 ms for 180° — and every angle between gets its own width."
    - n: "Hold"
      title: "The servo closes the gap"
      body: "Its control circuit drives the geared motor until the shaft sensor reads the angle you asked for, then holds it there against a nudge."
  formulaLabel: The model
  formula: angle = **pulse width** — 0.5 ms is 0° · 1.5 ms is 90° · 2.5 ms is 180°
  notes:
    - title: You name the destination
      explain: dcMotor
      body: On Day 22 you set a DC motor's speed and direction and it spun freely for as long as it had power. A servo takes an angle instead — you hand it a position and its own electronics decide how far and how fast to turn, then hold.
    - title: Why the timing is visible here
      explain: ledc
      body: The Arduino Servo library packages all of this into servo.write(90) and keeps the timing out of sight. This sketch drives the LEDC PWM hardware directly — 50 Hz, 12-bit — so the frame rate and the map() line that becomes the pulse width are yours to read.
    - title: Where 103 and 512 come from
      explain: pulseWidth
      body: At 50 Hz and 12 bits, each 20 ms frame is 4096 counts — so 103 counts lasts about 0.5 ms and 512 counts about 2.5 ms, the two ends of the servo's travel.

test:
  mode: visual
  intro: >
    Nothing prints to the screen today — the proof is the horn swinging in front
    of you.
  expectedTitle: What you should see
  readoutLabel: Servo horn
  expected:
    - The horn glides smoothly from 0° all the way round to 180°.
    - It reverses and glides back, then repeats — about 1.8 seconds each way.
    - The pace is steady, like a metronome.
  expectedNote: A soft hum while it moves is normal. Each sweep should be one continuous glide, never a twitchy stutter.
  checksTitle: If it doesn't
  checks:
    - symptom: "Horn twitches or judders?"
      fix: "Power the servo from the 5V pin with its own jumper — a GPIO can't feed a motor."
    - symptom: "Sweeps once, then jams at an end?"
      fix: "The horn is hitting something — pull it off the shaft and refit it clear."
    - symptom: "No motion at all?"
      fix: "Check the orange signal wire on GPIO 21, then the red and brown power pair."
    - symptom: "Board resets mid-sweep?"
      fix: "The USB supply is weak — unplug other loads from the board."

challenge:
  title: "Try this: post three angles by hand"
  railLabel: Try this
  intro: >
    The sweep hides the mechanism inside a fast counter. Slow it down to three
    fixed angles and the pulse-width story turns into something you can predict
    before you upload, then watch confirm itself.
  summary: Replace the sweep with three explicit commands — 0°, 90°, 180°, holding each for a second — work out each pulse width from the map() line before uploading, then check the horn lands where the maths said.
  cards:
    - title: Command three angles
      explain: delayMs
      body: "Replace both `for` loops with three fixed commands — `servo_set_angle(0); delay(1000); servo_set_angle(90); delay(1000); servo_set_angle(180); delay(1000);`. Now the horn jumps to each position and waits a second before the next."
    - title: Predict the pulse width
      explain: pulseWidth
      body: "Before uploading, run each angle through `map(angle, 0, 180, 103, 512)`: 0° gives 103 counts (about 0.5 ms), 90° gives about 308 (1.5 ms), 180° gives 512 (2.5 ms). Note where you expect the horn to point for each."
    - title: Confirm the line is straight
      explain: servo
      body: "Upload and watch. The three stops land evenly spaced — one far end, the exact middle, the other far end — because width maps to angle in a straight line. Halfway in counts is halfway in degrees."

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    teach the servo idea plainly — a pulse's width names an angle and the
    servo's own circuit drives there and holds — then guide one physical
    connection at a time, wait for confirmation, explain terms on request, and
    always check wiring, board, port, and USB before changing code.
  coachInstructions:
    - Guide one physical connection at a time and wait for learner confirmation before proceeding.
    - Colour is the map — orange signal to GPIO 21, red to 5V, brown to GND; check that order before anything else.
    - Land the core idea- a servo is a small geared motor with a control circuit that reads a pulse repeated every 20 ms and turns its shaft to the angle the pulse's width names, then holds there.
    - Make the Day 22 contrast concrete- with the DC motor the learner set speed and direction and it spun freely; here they hand the servo an angle and its own electronics drive to it and hold.
    - Point out that this sketch drives the LEDC PWM hardware directly at 50 Hz and 12-bit so the pulse timing is visible; the Arduino Servo library would fold the same maths into write(angle).
    - If the horn twitches or judders, confirm the red wire sits on the 5V pin with its own jumper — a GPIO cannot supply a servo's current.
    - If it sweeps once then jams at an end, the horn is hitting something — have the learner refit it on the shaft.
    - If the board resets mid-sweep, the USB supply is weak — unplug other loads before changing any code.
    - Keep the Arduino path primary; MicroPython is optional only if already set up, and needs the kit's myservo.py copied to the board alongside the main file.

