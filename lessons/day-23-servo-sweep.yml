    body: The horn is swinging on your command. Head to Test & debug to confirm the pace and the full 180° reach.

code:
  intro: >
    The whole sketch is short, and it drives the servo with the same LEDC
    hardware that faded your LEDs — set to 50 Hz and 12 bits, the timing a servo
    listens for. The loop counts angles up and down; one `map()` line turns each
    angle into a pulse. Switch to MicroPython if you'd rather see the same idea
    in Python — the wiring never changes.
  arduino:
    file: Sketch_17.1_Servo_Sweep.ino
    sketch: C/Sketches/Sketch_17.1_Servo_Sweep/Sketch_17.1_Servo_Sweep.ino
    excerpt: |
      #define SERVO_PIN 21  //define the pwm pin
      #define SERVO_CHN 0   //define the pwm channel
      #define SERVO_FRQ 50  //define the pwm frequency
      #define SERVO_BIT 12  //define the pwm precision

      void servo_set_pin(int pin);
      void servo_set_angle(int angle);

      void setup() {
        servo_set_pin(SERVO_PIN);
      }

      void loop() {
        for (int i = 0; i < 180; i++) {
          servo_set_angle(i);
          delay(10);
        }
        for (int i = 180; i > 0; i--) {
          servo_set_angle(i);
          delay(10);
        }
      }

      void servo_set_pin(int pin) {
        ledcAttachChannel(pin, SERVO_FRQ, SERVO_BIT, SERVO_CHN);
      }

      void servo_set_angle(int angle) {
        if (angle > 180 || angle < 0)
          return;
        long pwm_value = map(angle, 0, 180, 103, 512);
        ledcWrite(SERVO_PIN, pwm_value);
      }
    notes:
      - code: ledcAttachChannel(pin, SERVO_FRQ, SERVO_BIT, SERVO_CHN)
        text: Sets GPIO 21 switching at 50 Hz with 12-bit precision — the frame rate a servo expects.
        explain: ledc
      - code: map(angle, 0, 180, 103, 512)
        text: Translates degrees into pulse counts — 103 counts for 0° up to 512 counts for 180°.
        explain: mapValue
      - code: ledcWrite(SERVO_PIN, pwm_value)
        text: Sends a pulse of that width every 20 ms; the servo turns until its shaft matches.
        explain: pwm
  micropython:
    file: 16.1_Servo_Sweep/Servo_Sweep.py
    path: Python/Python_Codes/16.1_Servo_Sweep/Servo_Sweep.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      from myservo import myServo
      servo=myServo(21)
      servo.myServoWriteAngle(0)
      time.sleep_ms(1000)
      for i in range(0,180,1):
          servo.myServoWriteAngle(i)
          time.sleep_ms(15)
      for i in range(180,0,-1):
          servo.myServoWriteAngle(i)
          time.sleep_ms(15)
    notes:
      - code: servo=myServo(21)
        text: Builds the kit's servo helper on GPIO 21 — the same pin as the Arduino sketch.
      - code: servo.myServoWriteAngle(i)
        text: Hands the helper an angle in degrees; it works out the pulse width for you.
    note: >
      Same pin, same wiring. Copy the kit's own `myservo.py` module to the board
      alongside the main file — it holds the pulse maths (a 10-bit duty from 26
      to 128, the same 0.5–2.5 ms). Run it in Thonny if MicroPython is set up;
      otherwise skip it — it should never block the Arduino-first path.

theory:
  title: The pulse is the position
  summary: A servo reads the width of a repeating pulse and turns its shaft to the matching angle; the sketch only counts degrees and lets map() translate.
  intro: >
    The clever part of today fits in one line — the `map()` call. Everything
    around it is a counter going up and coming back down.
  flow:
    - { n: Beat, title: 50 frames a second, body: The pin starts a fresh pulse every 20 ms. }
    - { n: Width, title: The pulse is the order, body: A 0.5 ms pulse means 0° and a 2.5 ms pulse means 180°. }
    - { n: Convert, title: map() translates, body: Degrees become pulse counts — 103 at one end and 512 at the other. }
    - { n: Hold, title: The servo obeys, body: A circuit inside turns the shaft until it matches the width. }
  formulaLabel: The model
  formula: angle = **pulse width** — 0.5 ms is 0° · 1.5 ms is 90° · 2.5 ms is 180°
  notes:
    - title: Where 103 and 512 come from
      explain: pulseWidth
      body: At 50 Hz and 12 bits, each 20 ms frame is 4096 counts — so 103 counts lasts about 0.5 ms and 512 counts about 2.5 ms, the two ends of the servo's travel.
    - title: A straight line of angles
      explain: servo
      body: The mapping is linear — 0.5 ms sits at 0°, 1.5 ms at 90°, 2.5 ms at 180°, and every angle between gets its own width.

test:
  mode: visual
  intro: >
    Nothing prints to the screen today — the proof is the horn swinging in front
    of you.
  expectedTitle: What you should see
  readoutLabel: Servo horn
  expected:
    - The horn glides smoothly from 0° all the way round to 180°.
    - It reverses and glides back, then repeats — about 1.8 seconds each way.
    - The pace is steady, like a metronome.
  expectedNote: A soft hum while it moves is normal. Each sweep should be one continuous glide, never a twitchy stutter.
  checksTitle: If it doesn't
  checks:
    - symptom: "Horn twitches or judders?"
      fix: "Power the servo from the 5V pin with its own jumper — a GPIO can't feed a motor."
    - symptom: "Sweeps once, then jams at an end?"
      fix: "The horn is hitting something — pull it off the shaft and refit it clear."
    - symptom: "No motion at all?"
      fix: "Check the orange signal wire on GPIO 21, then the red and brown power pair."
    - symptom: "Board resets mid-sweep?"
      fix: "The USB supply is weak — unplug other loads from the board."

challenge:
  title: "Try this: run a lighthouse"
  railLabel: Try this
  intro: >
    Same working circuit, three small experiments with the sweep. They fit inside
    today's 20 minutes.
  summary: Sweep a half-arc, rest at each end like a lighthouse, then hunt for the smallest angle step your servo visibly answers.
  cards:
    - title: Sweep a half-arc
      body: Change both `for` loops so the sweep runs 0° to 90° and back. Predict where the horn will stop before you upload.
    - title: Rest like a lighthouse
      explain: delayMs
      body: Add `delay(1000)` after each `for` loop so the horn pauses a second at each end before turning back.
    - title: Find the smallest step
      body: Make the loops step by 2, then 5, then 10. Watch for the smallest angle step your servo turns into a visible move.
  logbook:
    - Where did the horn stop on your half-arc, and did it match your prediction?
    - How did the one-second rest change the feel of the sweep?
    - What was the smallest angle step your servo visibly moved?

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical connection at a time, wait for you to confirm, explain
    terms on request, and always check wiring, board, port, and USB before
    changing code.
  coachInstructions:
    - Guide one physical connection at a time and wait for learner confirmation before proceeding.
    - Colour is the map — orange signal to GPIO 21, red to 5V, brown to GND; check that order before anything else.
    - If the horn twitches or judders, confirm the red wire sits on the 5V pin with its own jumper — a GPIO cannot supply a servo's current.
    - If it sweeps once then jams at an end, the horn is hitting something — have the learner refit it on the shaft.
    - If the board resets mid-sweep, the USB supply is weak — unplug other loads before changing any code.
    - Keep the Arduino path primary; MicroPython is optional only if already set up, and needs the kit's myservo.py copied to the board alongside the main file.

