# Day 23 — Servo sweep · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-23-servo-sweep/), the agent packet, and the course-map entry.
# The positioning day — the width of a repeating pulse tells a shaft exactly where to sit.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY23-SERVOSWEEP
day: 23
slug: day-23-servo-sweep
title: "Servo sweep: move to positions"
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire a servo's three leads to the board, upload the Arduino sketch, and watch
  the horn move from 0° to 180° and back — your first part that goes to an exact
  position on command. Underneath the sweep is the day's real idea: a servo is a
  small geared motor that reads a repeating pulse and turns its shaft to the
  angle that pulse's width names, so you command a position and the servo's own
  electronics get there and hold it.
unlocks: A pulse's width can hold a shaft at an exact angle, so your builds can steer, point, and wave.
seoDescription: >
  Wire a servo to the ESP32-S3 and drive it with raw LEDC PWM. Upload the sketch
  and watch the horn sweep smoothly from 0° to 180° and back — position set by
  pulse width.

