steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Place the LED bar across the breadboard's centre channel so each segment has its own row. {ledBar}
    - Wire each segment through its own 220 Ω resistor to its GPIO pin, working along the list in order. {pinArray}
    - Wire the bar's common row to ground so every segment shares the same return.
    - Compare every wire to the chart before you plug in USB.
    - Open `Sketch_03.1_FlowingLight.ino` in Arduino IDE and upload it.
    - Watch a single lit segment sweep along the bar and back.
  done:
    icon: "💡"
    title: Ten pins, one motion.
    body: A list of pins and a loop are now driving the whole bar. Head to Test & debug to confirm the flowing sweep.

code:
  intro: >
    The sketch stays short even with ten LEDs, because the pins live in one list
    and a loop walks it. Switch to MicroPython if you'd rather see the same idea
    in Python — the wiring never changes.
  arduino:
    file: Sketch_03.1_FlowingLight.ino
    sketch: C/Sketches/Sketch_03.1_FlowingLight/Sketch_03.1_FlowingLight.ino
    excerpt: |
      byte ledPins[] = {21, 47, 48, 38, 39, 40, 41, 42, 2, 1};
      int ledCounts;

      void setup() {
        ledCounts = sizeof(ledPins);
        for (int i = 0; i < ledCounts; i++) {
          pinMode(ledPins[i], OUTPUT);
        }
      }

      void loop() {
        for (int i = 0; i < ledCounts; i++) {       // forward sweep
          digitalWrite(ledPins[i], HIGH);
          delay(100);
          digitalWrite(ledPins[i], LOW);
        }
        for (int i = ledCounts - 1; i > -1; i--) {  // reverse sweep
          digitalWrite(ledPins[i], HIGH);
          delay(100);
          digitalWrite(ledPins[i], LOW);
        }
      }
    notes:
      - code: byte ledPins[] = {21, 47, 48, 38, 39, 40, 41, 42, 2, 1}
        text: One list holds all ten pins in bar order, so the loop can reach each by number.
        explain: pinArray
      - code: digitalWrite(ledPins[i], HIGH)
        text: Lights whichever segment the loop is pointing at right now; the next line turns it off.
        explain: digitalWrite
      - code: for (int i = ledCounts - 1; i > -1; i--)
        text: Walks the same list backwards, which is what sends the light flowing back the other way.
        explain: pinArray
  micropython:
    file: 03.1_FlowingLight/FlowingLight.py
    path: Python/Python_Codes/03.1_FlowingLight/FlowingLight.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      pins = [21, 47, 48, 38, 39, 40, 41, 42, 2, 1]

      while True:
          for i in range(len(pins)):
              led = Pin(pins[i], Pin.OUT)
              led.value(1)
              time.sleep_ms(100)
              led.value(0)
    notes:
      - code: pins = [21, 47, 48, 38, 39, 40, 41, 42, 2, 1]
        text: The same list of pins in Python, in the same bar order.
        explain: pinArray
      - code: led = Pin(pins[i], Pin.OUT)
        text: Picks one pin from the list and drives it, then the loop moves to the next.
    note: >
      Same pins, same wiring. Run it in Thonny if MicroPython is set up; otherwise
      skip it — it should never block the Arduino-first path.

theory:
  title: One list, one loop
  summary: Keep the pins in an array, then walk the list to light them in turn — forward, then back.
  intro: >
    There's no trick here — the loop just points at one pin after another and
    lights whatever it's pointing at, faster than the eye separates.
  flow:
    - { n: List, title: the pin array, body: All ten pins sit in one array in bar order. }
    - { n: Light, title: HIGH, body: The loop lights the pin it's pointing at right now. }
    - { n: Step, title: i++, body: It turns that one off and moves to the next pin. }
    - { n: Sweep, title: back again, body: A second loop walks the list in reverse so the light flows back. }
  formulaLabel: The model
  formula: one array of pins → walk it forward → walk it back → repeat
  notes:
    - title: Why a pin array
      explain: pinArray
      body: Ten separate variables would mean ten copies of every line. One array lets a single loop stand in for all of them.

test:
  mode: visual
  intro: >
    Nothing prints to the screen today — the proof is the moving light on the bar.
  expectedTitle: What you should see
  readoutLabel: LED bar
  expected:
    - One lit segment starts at one end of the bar.
    - It travels along the bar a segment at a time to the far end.
    - Then it flows back the other way, and repeats for as long as the board has power.
  expectedNote: Only one segment is lit at any instant — the flow is that single light moving, not a growing row.
  checksTitle: If it doesn't
  checks:
    - symptom: "Whole bar stays dark?"
      fix: "Rotate the LED bar 180° — its direction is easy to reverse — then re-check the common row to ground."
    - symptom: "One segment never lights?"
      fix: "Check that segment's own 220 Ω resistor and its jumper to its GPIO pin."
    - symptom: "Nothing happens at all?"
      fix: "Re-check the common row to ground, then that the sketch uploaded."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: bend the flow"
  railLabel: Try this
  intro: >
    Same working circuit, two small edits to the sketch. Both fit inside today's
    time and leave the wiring untouched.
  summary: Reverse the direction the light flows, then change how fast it moves by editing the delay, and note what each edit does.
  cards:
    - title: Reverse the flow
      body: Swap which loop runs first so the light starts its sweep from the other end. Predict which end it begins from before you upload.
    - title: Change the speed
      explain: delayMs
      body: Set every `delay(100)` to a larger or smaller number and upload. Find the speed where the flow still reads as a single moving light.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one segment at a time, wait for you to confirm, explain terms on
    request, and always check wiring, board, port, and USB before changing code.
  coachInstructions:
    - Guide one segment at a time and wait for learner confirmation before moving to the next; ten connections are easy to lose track of.
    - Remind the learner that each segment needs its own 220 Ω series resistor — a shared or missing resistor is the common mistake here.
    - If the whole bar stays dark, have the learner rotate the LED bar 180° and re-check the common row to ground before changing code.
    - If one segment never lights, check that segment's resistor and its jumper to its GPIO pin, not the whole circuit.
    - Explain the pin array and the forward and reverse loops on request; do not dump theory before the learner has a working circuit.
    - Keep the Arduino path primary; MicroPython is optional only if already set up.

