steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Place the LED bar across the breadboard's centre channel so each segment has its own row. {ledBar}
    - Wire each segment through its own 220 Ω resistor to its GPIO pin, working along the list in order. {pinArray}
    - Wire the bar's common row to ground so every segment shares the same return.
    - Compare every wire to the chart before you plug in USB.
    - Open `Sketch_03.1_FlowingLight.ino` in Arduino IDE and upload it.
    - Watch a single lit segment sweep along the bar and back.
  done:
    icon: "💡"
    title: Ten pins, one motion.
    body: A list of pins and a loop are now driving the whole bar. Head to Test & debug to confirm the flowing sweep.

code:
  intro: >
    The code for ten LEDs is the same length as the code for two. The pins live
    in one array and a loop does each job once per pass — one pinMode line
    prepares all ten, one digitalWrite line drives whichever the loop points at.
    Switch to MicroPython if you'd rather see the same idea in Python — the
    wiring never changes.
  arduino:
    file: Sketch_03.1_FlowingLight.ino
    sketch: C/Sketches/Sketch_03.1_FlowingLight/Sketch_03.1_FlowingLight.ino
    excerpt: |
      byte ledPins[] = {21, 47, 48, 38, 39, 40, 41, 42, 2, 1};
      int ledCounts;

      void setup() {
        ledCounts = sizeof(ledPins);
        for (int i = 0; i < ledCounts; i++) {
          pinMode(ledPins[i], OUTPUT);
        }
      }

      void loop() {
        for (int i = 0; i < ledCounts; i++) {       // forward sweep
          digitalWrite(ledPins[i], HIGH);
          delay(100);
          digitalWrite(ledPins[i], LOW);
        }
        for (int i = ledCounts - 1; i > -1; i--) {  // reverse sweep
          digitalWrite(ledPins[i], HIGH);
          delay(100);
          digitalWrite(ledPins[i], LOW);
        }
      }
    notes:
      - code: byte ledPins[] = {21, 47, 48, 38, 39, 40, 41, 42, 2, 1}
        text: All ten pins in one array, in bar order. The array holds the pattern; position 0 is the first segment, position 9 the last.
        explain: pinArray
      - code: ledCounts = sizeof(ledPins)
        text: Counts the array so the loop knows where to stop. Add or remove a pin and the loops adjust on their own, with no other edit.
      - code: pinMode(ledPins[i], OUTPUT)
        text: Runs once per pin in setup(), so a single line prepares all ten instead of ten copied lines.
        explain: pinMode
      - code: digitalWrite(ledPins[i], HIGH)
        text: "ledPins[i] reads the pin at position i, and the loop drives just that one HIGH; the next line sets it LOW before i moves on."
        explain: digitalWrite
      - code: for (int i = ledCounts - 1; i > -1; i--)
        text: Same array, index counting down from 9 to 0, so the light steps back the other way.
        explain: pinArray
  micropython:
    file: 03.1_FlowingLight/FlowingLight.py
    path: Python/Python_Codes/03.1_FlowingLight/FlowingLight.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      pins = [21, 47, 48, 38, 39, 40, 41, 42, 2, 1]

      while True:
          for i in range(len(pins)):
              led = Pin(pins[i], Pin.OUT)
              led.value(1)
              time.sleep_ms(100)
              led.value(0)
    notes:
      - code: pins = [21, 47, 48, 38, 39, 40, 41, 42, 2, 1]
        text: The same list of pins in Python, in the same bar order.
        explain: pinArray
      - code: led = Pin(pins[i], Pin.OUT)
        text: Picks one pin from the list and drives it, then the loop moves to the next.
    note: >
      Same pins, same wiring. Run it in Thonny if MicroPython is set up; otherwise
      skip it — it should never block the Arduino-first path.

theory:
  title: An array of pins, walked by a loop
  summary: Ten pins live in one array; a loop's counter steps through it, lighting whichever pin its index points at. The moving light is that index over time.
  intro: >
    The instinct with ten LEDs is to write the blink code ten times over. That
    works, and it is a trap — it does not scale, and every change means editing
    ten places. The move that does scale is the whole lesson. Name the pins once,
    as a numbered list, and write the work once, as a loop that reads the list by
    position. The count of outputs stops mattering to the code.
  flow:
    - n: "1"
      title: "Pins in an array"
      body: "ledPins holds all ten pin numbers in bar order. An array is a numbered shelf- position 0 is the first segment, position 9 the last. The array is the pattern; the wiring just follows it."
    - n: "2"
      title: "An index selects one"
      body: "The loop keeps a counter, i. ledPins[i] means read the pin number sitting at position i — so a single line can address any segment by changing one number."
    - n: "3"
      title: "Light, then step"
      body: "The loop drives that one pin HIGH, waits, sets it LOW, then i++ moves the index one place along the array to the next pin."
    - n: "4"
      title: "Motion is the index over time"
      body: "As i climbs 0 to 9, the lit pin marches down the bar. One counter, changing over time, is the whole of the motion. Reverse the count, 9 down to 0, and the light flows back."
  formulaLabel: The model
  formula: "**pins in an array** + **a loop over the index** = ten outputs from code you wrote once"
  notes:
    - title: Why an array beats ten variables
      explain: pinArray
      body: Ten named variables would mean ten copies of pinMode and two more of every blink line. The array collapses all of that into one loop, and it takes the count of pins from the list itself — so growing the bar is one more number, not another block of code.
    - title: Why each segment still needs its own resistor
      explain: resistor
      body: A LED left to itself pulls far more current than it can survive and burns out in an instant. It has no way to limit itself. The 220 Ω resistor in series does the limiting — the voltage across it sets how much current flows, and that current is what a LED actually runs on. Ten LEDs on ten pins means ten resistors; one shared resistor would starve or overload them together.

test:
  mode: visual
  intro: >
    Nothing prints to the screen today — the proof is the moving light on the bar.
  expectedTitle: What you should see
  readoutLabel: LED bar
  expected:
    - One lit segment starts at one end of the bar.
    - It travels along the bar a segment at a time to the far end.
    - Then it flows back the other way, and repeats for as long as the board has power.
  expectedNote: Only one segment is lit at any instant, so the flow you see is that single light stepping from one row to the next.
  checksTitle: If it doesn't
  checks:
    - symptom: "Whole bar stays dark?"
      fix: "The bar is likely in backwards — its direction is easy to reverse. Rotate it 180°, then re-check the common row to ground."
    - symptom: "One segment never lights?"
      fix: "That one segment is a broken circuit of its own — check its 220 Ω resistor and its jumper to the right GPIO pin. Its neighbours working tells you the code and ground are fine."
    - symptom: "Segments light in a scrambled order, not a clean sweep?"
      fix: "A jumper is on the wrong GPIO, so a pin sits out of sequence versus the array. Re-check each wire against the pin order 21 47 48 38 39 40 41 42 2 1."
    - symptom: "Nothing happens at all?"
      fix: "Re-check the common row to ground, then that the sketch actually uploaded."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: prove the array is the pattern"
  railLabel: Try this
  intro: >
    Two edits that touch only the array — no rewiring, and you never open the
    loops. If the motion follows what you type in the list, you have proven the
    pattern lives in the array and the loop just reads it.
  summary: Reorder the numbers in the pin array and watch the sweep reorder to match, then delete two numbers and watch the sweep shorten on its own — the loop follows the list without being touched.
  cards:
    - title: Scramble the list
      explain: pinArray
      body: In `byte ledPins[]`, swap two of the pin numbers — put 48 where 47 was, and 47 where 48 was — and upload. Nothing on the breadboard changed, yet the light now jumps between those two segments out of order. The sequence you see is the array's order, and the wiring only decides which physical LED each number reaches.
    - title: Make the bar shorter
      body: Delete two numbers from the end of the array so it holds eight instead of ten, and upload. The sweep now covers eight segments and turns back early — even though you never edited a loop. The loops read their length from the array itself, so shortening the list shortens the pattern for free.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one segment at a time, wait for you to confirm, and always check
    wiring, board, port, and USB before changing code. Once the bar is sweeping,
    make the array-and-loop idea land- the pins are one list, the loop walks it
    by index, and the moving light is that index over time.
  coachInstructions:
    - Guide one segment at a time and wait for learner confirmation before moving to the next; ten connections are easy to lose track of.
    - Teach the core idea once the circuit works- ten pins in one array, one loop stepping through it by index, so code written once drives all ten. Frame the moving light as one counter climbing through the list over time.
    - Explain the resistor as current-limiting, not decoration- a LED alone pulls too much current and burns out, and the 220 Ω resistor in series sets the current it runs on. Each segment needs its own; a shared or missing resistor is the common mistake here.
    - If the whole bar stays dark, have the learner rotate the LED bar 180° and re-check the common row to ground before changing code.
    - If one segment never lights, check that segment's resistor and its jumper to its GPIO pin, not the whole circuit — its neighbours working proves the code and ground are fine.
    - For the challenge, have them edit only the array (reorder, then shorten) and predict the result first; the point is that the pattern lives in the list, not the loop or the wiring.
    - Keep the Arduino path primary; MicroPython is optional only if already set up.

