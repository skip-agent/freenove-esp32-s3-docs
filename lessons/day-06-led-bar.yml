  intro: >
    The official Freenove diagram is your chart — schematic on top, the same
    circuit built on a breadboard below. Click it to enlarge. Ten segments look
    like a lot, but each one is the same small connection repeated.
  diagram:
    image: day-06/circuit-page-56.png
