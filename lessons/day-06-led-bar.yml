# Day 6 — LED bar · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-06-led-bar/), the agent packet, and the course-map entry.
# The real lesson is the array + loop — ten outputs from code that names a pin
# once, plus why every segment still needs its own current-limiting resistor.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY06-LEDBAR
day: 6
slug: day-06-led-bar
title: Make ten lights flow like water
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire a ten-segment LED bar — each segment on its own pin through its own
  220 Ω resistor — and drive all ten from a sketch that never names a pin more
  than once. Ten pins live in one array; one loop walks that array and lights
  whichever pin it points at. The sweep you see is the loop's counter climbing
  through the list and back. Learn that, and adding an eleventh output later is
  one more number, not another block of copied code.
unlocks: You can drive many identical outputs from one array and one loop instead of copying a line per output, and you know why each LED needs its own resistor to survive.
seoDescription: >
  Drive a ten-segment LED bar from the ESP32-S3 with a single array of pins and
  one loop instead of ten copied lines, watch a lit segment sweep along the bar
  and back, and learn why every LED needs its own current-limiting resistor.

