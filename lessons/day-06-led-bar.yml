lessonCode: TSK-DAY06-LEDBAR
day: 6
slug: day-06-led-bar
title: Make ten lights flow like water
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire a ten-segment LED bar — each segment on its own pin through its own
  220 Ω resistor — upload the Arduino sketch, and watch a single lit segment
  sweep along the bar and back, over and over.
unlocks: One list of pins and one loop can drive ten outputs, so you stop repeating yourself and start thinking in patterns.
seoDescription: >
  Wire a ten-segment LED bar to the ESP32-S3, upload the sketch, and watch a
  lit segment flow along the bar and back — your first many-output circuit
  driven by a pin array and a loop.

