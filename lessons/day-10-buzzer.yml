steps:
  intro: >
    This is the main path — you can finish the day without opening a single field
    note. Tap each step as you go to keep your place.
  items:
    - Seat the ESP32-S3 on the GPIO extension board and keep USB unplugged while you wire.
    - Place the transistor on the breadboard and note its three legs — emitter, base, and collector. {transistor}
    - Wire the buzzer's + pin to the 5V rail and its other pin down to the transistor.
    - Connect the transistor's base to GPIO 14 through the 1 kΩ resistor.
    - Wire the push button so one side reaches GPIO 21, then add its 10 kΩ pull-up to 3.3V. {pullResistor}
    - Compare every wire to the chart before you plug in USB.
    - Open `Sketch_06.1_Doorbell.ino` in Arduino IDE and upload it.
    - Press the button and listen.
  done:
    icon: "💡"
    title: The board can speak.
    body: Press for a beep, release for silence — your first doorbell. Head to Test & debug to confirm the sound.

code:
  intro: >
    The whole sketch is short. Two lines set the pins up; the loop just asks the
    button and answers with the buzzer. Switch to MicroPython if you'd rather see
    the same idea in Python — the wiring never changes.
  arduino:
    file: Sketch_06.1_Doorbell.ino
    sketch: C/Sketches/Sketch_06.1_Doorbell/Sketch_06.1_Doorbell.ino
    variant: C/Sketches/Sketch_06.2_Alertor/Sketch_06.2_Alertor.ino
    excerpt: |
      #define PIN_BUZZER 14
      #define PIN_BUTTON 21

      void setup() {
        pinMode(PIN_BUZZER, OUTPUT);
        pinMode(PIN_BUTTON, INPUT);
      }

      void loop() {
        if (digitalRead(PIN_BUTTON) == LOW) {
          digitalWrite(PIN_BUZZER, HIGH);   // pressed -> beep
        } else {
          digitalWrite(PIN_BUZZER, LOW);    // released -> silent
        }
      }
    notes:
      - code: digitalRead(PIN_BUTTON) == LOW
        text: True only while the button is held — a press pulls GPIO 21 LOW.
        explain: digitalRead
      - code: digitalWrite(PIN_BUZZER, HIGH)
        text: Sends the pin HIGH, which switches the buzzer on through the transistor.
        explain: transistor
      - code: ledcWriteTone(channel, freq)
        text: The passive-buzzer variant (`Sketch_06.2_Alertor`) uses ledcWriteTone to choose the pitch and sweep a siren.
        explain: tone
  micropython:
    file: 06.1_Doorbell/Doorbell.py
    path: Python/Python_Codes/06.1_Doorbell/Doorbell.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      button = Pin(21, Pin.IN, Pin.PULL_UP)
      activeBuzzer = Pin(14, Pin.OUT)

      if not button.value():
          activeBuzzer.value(1)
      else:
          activeBuzzer.value(0)
    notes:
      - code: Pin(21, Pin.IN, Pin.PULL_UP)
        text: Reads GPIO 21 as an input with a built-in pull-up — the same job the 10 kΩ resistor does in hardware.
      - code: activeBuzzer = Pin(14, Pin.OUT)
        text: Drives GPIO 14, which switches the buzzer through the transistor.
    note: >
      Same pins, same wiring. The passive-buzzer version uses `PWM(Pin(14), 2000)`
      and `.freq(...)` to pick the pitch. Run it in [Thonny](https://thonny.org) if MicroPython is set
      up; otherwise skip it — it should never block the Arduino-first path.

theory:
  title: What sound is, and why pitch is frequency
  summary: Sound is air vibrating, and pitch is how many on/off cycles a second reach the buzzer — the counterpart to Day 7, where the pin's on-time set brightness.
  intro: >
    Today's doorbell uses an active buzzer, which plays one fixed note. The idea
    worth carrying is what that note actually is, because the passive buzzer later
    lets you choose it. Sound is moving air, and the pitch you hear is a number.
  flow:
    - n: "Air"
      title: Sound is vibration
      body: >-
        A buzzer holds a thin disc that snaps back and forth, shoving the air in
        front of it. Each full back-and-forth is one cycle, and your ear reads a
        stream of those pushes as a sound rather than separate clicks.
    - n: "Rate"
      title: Pitch is frequency
      body: >-
        How many cycles happen each second is the frequency, measured in hertz.
        More cycles a second arrives as a higher note, fewer as a lower one, so
        the pitch is simply a count you can name and set.
    - n: "Active"
      title: Its own oscillator
      body: >-
        An active buzzer carries a tiny oscillator inside that vibrates the disc
        at one built-in rate, so bare power plays one set note. That is the beep
        in today's doorbell, and why the pin only has to switch it on or off.
    - n: "Passive"
      title: You set the rate
      body: >-
        A passive buzzer has no oscillator and stays silent on steady power. The
        pin has to switch it on and off itself, and how fast it does that becomes
        the pitch. The frequency you drive it at is the frequency you hear.
    - n: "Notes"
      title: Music is frequencies
      body: >-
        A musical note is a named frequency: 262 Hz is a middle C, 392 Hz is the
        G above it, 440 Hz is the A an orchestra tunes to. Feed those numbers to
        a passive buzzer and it plays them; tone() generates exactly that.
  formulaLabel: The model
  formula: "**on/off cycles per second** = frequency = **pitch** (Day 7 varied on-time for brightness; here the rate sets the note)"
  notes:
    - title: The tie back to Day 7
      explain: pwm
      body: >-
        Day 7's pin also flicked far too fast to watch, and its duty cycle, the
        share of each cycle held on, set the brightness. Here the duty stays near
        half and the frequency is the knob, so the same fast-switching pin makes
        pitch instead of light.
    - title: Why the active buzzer ignores all this
      explain: buzzer
      body: >-
        Its built-in oscillator fixes its own pitch, so switching it faster from
        the pin just chops the same note on and off. Only a passive buzzer hands
        you the frequency, which is why melodies and sirens need the passive kind.
    - title: Where the transistor fits
      explain: transistor
      body: >-
        The pin still can't supply the buzzer's current, so it switches a
        transistor and the transistor drives the 5V buzzer. The pin decides on or
        off; the transistor does the lifting.

test:
  mode: visual
  intro: >
    Nothing prints to the screen today — the proof is the sound under your finger.
  expectedTitle: What you should hear
  readoutLabel: Buzzer
  expected:
    - Press and hold the button — a steady beep sounds at once.
    - Let go — silence.
    - Every press sounds the same note, for as long as the board has power.
  expectedNote: An active buzzer plays one fixed tone — choosing the pitch is the passive-buzzer variant's job.
  checksTitle: If it doesn't
  checks:
    - symptom: "No sound at all?"
      fix: "Check the transistor legs are the right way round, and that the buzzer + goes to 5V."
    - symptom: "Always sounding?"
      fix: "The button or its 10 kΩ pull-up is likely miswired on GPIO 21."
    - symptom: "Very faint?"
      fix: "The buzzer may be on 3.3V instead of 5V — move it to the 5V rail."
    - symptom: "Upload fails?"
      fix: "Swap in a data-capable USB cable."

challenge:
  title: "Try this: play a pitch, then a phrase"
  railLabel: Try this
  intro: >
    The doorbell proved a pin can make sound. This proves the pitch is a number
    you choose. Swap in the passive buzzer, drive it with tone() the way
    `Sketch_06.2_Alertor.ino` does, and hear frequency become pitch in your own
    ear. It fits inside today's session.
  summary: Play three named frequencies on the passive buzzer, hear each land as a higher note, then string them into a short rising phrase — and confirm the active buzzer can't do it.
  cards:
    - title: Play three notes
      explain: tone
      body: >-
        Swap in the passive buzzer and, using tone() on GPIO 14, sound 262 Hz,
        then 392 Hz, then 523 Hz for about half a second each. Those are a middle
        C, the G above it, and the C above that — each higher frequency is an
        unmistakably higher note. That mapping from frequency to pitch is the
        whole idea of the day.
    - title: Build a tiny phrase
      explain: buzzer
      body: >-
        Now play 330 Hz, 392 Hz, then 523 Hz in a row with short gaps between
        them — a three-note rising figure you can hum back. You have turned bare
        numbers into music. Try the same on the active buzzer and it can't
        follow: its oscillator only ever knows its one note.

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical connection at a time and wait for confirmation, but make
    sure the learner leaves understanding that pitch is frequency and why an
    active buzzer plays one fixed note while a passive buzzer can be tuned. Always
    check transistor orientation, wiring, board, port, and USB before code.
  coachInstructions:
    - Guide one physical connection at a time and wait for learner confirmation before proceeding.
    - Land the core idea- sound is vibrating air, and pitch is frequency, the number of on/off cycles a second that reach the buzzer.
    - Tie it to Day 7- there the duty cycle set brightness; here the frequency sets pitch while the duty stays roughly fixed, the same fast-switching pin doing a new job.
    - Explain active versus passive plainly- an active buzzer has its own oscillator and plays one fixed note, while a passive buzzer is silent until the pin feeds it a frequency, which tone() generates.
    - Point out that musical notes are just specific frequencies, so 262 Hz is a middle C and 392 Hz the G above it.
    - Check the transistor's orientation first — emitter, base, and collector each have a job, and a reversed transistor is the most common cause of no sound.
    - Confirm the buzzer's + pin goes to the 5V rail, not 3.3V, or the sound will be faint or absent.
    - If the buzzer always sounds, suspect the button wiring or its 10 kΩ pull-up on GPIO 21.
    - Keep the Arduino path primary; the passive-buzzer pitch experiment and MicroPython are optional only if already set up.

