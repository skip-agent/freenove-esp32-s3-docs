# Day 10 — Buzzer · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-10-buzzer/), the agent packet, and the course-map entry.
# The board gets a voice — and a transistor lets a pin drive a load it can't power directly.

