  lede: >
    Today the board makes sound. You wire an active buzzer through a small
    transistor, add a push button, and upload a sketch that beeps the instant you
    press — a doorbell you built yourself. The beep is worth understanding: sound
    is air pushed rapidly back and forth, and how many pushes a second is the
    pitch you hear. An active buzzer fixes that number itself; a passive buzzer
    hands it to you to set.
  pills:
