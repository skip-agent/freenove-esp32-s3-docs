# Day 10 — Buzzer · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-10-buzzer/), the agent packet, and the course-map entry.
# The board gets a voice: an active buzzer beeps on command, and pitch turns out
# to be frequency — the counterpart to Day 7, where on-time set brightness.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY10-BUZZER
day: 10
slug: day-10-buzzer
title: Give the board a voice
status: published
estimatedTimeMinutes: 25
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire an active buzzer through an NPN transistor, add a push button, upload the
  Arduino sketch, and turn your board into a doorbell — press for a beep, let go
  for silence. While you build it, learn what that beep actually is: sound is air
  being pushed back and forth, and its pitch is a frequency you can set. That is
  the idea the passive-buzzer siren pays off, and the counterpart to Day 7, where
  the pin's on-time set brightness.
unlocks: You learn that sound is vibrating air and pitch is frequency — the count of on/off cycles a second, in hertz — why an active buzzer plays one fixed note while a passive buzzer lets you choose the pitch, and how a transistor lets a gentle pin drive the 5V buzzer.
seoDescription: >
  Wire an active buzzer and an NPN transistor to the ESP32-S3, add a push button,
  and build a doorbell — press to beep. Learn what sound is, why pitch is
  frequency, and how an active buzzer with its own oscillator differs from a
  passive buzzer you tune with tone().

