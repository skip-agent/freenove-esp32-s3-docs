# Day 22 — Motor driver · tinyskiff.lesson.v1
# One source of truth: this file renders to the guided page
# (/course/day-22-motor/), the agent packet, and the course-map entry.
# The first motion day — three small signals steer battery current through a motor.

schema: tinyskiff.lesson.v1
lessonCode: TSK-DAY22-MOTOR
day: 22
slug: day-22-motor
title: "Motor driver: control motion safely"
status: published
estimatedTimeMinutes: 30
tracks: { main: arduino, optional: micropython }
learnerProfile: adult beginner; curious and capable; no electronics assumed

mission: >
  Wire a DC motor through the L293D driver chip, power it from its own 9V
  battery, and turn a potentiometer to command the motor's speed and direction —
  the board sends the plan, the chip switches the current.
unlocks: The board can command real motion — a driver chip lets its small signals steer heavy current on the board's behalf.
seoDescription: >
  Drive a DC motor from the ESP32-S3 with the L293D driver chip and a 9V
  battery. Turn a potentiometer to set speed and direction — your first safe
  motion project.

hero:
  instrument: none
  headline: Make a motor|answer the {knob}
  lede: >
    Today the board moves something. A knob sets the plan, three small signals
    carry it to the L293D driver chip, and the chip switches a 9V battery's
    current through a DC motor. Sweep the knob and the shaft speeds up, slows,
    stops at centre, and spins the other way.
  pills:
    - { text: About 30 minutes, key: true }
    - Arduino first
    - MicroPython optional
    - Bring a 9V battery

parts:
  intro: >
    Six pictured parts plus one you supply yourself — a 9V battery. Freenove
    leaves the battery out of the box, so have a fresh one ready along with the
    kit's battery line (the clip-on lead that reaches the extension board). Tap
    *Define* on any part you haven't met — the answer opens as a field note you
    can read and dismiss without losing your place.
  items:
    - name: ESP32-S3 board
      image: shared/item-esp32-s3-board.jpg
      imageKind: Manual photo
      alt: Official manual photo of the ESP32-S3 development board.
      blurb: The brain that runs your uploaded sketch.
      explain: esp32
    - name: GPIO extension board
      image: shared/item-gpio-extension-board.png
      imageKind: Manual photo
      alt: Official manual image of the ESP32-S3 GPIO extension board.
      blurb: Spreads the pins into rows — and carries the battery's power today.
      explain: gpio
    - name: DC motor
      image: shared/item-motor.png
      imageKind: Manual photo
      alt: Official manual photo of a small DC motor with two terminals and a metal shaft.
      blurb: The part that moves — current through its two terminals spins the shaft.
      explain: dcMotor
    - name: L293D driver chip
      image: shared/item-l293d.png
      imageKind: Manual photo
      alt: Official manual photo of the L293D motor driver chip, a sixteen-pin integrated circuit.
      blurb: Takes the board's small signals and switches the battery's current.
      explain: motorDriver
    - name: Rotary potentiometer
      image: shared/item-potentiometer.png
      imageKind: Manual illustration
      alt: Official manual illustration of a rotary potentiometer with rotation arrows and its three pins labelled 1, 3, and 2.
      blurb: The knob — one sweep sets both speed and direction.
      explain: potentiometer
    - name: Jumper wires (M/M)
      image: shared/item-jumper-wire.png
      imageKind: Manual photo
      alt: Official manual image of a jumper wire.
      blurb: Temporary, solder-free connections.
      explain: jumpers

wiring:
  intro: >
    The official Freenove diagram is your chart — schematic on top, the same
    circuit built on a breadboard below. Click it to enlarge. More wires than
    usual today, so take the connections one row at a time.
  diagram:
    image: day-22/circuit-page-147.png
    alt: >-
      Official Freenove circuit for driving a DC motor with an L293D: the chip's
      In1, In2, and Enable1 pins wired to GPIO 13, 14, and 12, a rotary
      potentiometer feeding GPIO 1, the motor on the chip's Out1 and Out2, and a
      9V battery powering the extension board, shown as both a schematic and a
      breadboard photo.
    caption: >-
      Official Freenove circuit — C Tutorial, Chapter 16 (Relay & Motor), page
      147. The crop keeps Freenove's note about powering the motor from a 9V
      battery — that note is the heart of today's safety rule.
    zoomCaption: Official Freenove circuit, C Tutorial Chapter 16, page 147.
    source: { pdf: C_Tutorial.pdf, chapter: 16, chapterTitle: Relay & Motor, page: 147 }
  pins:
    - { from: L293D In1, to: GPIO 13, why: First direction signal — HIGH here drives the motor one way., explain: motorDriver }
    - { from: L293D In2, to: GPIO 14, why: Second direction signal — always set opposite to In1., explain: gpio }
    - { from: L293D Enable1, to: GPIO 12, why: The speed signal — PWM here sets how hard the motor drives., explain: pwm }
    - { from: Pot outer pins, to: 3.3V and GND, why: Feed the knob's track so the wiper can sweep between them., explain: potentiometer }
    - { from: Pot middle pin, to: GPIO 1, why: The knob's voltage lands here — the pin the code reads as A0., explain: adc }
    - { from: Motor terminals, to: L293D Out1 and Out2, why: Where the chip feeds the battery's current to the motor., explain: dcMotor }
    - { from: 9V battery line, to: Extension board power terminal, why: Supplies the motor's current so the USB port never carries it., explain: externalPower }
  safety:
    - label: Power the motor from the battery only.
      icon: "⚓"
      body: >
        Freenove's warning is direct — powering the motor from the ESP32-S3
        directly "may cause permanent damage to your ESP32-S3". Even spinning
        free, this motor draws about 0.2–0.3 A, far past what the board can
        supply. Connect the 9V battery to the extension board's power terminal
        and let it carry the motor.
    - label: Share one ground.
      icon: "⚓"
      body: >
        An external supply must share a common ground with the board — the
        extension board's power terminal does this for you when it's wired as
        charted. Unplug USB before you move any wire.

steps:
  intro: >
    This is the main path — you can finish the day without opening a single
    field note. Tap each step as you go to keep your place.
  items:
    - Keep USB unplugged, seat the ESP32-S3 on the GPIO extension board, and set the 9V battery aside until the wiring is checked.
    - Press the L293D into the breadboard so its notch faces the same way as the chart — the chip only works one way round. {motorDriver}
    - Wire the direction pins — `In1 → GPIO 13` and `In2 → GPIO 14`.
    - Wire the speed pin — `Enable1 → GPIO 12`. {pwm}
    - Connect the motor's two terminals to the chip's `Out1` and `Out2`.
    - Wire the potentiometer — outer pins to 3.3V and GND, middle pin to GPIO 1. {potentiometer}
    - Clip the battery line onto the 9V battery and connect it to the extension board's power terminal, minding + and −. {externalPower}
    - Compare every wire to the chart — this is the day to be fussy about it — then plug in USB.
    - Open `Sketch_16.1_Control_Motor_by_L293D.ino` in Arduino IDE and upload it.
    - Switch on the extension board's power and sweep the knob slowly from end to end.
  done:
    icon: "⚙️"
    title: The board moves the world.
    body: A knob in your hand is now steering a spinning shaft. Head to Test & debug to confirm the centre-stop and the reverse.

code:
  intro: >
    One sketch, three jobs — read the knob, work out speed and direction from
    the centre point, and hand both to the driver chip. Switch to MicroPython if
    you'd rather see the same idea in Python — the wiring never changes.
  arduino:
    file: Sketch_16.1_Control_Motor_by_L293D.ino
    sketch: C/Sketches/Sketch_16.1_Control_Motor_by_L293D/Sketch_16.1_Control_Motor_by_L293D.ino
    excerpt: |
      int in1Pin = 13;      // Define L293D channel 1 pin
      int in2Pin = 14;      // Define L293D channel 2 pin
      int enable1Pin = 12;  // Define L293D enable 1 pin
      int channel = 0;

      boolean rotationDir;  // Define a variable to save the motor's rotation direction
      int rotationSpeed;    // Define a variable to save the motor rotation speed

      void setup() {
        Serial.begin(115200);
        pinMode(in1Pin, OUTPUT);
        pinMode(in2Pin, OUTPUT);
        pinMode(enable1Pin, OUTPUT);

        ledcAttachChannel(enable1Pin, 1000, 11, channel);//Set PWM to 11 bits, range is 0-2047
      }

      void loop() {
        int potenVal = analogRead(A0);      // Convert the voltage of rotary potentiometer into digital
        if (potenVal > 2048)
          rotationDir = true;
        else
          rotationDir = false;
        // Calculate the motor speed
        rotationSpeed = abs(potenVal - 2048);
        Serial.println(rotationSpeed);
        delay(100);
        driveMotor(rotationDir, constrain(rotationSpeed,0,2048));
      }

      void driveMotor(boolean dir, int spd) {
        // Control motor rotation direction
        if (dir) {
          digitalWrite(in1Pin, HIGH);
          digitalWrite(in2Pin, LOW);
        }
        else {
          digitalWrite(in1Pin, LOW);
          digitalWrite(in2Pin, HIGH);
        }
        // Control motor rotation speed
        ledcWrite(enable1Pin, spd);
      }
    notes:
      - code: analogRead(A0)
        text: Reads the knob. A0 is this board's alias for GPIO 1 — the same pin your wire lands on.
        explain: adc
      - code: ledcAttachChannel(enable1Pin, 1000, 11, channel)
        text: Sets up PWM on the enable pin at 11 bits, so speed runs from 0 to 2047.
        explain: ledc
      - code: rotationSpeed = abs(potenVal - 2048)
        text: Speed is the knob's distance from centre; which side of 2048 it sits on picks the direction.
      - code: ledcWrite(enable1Pin, spd)
        text: Hands the speed to the chip — more on-time on Enable1 means more push through the motor.
        explain: pwm
  micropython:
    file: 15.1_Motor_And_Driver/Motor_And_Driver.py
    path: Python/Python_Codes/15.1_Motor_And_Driver/Motor_And_Driver.py
    optionalTag: Optional side path · same circuit
    excerpt: |
      in1Pin=Pin(13, Pin.OUT)
      in2Pin=Pin(14, Pin.OUT)

      enablePin=Pin(12, Pin.OUT)
      pwm=PWM(enablePin,10000)

      adc=ADC(Pin(1))

      try:
          while True:
              potenVal = adc.read()
              if (potenVal > 2048):
                  rotationDir = 1;
              else:
                  rotationDir = 0;
              rotationSpeed=int(math.fabs((potenVal-2047)//2)-1)
              driveMotor(rotationDir,rotationSpeed)
              time.sleep_ms(10)
    notes:
      - code: pwm=PWM(enablePin,10000)
        text: PWM on GPIO 12 at 10 kHz with a 10-bit duty (0–1023) — the same idea as Arduino's 0–2047 on a smaller scale.
      - code: adc=ADC(Pin(1))
        text: Reads the knob straight from GPIO 1 — the pin the Arduino sketch calls A0.
    note: >
      Same wiring, same centre-zero knob. MicroPython's duty is 10-bit, so its
      speed formula halves the distance from centre to fit the 0–1023 range —
      different numbers, identical behaviour. Run it in Thonny if MicroPython is
      set up; otherwise skip it — it should never block the Arduino-first path.

theory:
  title: Small signals, borrowed muscle
  summary: The board sends three small signals — two for direction, one PWM for speed — and the L293D switches the battery's current through the motor.
  intro: >
    A GPIO pin is a messenger. It can say a lot, and it can carry almost
    nothing. Today's chip is the porter that carries the load the message
    describes.
  flow:
    - { n: Read, title: Knob to number, body: The ADC turns the pot's voltage into a number from 0 to 4095. }
    - { n: Decide, title: Centre is zero, body: Distance from 2048 is the speed and its side is the direction. }
    - { n: Signal, title: Three small wires, body: In1 and In2 set direction while Enable1 carries the PWM speed. }
    - { n: Deliver, title: Chip switches battery, body: The L293D feeds the 9V battery's current through the motor. }
  formulaLabel: The model
  formula: "speed = **distance from 2048** · direction = **side of 2048**"
  notes:
    - title: Why the chip is here
      explain: motorDriver
      body: >
        A GPIO pin can offer a few milliamps, and this motor draws around
        0.2–0.3 A before it even does any work. The L293D takes the pin's small
        signal and switches the battery's heavy current — the board decides, the
        chip delivers.
    - title: Two power worlds, one ground
      explain: externalPower
      body: >
        The 9V battery moves the motor; USB feeds the board. The two supplies
        only agree on what HIGH and LOW mean because they share a ground on the
        extension board — that shared wire is what makes the chip's inputs
        readable.

test:
  mode: visual
  intro: >
    The proof today is the spinning shaft in front of you — Serial Monitor backs
    it up with a live speed number.
  expectedTitle: What you should see
  readoutLabel: Motor
  expected:
    - Knob at centre — the motor sits still.
    - Turn one way — the shaft spins up, faster the further you go.
    - Sweep back through centre — it slows, stops, then spins the other way.
    - Serial Monitor at 115200 baud prints the speed number — 0 at centre, up to 2047 at the ends.
  expectedNote: >-
    Expect a small still zone either side of centre — a motor needs a push of
    current before it beats its own friction, so the first sliver of knob
    travel does nothing. Today's challenge puts a number on exactly that.
  checksTitle: If it doesn't
  checks:
    - symptom: "Motor never spins?"
      fix: "Check the 9V battery on the extension board — its switch and its wiring — then the L293D's orientation by the notch."
    - symptom: "Spins one direction only?"
      fix: "A direction wire is loose or swapped — recheck In1 on GPIO 13 and In2 on GPIO 14."
    - symptom: "Board resets or USB drops out?"
      fix: "You're powering the motor from USB — stop and connect the 9V battery so the extension board carries the load."
    - symptom: "Speed number stuck in Serial Monitor?"
      fix: "Check the pot's middle wire on GPIO 1 — the pin the code reads as A0."

challenge:
  title: "Try this: find the starting push"
  railLabel: Try this
  intro: >
    Same working circuit, two experiments with the numbers on your screen. It
    fits inside today's 30 minutes.
  summary: Find the smallest speed number that actually starts the motor turning, then make the serial output signed so reverse reads as negative.
  cards:
    - title: Find the breakaway number
      explain: dcMotor
      body: >
        Creep the knob out from centre while watching Serial Monitor. Note the
        number on screen the moment the shaft first turns — that's the push
        this motor needs to beat its own friction. Try it in both directions.
    - title: Print a signed speed
      explain: serial
      body: >
        Change the sketch so Serial prints `potenVal - 2048` in place of the
        abs() value. Now one direction reads positive and the other negative —
        a single number that tells the whole story of the shaft.
  logbook:
    - What speed number first got the shaft moving — and was it the same in both directions?
    - Why does the motor need current before it moves at all?
    - What would you drive with this chip if the motor were a wheel, a pump, or a winch?

agent:
  intro: >
    Every lesson ships with a code and a machine-readable packet, so an agent can
    guide you with full context.
  behaviour: >
    guide one physical connection at a time, wait for you to confirm, keep the
    9V-battery rule front and centre, and always check wiring, power, board,
    and port before changing code.
  coachInstructions:
    - Before anything powers up, confirm the 9V battery is connected to the extension board — Freenove warns that powering the motor from the ESP32-S3 directly may cause permanent damage to the board.
    - Confirm the battery and the board share a common ground through the extension board before debugging any behaviour.
    - If the motor never spins, check the battery and the extension board's power switch first, then the L293D's orientation by its notch.
    - If the motor spins one direction only, suspect the In1/In2 wires on GPIO 13 and GPIO 14.
    - If the board resets or its USB port drops out, the motor is pulling from USB — stop immediately and connect the 9V battery before continuing.
    - If the speed number in Serial Monitor is stuck, check the pot's middle wire on GPIO 1, the pin the code reads as A0.

