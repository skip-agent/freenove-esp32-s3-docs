name: Deploy to Cloudflare Pages

# Auto-deploy: every push to main rebuilds the static site from source and
# ships it to the tinyskiff-esp32 Cloudflare Pages project. No manual
# `wrangler pages deploy` step, and no CF git-integration OAuth needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cf-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The build needs the ~200 MB official kit under source/, which is not
      # committed. docs/ is the committed, pre-built output (rebuild locally with
      # `.venv/bin/python scripts/build_site.py` and commit it), so CI just ships
      # what's in the repo.
      - name: Deploy docs/ to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs --project-name=tinyskiff-esp32 --branch=main
