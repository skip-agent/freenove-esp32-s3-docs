name: Deploy to Cloudflare Pages

# Auto-deploy the built site to the Cloudflare Pages project `tinyskiff-esp32`
# (live at esp32.tinyskiff.xyz) on every push to main that touches the output.
# The site is pre-built and committed under docs/ — the Freenove source/ folder
# is gitignored, so CI does NOT build; it just uploads the committed docs/.
# This is the auto-deploy the CF dashboard git-integration can't do here.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-cloudflare.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy docs/ to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs --project-name=tinyskiff-esp32 --branch=main
